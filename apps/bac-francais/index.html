inition de l'arbre comme être réglé par les seules saisons, le poème accomplit une fusion progressive de l'être humain et de la nature : le « tu » devient sève et clarté, le poème pousse comme une plante, et l'arbre offre la leçon d'un temps cyclique. La nature y est bien, conformément au projet du recueil, le miroir de l'intime et le lieu d'une méditation sur le temps.","ouverture":"Cette fusion contemplative de l'homme et de l'arbre rejoint l'autre poème du recueil, « Mes forêts sont de longues traînées de temps », où la forêt entière devient paysage intérieur. On pourra plus largement la rattacher à la longue tradition de l'arbre comme axe du monde et figure de l'âme, des Romantiques à la poésie écologique contemporaine."},"grammaire":{"question":"Dans le vers « l'arbre n'a d'âge / que celui des saisons », analysez la nature et la fonction de « celui ».","reponse":"« celui » est un pronom démonstratif, de forme simple, masculin singulier. Il reprend et remplace le nom « âge » exprimé juste avant, pour éviter sa répétition : « l'arbre n'a d'âge que [l'âge] des saisons ». Sa fonction est complément d'objet direct du verbe « a » (dans la structure restrictive « ne... que »), ou plus précisément l'élément sur lequel porte la restriction « ne... que ». Il est lui-même complété par le complément du nom « des saisons », qui précise de quel âge il s'agit. Ce pronom permet la pointe du poème : l'arbre n'a d'autre âge que celui, cyclique, des saisons."}},{"id":"la-fontaine-le-loup-et-le-chien","auteur":"Jean de La Fontaine","titre":"Le Loup et le Chien","reference":"Fables, Livre I, fable 5","date":"1668","objet":"La littérature d'idées du XVIᵉ siècle au XVIIIᵉ siècle","parcours":"« Défendre » et « entretenir » la liberté","statut":"Texte complémentaire","mouvementLitteraire":"Classicisme","resumeFlash":"Par un apologue mettant en scène un loup affamé et un chien gras mais enchaîné, La Fontaine fait de la liberté un bien supérieur à toute sécurité matérielle.","intro":{"amorce":"Au XVIIᵉ siècle, l'âge classique érige l'apologue en arme de réflexion : « plaire et instruire », telle est la devise héritée d'Horace que La Fontaine revendique dans la préface de ses Fables. Sous le masque plaisant des bêtes, il glisse une leçon morale et, parfois, une critique de la société de son temps.","presentationAuteurOeuvre":"Jean de La Fontaine (1621-1695), poète classique et fabuliste, publie en 1668 le premier recueil de ses Fables, dédié au Dauphin. Reprenant la tradition antique d'Ésope et de Phèdre, il en renouvelle le genre par la grâce du style, la variété du vers et la finesse de l'observation humaine. La fable, court récit allégorique doublé d'une morale, relève de l'argumentation indirecte : elle persuade par le plaisir du récit plutôt qu'elle ne démontre.","situation":"« Le Loup et le Chien » est la cinquième fable du Livre I. Elle met face à face un loup décharné, libre mais affamé, et un dogue gras et soumis : leur dialogue conduit le loup à découvrir, au mot « attaché », le prix réel du confort que lui vante le chien.","problematique":"Comment l'apologue, par le récit et le dialogue, transforme-t-il une scène de tentation en éloge de la liberté préférée à la servitude confortable ?","annonceMouvements":"Le texte se déploie en trois temps : d'abord le portrait antithétique des deux animaux (vers 1 à 9) ; ensuite la tentation, le chien faisant l'éloge de sa condition (vers 10 à 27) ; enfin la découverte du collier et le sursaut de liberté du loup (vers 28 à 41)."},"conseilLecture":"Faire entendre l'opposition de rythme entre les longs alexandrins de la séduction (le chien) et les répliques hachées de la fin. Soigner le dialogue à coups de tirets, en accélérant et en montant le ton au moment de la stichomythie (« Rien. - Quoi ? rien ? - Peu de chose. »), puis marquer un temps avant le vers final, lapidaire et triomphant.","mouvements":[{"titre":"Premier mouvement : le portrait antithétique des deux animaux (vers 1 à 9)","analyse":[{"citation":"« Un Loup n'avait que les os et la peau »","procede":"Hyperbole et expression figée placée à l'attaque du récit, attaque in medias res par l'article indéfini « Un »","effet":"L'image de la maigreur extrême campe d'emblée la misère de la liberté sauvage ; l'entrée directe dans l'action installe la vivacité narrative propre à La Fontaine et inscrit le loup du côté du manque."},{"citation":"« Tant les chiens faisaient bonne garde »","procede":"Subordonnée consécutive (« Tant… »), octosyllabe après un décasyllabe","effet":"La consécutive justifie la maigreur par l'efficacité des chiens : dès le départ, le chien est l'adversaire structurel du loup, et l'hétérométrie (vers de longueurs inégales) imprime au récit un rythme alerte et naturel."},{"citation":"« un Dogue aussi puissant que beau, / Gras, poli »","procede":"Comparaison d'égalité et accumulation d'adjectifs mélioratifs, antithèse avec le loup","effet":"Le portrait du chien, opulent et soigné, s'oppose terme à terme à la maigreur du loup : l'antithèse fonde tout l'apologue sur l'écart entre deux conditions, abondance contre disette."},{"citation":"« qui s'était fourvoyé par mégarde »","procede":"Lexique du hasard (« fourvoyé », « par mégarde ») et notation discrète","effet":"Le détail rend la rencontre vraisemblable et souligne que le chien hors de son logis est, lui aussi, un instant égaré : sa place naturelle est près du maître, indice de sa dépendance."},{"citation":"« Sire Loup l'eût fait volontiers ; / Mais il fallait livrer bataille »","procede":"Périphrase honorifique ironique (« Sire Loup »), conditionnel passé puis connecteur d'opposition « Mais », tournure impersonnelle « il fallait »","effet":"L'anoblissement burlesque du loup amuse, tandis que le « Mais » et l'irréel du passé révèlent le calcul prudent de l'animal : le loup renonce à la force par intérêt, ce qui motive psychologiquement la ruse de la flatterie qui suit."},{"citation":"« Le Loup donc l'aborde humblement, / Entre en propos, et lui fait compliment »","procede":"Connecteur logique conclusif « donc », gradation de verbes d'action (« aborde », « entre en propos », « fait compliment »), adverbe « humblement »","effet":"L'enchaînement rapide met en scène la stratégie du loup : faute de pouvoir vaincre, il flatte ; l'humilité affichée prépare le renversement final où ce même loup retrouvera sa fierté."}],"bilan":"Ce premier mouvement, par l'antithèse soutenue entre le loup maigre et le chien gras, pose les termes du débat : la liberté a un prix, la faim ; reste à savoir si la sécurité du chien n'a pas, elle aussi, le sien."},{"titre":"Deuxième mouvement : la tentation, l'éloge de la servitude (vers 10 à 27)","analyse":[{"citation":"« Il ne tiendra qu'à vous beau sire, / D'être aussi gras que moi »","procede":"Discours direct, tournure de la condition facile (« Il ne tiendra qu'à vous »), vouvoiement flatteur","effet":"Le chien prend l'initiative de la parole et fait miroiter l'abondance comme une chose aisée : il devient à son tour tentateur, retournant l'humilité du loup en argument de séduction."},{"citation":"« Vos pareils y sont misérables, / Cancres, hères, et pauvres diables, / Dont la condition est de mourir de faim »","procede":"Accumulation péjorative en gradation, apostrophe collective « Vos pareils »","effet":"Le chien dévalorise la condition libre en l'assimilant à la misère et à la mort : l'argumentation joue sur la peur du manque pour rendre la liberté insoutenable et la servitude désirable."},{"citation":"« Car quoi ? rien d'assuré : point de franche lippée : / Tout à la pointe de l'épée »","procede":"Fausse question oratoire (« Car quoi ? »), phrases nominales juxtaposées, double négation lexicale (« rien », « point »)","effet":"Le rythme heurté et la suppression des verbes miment la précarité de la vie sauvage : la liberté est présentée comme une perpétuelle insécurité, là où le confort serait garanti (« assuré »)."},{"citation":"« Presque rien, dit le Chien, donner la chasse aux gens / Portants bâtons, et mendiants ; / Flatter ceux du logis, à son Maître complaire »","procede":"Litote (« Presque rien »), énumération d'infinitifs, champ lexical de la soumission (« Flatter », « complaire »)","effet":"Le chien minimise par la litote ce qui est en réalité une vie de servitude et de basse complaisance ; l'élève entend, sous l'éloge, l'aveu involontaire de l'asservissement, ce qui prépare le démenti du loup."},{"citation":"« Os de poulets, os de pigeons, / Sans parler de mainte caresse »","procede":"Énumération concrète et anaphore de « Os », rejet hyperbolique « Sans parler de »","effet":"L'abondance matérielle, détaillée avec gourmandise, séduit par le concret ; mais l'« os » reste un reste, et la « caresse » trahit le rapport de domesticité : la générosité du maître est celle qu'on accorde à un animal possédé."},{"citation":"« Le Loup déjà se forge une félicité / Qui le fait pleurer de tendresse »","procede":"Verbe « se forge » connoté (illusion fabriquée), hyperbole sentimentale (« pleurer de tendresse »), adverbe « déjà »","effet":"Le narrateur signale par « se forge » que ce bonheur est un leurre que le loup se fabrique lui-même ; l'attendrissement excessif rend le personnage comique et vulnérable, juste avant la révélation qui dissipera l'illusion."}],"bilan":"L'éloge du chien repose sur une rhétorique de la peur et de l'abondance qui faillit emporter le loup ; mais le vocabulaire de la soumission, glissé dans la séduction, mine déjà de l'intérieur l'argumentaire et annonce le retournement."},{"titre":"Troisième mouvement : la découverte du collier et le sursaut de liberté (vers 28 à 41)","analyse":[{"citation":"« Chemin faisant, il vit le col du Chien pelé »","procede":"Gérondif de simultanéité, notation visuelle précise (« le col du Chien pelé »), point de bascule du récit","effet":"Un détail physique trivial fait basculer la fable : la marque visible de l'attache vient contredire tout le discours d'abondance ; le réel reprend ses droits contre la parole séductrice."},{"citation":"« Qu'est-ce là ? lui dit-il. - Rien. - Quoi ? rien ? - Peu de chose. / - Mais encor ? »","procede":"Stichomythie (répliques très brèves échangées), questions pressantes, gradation dans l'aveu (« Rien » / « Peu de chose » / l'aveu complet)","effet":"L'accélération du dialogue mime l'enquête du loup qui arrache la vérité : la réticence du chien (« Rien »… « Peu de chose ») trahit la honte de sa condition, et chaque relance rapproche du dévoilement de la servitude."},{"citation":"« Le collier dont je suis attaché / De ce que vous voyez est peut-être la cause »","procede":"Mot-clé révélateur « collier », voix passive « je suis attaché », modalisateur atténuant « peut-être »","effet":"Le « collier » concentre tout le sens de l'apologue : signe matériel de l'aliénation. Le passif fait du chien un sujet dépossédé de sa volonté, et la prudence du « peut-être » montre qu'il a intériorisé sa chaîne au point de la minimiser."},{"citation":"« Attaché ? dit le Loup : vous ne courez donc pas / Où vous voulez ? »","procede":"Reprise indignée en écho (« Attaché ? »), question rhétorique, connecteur logique « donc » de déduction","effet":"Le loup tire aussitôt la conséquence (« donc ») : le confort se paie de la perte de la liberté de mouvement. La répétition du mot marque la prise de conscience et oppose frontalement servitude et libre arbitre."},{"citation":"« Pas toujours ; mais qu'importe ? »","procede":"Litote (« Pas toujours »), question rhétorique de désinvolture (« qu'importe ? »)","effet":"Le chien minimise une dernière fois la perte de sa liberté, révélant une servitude si bien acceptée qu'elle ne lui pèse plus : c'est la définition même de la servitude volontaire, ce qui horrifie le loup."},{"citation":"« Il importe si bien, que de tous vos repas / Je ne veux en aucune sorte, / Et ne voudrais pas même à ce prix un trésor »","procede":"Reprise antithétique (« qu'importe ? » / « Il importe si bien »), gradation hyperbolique (« en aucune sorte » … « même à ce prix un trésor »)","effet":"Le loup renverse le « qu'importe » du chien : la liberté est un bien si absolu qu'aucune richesse ne saurait l'acheter. La gradation exprime la valeur inestimable accordée à l'indépendance : c'est la morale de la fable, énoncée par le personnage."},{"citation":"« Cela dit, maître Loup s'enfuit, et court encor »","procede":"Présent de narration prolongé en présent à valeur durative (« court encor »), chute brève et frappante, anoblissement « maître Loup »","effet":"Le « court encor » fait durer la fuite jusqu'au présent du lecteur : la liberté reconquise devient un état permanent. La chute donne le dernier mot au loup, désormais « maître » non par la force mais par sa liberté : l'apologue s'achève sur un triomphe sans morale explicite, laissant le lecteur conclure."}],"bilan":"Le dénouement renverse tout l'art de persuader du chien : un seul mot, « collier », suffit à révéler que la sécurité se paie d'une chaîne. Le loup choisit la faim libre contre l'abondance servile, et la morale, implicite, surgit du récit même."}],"conclusion":{"bilan":"Par un récit vif et un dialogue dramatisé, La Fontaine bâtit un apologue dont la morale n'est jamais énoncée par le fabuliste mais incarnée par le geste final du loup : aucun confort ne vaut la perte de la liberté. L'argumentation indirecte triomphe ici, car c'est le plaisir du récit et la vivacité du dialogue qui font adhérer le lecteur à l'éloge de l'indépendance.","ouverture":"Cette défense de la liberté contre la servitude consentie fait écho au Discours de la servitude volontaire de La Boétie : là où le philosophe interroge frontalement la soumission des peuples, La Fontaine la met en scène avec légèreté, montrant que l'apologue peut, autant que le traité, « entretenir » la liberté."},"grammaire":{"question":"Dans la phrase « vous ne courez donc pas / Où vous voulez ? », analysez la proposition « Où vous voulez ».","reponse":"« Où vous voulez » est une proposition subordonnée relative (sans antécédent exprimé, à valeur de complément circonstanciel de lieu), introduite par l'adverbe relatif « où ». Elle complète le verbe « courez » de la principale et indique le lieu vers lequel se porte l'action : elle a donc la fonction de complément circonstanciel de lieu du verbe « courez ». Le verbe « voulez », au présent de l'indicatif (2ᵉ personne du pluriel de vouvoiement), y a pour sujet le pronom personnel « vous »."}},{"id":"machiavel-le-prince-aime-craint","auteur":"Machiavel (Nicolas Machiavel)","titre":"Le Prince (vaut-il mieux être aimé que craint ?)","reference":"Le Prince, chapitre XVII, traduction française","date":"écrit en 1513, publié en 1532","objet":"La littérature d'idées du XVIᵉ siècle au XVIIIᵉ siècle","parcours":"« Défendre » et « entretenir » la liberté","statut":"Texte complémentaire","mouvementLitteraire":"Humanisme de la Renaissance (pensée politique)","resumeFlash":"Machiavel démontre, par un raisonnement réaliste fondé sur une vision pessimiste de l'homme, qu'il est plus sûr pour un prince d'être craint que d'être aimé.","intro":{"amorce":"À la Renaissance, l'humanisme replace l'homme et l'action politique au centre de la réflexion. Mais loin des utopies vertueuses, Nicolas Machiavel fonde une pensée nouvelle : la politique doit être pensée non telle qu'elle devrait être, mais telle qu'elle est. Son nom donnera l'adjectif « machiavélique ».","presentationAuteurOeuvre":"Nicolas Machiavel (1469-1527), homme d'État et théoricien florentin, écrit Le Prince en 1513, traité publié en 1532. Conçu comme un manuel de gouvernement adressé au prince, il fonde le réalisme politique moderne : Machiavel y analyse froidement les mécanismes du pouvoir et de sa conservation, en séparant la morale de l'efficacité politique.","situation":"Cet extrait du chapitre XVII pose une question célèbre du débat politique : vaut-il mieux, pour un prince, être aimé ou craint ? Machiavel y répond par une démonstration appuyée sur une anthropologie pessimiste, avant de nuancer en distinguant la crainte de la haine.","problematique":"Comment Machiavel construit-il, par un raisonnement déductif et réaliste, la supériorité de la crainte sur l'amour comme fondement du pouvoir princier ?","annonceMouvements":"Le texte progresse en trois temps : d'abord la position prudente du prince et la pose de la question (l. 1 à 6) ; ensuite la démonstration centrale fondée sur la nature humaine (l. 7 à 22) ; enfin la nuance finale entre crainte et haine (l. 23 à 26)."},"conseilLecture":"Adopter le ton posé et assuré d'un conseiller politique : ni emphase ni indignation, mais une froideur démonstrative. Marquer nettement la question rhétorique du début, puis faire entendre les connecteurs logiques (« Mais », « car », « Ajoutons », « Cependant ») qui scandent le raisonnement. Garder une voix neutre sur l'énumération des défauts humains, pour en souligner le cynisme tranquille.","mouvements":[{"titre":"Premier mouvement : la prudence du prince et la position de la question (l. 1 à 6)","analyse":[{"citation":"« suivre en tout les conseils de la prudence, tempérés par ceux de l'humanité »","procede":"Lexique de la mesure (« prudence », « tempérés »), équilibre binaire","effet":"Machiavel pose d'abord un idéal de modération : le prince doit allier calcul et humanité. Cette ouverture nuancée donne d'autant plus de poids à la dureté du raisonnement qui suivra, en l'inscrivant dans une logique de raison et non de cruauté gratuite."},{"citation":"« qu'il ne soit point imprévoyant par trop de confiance, et qu'une défiance excessive ne le rende point intolérable »","procede":"Parallélisme antithétique, double négation, lexique de l'excès (« trop », « excessive »)","effet":"L'art du prince est défini comme un juste milieu entre deux excès opposés : ni naïveté ni tyrannie. Ce souci d'équilibre annonce que la crainte recommandée plus loin devra elle-même rester maîtrisée."},{"citation":"« Sur cela s'est élevée la question de savoir : S'il vaut mieux être aimé que craint, ou être craint qu'aimé ? »","procede":"Question rhétorique posée comme un débat scolastique, structure chiasmatique (« aimé… craint, craint… aimé »)","effet":"Machiavel met en scène un débat traditionnel pour mieux y apporter sa réponse personnelle ; le chiasme enferme le lecteur dans l'alternative et prépare le tranchant de la prise de position à venir."},{"citation":"« On peut répondre que le meilleur serait d'être l'un et l'autre »","procede":"Concession (le conditionnel « serait », pronom indéfini « On »), idéal posé puis aussitôt écarté","effet":"Le philosophe concède d'abord la solution idéale pour mieux la disqualifier ensuite : c'est une stratégie de réfutation qui rend sa conclusion réaliste d'autant plus convaincante, car elle paraît s'imposer faute de mieux."}],"bilan":"Ce premier temps installe la posture du raisonneur prudent et pose la question en termes de débat ; la concession initiale (« être l'un et l'autre ») n'est là que pour être balayée par le réalisme."},{"titre":"Deuxième mouvement : la démonstration par la nature humaine (l. 7 à 22)","analyse":[{"citation":"« comme il est très-difficile que les deux choses existent ensemble, je dis que, si l'une doit manquer, il est plus sûr d'être craint que d'être aimé »","procede":"Raisonnement déductif (« comme… je dis que… »), affirmation à la 1ère personne (« je dis »), comparatif « plus sûr »","effet":"Machiavel passe de la concession à la thèse par une déduction rigoureuse ; le « je dis » engage son autorité de théoricien, et le critère retenu — la « sûreté », non la vertu — révèle le déplacement réaliste du débat vers l'efficacité."},{"citation":"« On peut, en effet, dire généralement des hommes qu'ils sont ingrats, inconstants, dissimulés, tremblants devant les dangers, et avides de gain »","procede":"Connecteur d'explication « en effet », présent de vérité générale, accumulation péjorative en asyndète (sans liaison)","effet":"L'argument repose sur une anthropologie pessimiste posée comme vérité universelle (« généralement des hommes ») : l'accumulation des défauts dresse un portrait noir de l'humanité, fondement nécessaire de la thèse, car on ne peut compter sur des êtres aussi peu fiables."},{"citation":"« tant que vous leur faites du bien, ils sont à vous, qu'ils vous offrent leur sang, leurs biens, leur vie, leurs enfants »","procede":"Système d'opposition temporelle (« tant que… mais que »), gradation hyperbolique (« sang », « biens », « vie », « enfants »)","effet":"La gradation ascendante des sacrifices feints démasque l'hypocrisie intéressée des sujets : leur dévouement n'est que de façade et conditionnel, ce qui ruine la fiabilité de l'amour comme appui du pouvoir."},{"citation":"« mais que, lorsqu'il s'approche, ils se détournent bien vite »","procede":"Connecteur d'opposition « mais », antithèse temporelle (péril éloigné / péril proche), adverbe « bien vite »","effet":"Le retournement brutal des sujets au moment du danger administre la preuve que l'amour ne tient pas : la démonstration est imparable, l'épreuve du péril servant de critère décisif."},{"citation":"« toutes ces amitiés, achetées par des largesses, et non accordées par générosité et grandeur d'âme »","procede":"Champ lexical commercial (« achetées », « largesses »), antithèse morale (intérêt / « générosité et grandeur d'âme »)","effet":"Machiavel réduit l'amour politique à une transaction : l'affection des sujets s'achète mais ne se possède pas vraiment, d'où sa fragilité. La crainte, elle, ne dépend pas d'un don que l'on pourrait reprendre."},{"citation":"« car l'amour tient par un lien de reconnaissance bien faible pour la perversité humaine, et qui cède au moindre motif d'intérêt personnel »","procede":"Connecteur causal « car », métaphore du « lien », antithèse « faible » / « cède », lexique du vice (« perversité »)","effet":"L'amour est défini comme un lien fragile, brisé par le moindre intérêt : l'image du fil qui cède rend sensible l'inconsistance de ce sentiment comme fondement du pouvoir."},{"citation":"« au lieu que la crainte résulte de la menace du châtiment, et cette peur ne s'évanouit jamais »","procede":"Connecteur d'opposition « au lieu que », antithèse avec la phrase précédente, hyperbole de la permanence (« ne s'évanouit jamais »)","effet":"Par contraste, la crainte est présentée comme stable et durable parce qu'elle s'appuie sur la peur du châtiment, ressort qui ne dépend pas de la bonne volonté des sujets : c'est la conclusion de la démonstration, la crainte étant un instrument de pouvoir fiable."}],"bilan":"Le cœur du texte est une démonstration en bonne et due forme : d'une prémisse pessimiste sur la nature humaine, Machiavel déduit logiquement que la crainte, durable, l'emporte sur l'amour, volatil. Le raisonnement, scandé de connecteurs logiques, vise à convaincre par la rigueur autant que par le cynisme."},{"titre":"Troisième mouvement : la nuance entre crainte et haine (l. 23 à 26)","analyse":[{"citation":"« Cependant le prince qui veut se faire craindre doit s'y prendre de telle manière que, s'il ne gagne point l'affection, il ne s'attire pas non plus la haine »","procede":"Connecteur de concession « Cependant », système hypothétique, distinction conceptuelle (crainte / haine)","effet":"Machiavel tempère sa thèse pour en montrer la limite : la crainte recommandée ne doit pas dégénérer en haine. Cette nuance corrige l'impression de cynisme et révèle le pragmatisme du conseiller, soucieux de la conservation du pouvoir."},{"citation":"« ce qui, du reste, n'est point impossible »","procede":"Modalisateur de possibilité, litote (« n'est point impossible » pour « est possible »)","effet":"L'incise rassure le prince sur la faisabilité de son conseil : la litote, en affirmant prudemment, donne au propos une mesure d'expert qui sait ce qui est réalisable dans l'exercice du pouvoir."},{"citation":"« car on peut fort bien tout à la fois être craint et n'être pas haï »","procede":"Connecteur causal « car », formule maxime à valeur générale, antithèse résolue (« craint » / « pas haï »)","effet":"La phrase de clôture, ramassée comme une maxime, fixe la leçon politique : la crainte sans la haine est l'équilibre idéal du pouvoir. Le texte s'achève sur un précepte mémorisable, propre au genre du traité didactique."}],"bilan":"La nuance finale empêche de réduire Machiavel à un éloge de la tyrannie : la crainte n'est utile que tant qu'elle ne se mue pas en haine. Le penseur affine sa thèse en un précepte d'équilibre, conforme à la prudence affichée au début."}],"conclusion":{"bilan":"Par une démonstration déductive appuyée sur une vision pessimiste de l'homme, Machiavel établit que la crainte, parce qu'elle est durable, est un fondement du pouvoir plus sûr que l'amour, volatil et intéressé. La rigueur des connecteurs logiques et la sécheresse des maximes font de ce texte un modèle de l'art de convaincre au service du réalisme politique.","ouverture":"Cette séparation de la morale et de la politique nourrira la réflexion sur le pouvoir jusqu'aux Lumières. On peut l'opposer à La Boétie, qui dans le Discours de la servitude volontaire dénonce précisément la domination d'un seul : là où Machiavel enseigne au prince à se faire craindre, La Boétie cherche au contraire à libérer le peuple de cette crainte consentie."},"grammaire":{"question":"Dans la phrase « il est plus sûr d'être craint que d'être aimé », analysez la construction comparative.","reponse":"La phrase est construite sur une comparaison d'inégalité (de supériorité) introduite par l'adverbe « plus » devant l'adjectif « sûr » et corrélée à la conjonction « que ». Le premier terme comparé est « d'être craint » (proposition subordonnée infinitive sujet réel du verbe impersonnel « il est ») ; le second, introduit par « que », est « d'être aimé ». La comparaison oppose donc deux états et établit la supériorité du premier (« être craint ») sur le second (« être aimé »)."}},{"id":"la-boetie-servitude-volontaire-extrait-1","auteur":"Étienne de La Boétie","titre":"Discours de la servitude volontaire (premier extrait)","reference":"Discours de la servitude volontaire","date":"écrit vers 1548, publié en 1576","objet":"La littérature d'idées du XVIᵉ siècle au XVIIIᵉ siècle","parcours":"« Défendre » et « entretenir » la liberté","statut":"Œuvre intégrale","mouvementLitteraire":"Humanisme de la Renaissance","resumeFlash":"À partir d'une citation d'Ulysse chez Homère, La Boétie réfute le pouvoir d'un seul et dénonce le malheur de vivre sous un maître dont rien ne garantit la bonté.","intro":{"amorce":"Comment un peuple en vient-il à servir volontairement un seul homme, alors qu'il pourrait s'en libérer ? Cette question, posée par un jeune humaniste de la Renaissance, demeure l'un des grands paradoxes de la pensée politique : c'est l'énigme de la servitude volontaire.","presentationAuteurOeuvre":"Étienne de La Boétie (1530-1563), magistrat et humaniste, ami de Montaigne, compose très jeune le Discours de la servitude volontaire (vers 1548), texte publié seulement en 1576, après sa mort. Nourri de la culture antique, ce pamphlet philosophique interroge un paradoxe : comment des peuples entiers consentent-ils à servir un seul tyran ? La Boétie y dénonce la tyrannie et, plus encore, la soumission consentie qui en est la véritable cause, faisant de la liberté un bien naturel que les hommes abandonnent par habitude et par lâcheté.","situation":"Dans ce premier extrait, situé à l'ouverture du Discours, La Boétie part d'un vers d'Homère prêté à Ulysse pour critiquer aussi bien la domination de plusieurs maîtres que celle d'un seul, et conclut au malheur radical de tout sujet livré à un pouvoir absolu.","problematique":"Comment La Boétie, à partir d'une référence antique, construit-il une réfutation du pouvoir d'un seul et fonde-t-il sa dénonciation de la servitude sur le malheur du sujet ?","annonceMouvements":"Le passage se déploie en trois temps : d'abord la discussion critique du vers d'Ulysse (l. 1 à 11) ; ensuite l'excuse accordée à Ulysse et le retour à la vérité (l. 12 à 18) ; enfin l'affirmation du malheur de tout sujet et le refus de trancher le débat des régimes (l. 19 à 27)."},"conseilLecture":"Lire en orateur qui pèse ses mots : c'est un raisonnement, non une harangue. Détacher la citation d'Homère placée en exergue, puis faire entendre la rupture logique entre les deux vers d'Ulysse. Marquer fortement les connecteurs d'opposition (« mais », « Et ») et adopter un ton ferme et indigné sur la formule « c'est un extrême malheur d'être sujet d'un maître ».","mouvements":[{"titre":"Premier mouvement : la discussion critique du vers d'Ulysse (l. 1 à 11)","analyse":[{"citation":"« Je ne vois aucun avantage à avoir plusieurs seigneurs, / Qu'un, pas plus, soit le maître, et qu'un seul soit le roi. »","procede":"Citation liminaire d'autorité (Homère), placée en exergue, structure en deux vers contradictoires","effet":"La Boétie s'appuie sur le prestige d'Homère pour ouvrir sa réflexion, mais isole d'emblée une contradiction dans le propos d'Ulysse : ce procédé d'appui sur l'autorité antique relève de l'érudition humaniste tout en préparant la réfutation."},{"citation":"« Ainsi parlait Ulysse chez Homère, s'exprimant en public »","procede":"Référence érudite, précision « en public » placée d'emblée","effet":"L'auteur affiche sa culture antique, gage d'autorité, mais la mention « en public » prépare déjà l'objection : ce discours est une parole de circonstance, ce qui en relativise la portée de vérité."},{"citation":"« S'il n'eût rien dit de plus que [...], c'était si bien dit qu'il ne fallait rien ajouter de plus »","procede":"Système hypothétique à l'irréel du passé (« S'il n'eût rien dit »), approbation hyperbolique (« si bien dit »)","effet":"La Boétie approuve sans réserve la première moitié du vers : le refus de plusieurs maîtres. Cette adhésion enthousiaste sert de point d'appui pour mieux condamner ensuite la seconde moitié, par contraste."},{"citation":"« mais alors que pour étayer son raisonnement il fallait dire que la domination de plusieurs ne pouvait être bonne puisque la puissance d'un seul [...] est dure et déraisonnable »","procede":"Connecteur d'opposition « mais », raisonnement par la cause (« puisque »), thèse personnelle anticipée","effet":"La Boétie reformule ce qu'Ulysse aurait dû dire : il glisse ici sa propre thèse, selon laquelle le pouvoir d'un seul est par nature « dur et déraisonnable ». L'argumentation se fait sous couvert de correction de l'autorité."},{"citation":"« il est allé ajouter tout le contraire : / Qu'un, pas plus, soit le maître, et qu'un seul soit le roi. »","procede":"Antithèse explicite (« tout le contraire »), reprise de la citation pour la condamner","effet":"La répétition du second vers, après avoir été dénoncé comme contradictoire, isole l'erreur d'Ulysse : préférer un seul maître. La Boétie retourne ainsi l'autorité d'Homère contre la monarchie absolue."}],"bilan":"En soumettant à la critique un vers d'Homère, La Boétie dissocie ce qu'il approuve — le rejet de plusieurs maîtres — de ce qu'il condamne — l'éloge d'un maître unique. La discussion érudite est en réalité une stratégie pour avancer sa propre thèse contre le pouvoir d'un seul."},{"titre":"Deuxième mouvement : l'excuse d'Ulysse et le retour à la vérité (l. 12 à 18)","analyse":[{"citation":"« Il en faudrait éventuellement excuser Ulysse, qui peut-être à ce moment avait besoin d'user de ce langage pour apaiser la révolte de l'armée »","procede":"Concession (« il faudrait excuser »), modalisateurs d'hypothèse (« éventuellement », « peut-être »)","effet":"La Boétie accorde une circonstance atténuante à Ulysse : son propos serait une nécessité politique du moment. Cette concession nuancée renforce la crédibilité du raisonneur, qui se montre équitable avant de rétablir la vérité."},{"citation":"« conformant, je crois, son propos plus aux circonstances qu'à la vérité »","procede":"Antithèse « circonstances » / « vérité », incise modalisante (« je crois »), comparatif d'opposition","effet":"La distinction entre parole de circonstance et parole de vérité est décisive : elle disqualifie l'autorité d'Ulysse sur ce point et signale que La Boétie, lui, entend parler au nom de la vérité, non de l'opportunité."},{"citation":"« Mais si l'on veut parler à bon escient, c'est un extrême malheur d'être sujet d'un maître »","procede":"Connecteur d'opposition « Mais », présent de vérité générale, superlatif « extrême malheur »","effet":"Le « Mais » marque le retour à la thèse personnelle, énoncée comme une vérité incontestable : être soumis à un maître est un malheur absolu. Le superlatif donne au propos une force polémique."},{"citation":"« dont on ne peut être certain qu'il sera bon, puisqu'il a toujours le pouvoir d'être mauvais quand il le voudra »","procede":"Raisonnement causal (« puisque »), opposition « bon » / « mauvais », adverbe « toujours »","effet":"L'argument est imparable : un pouvoir absolu contient toujours la possibilité du mal, indépendamment des qualités du prince. Ce n'est pas la personne du maître qui est condamnée, mais la structure même du pouvoir d'un seul."}],"bilan":"Après avoir équitablement excusé Ulysse par les circonstances, La Boétie rétablit ce qu'il tient pour la vérité : la soumission à un maître est un malheur, car l'absolu du pouvoir rend toujours possible le mal. La concession n'était qu'un détour pour mieux asseoir la thèse."},{"titre":"Troisième mouvement : le malheur du sujet et le refus du débat des régimes (l. 19 à 27)","analyse":[{"citation":"« Et avoir plusieurs maîtres, c'est, autant qu'on en a, être autant de fois extrêmement malheureux »","procede":"Connecteur d'addition « Et », raisonnement par proportion (« autant qu'on en a… autant de fois »), reprise du superlatif","effet":"La Boétie revient au premier vers d'Ulysse, qu'il approuvait : plusieurs maîtres multiplient le malheur. La logique proportionnelle donne au propos une rigueur quasi mathématique, qui referme la critique sur la condamnation de toute servitude."},{"citation":"« Je ne veux pas pour l'heure débattre de cette question tant discutée : les autres formes de régimes sont-elles meilleures que la monarchie ? »","procede":"Prétérition (annoncer qu'on ne traitera pas un sujet), affirmation à la 1ère personne (« Je ne veux pas »), question rapportée","effet":"La Boétie écarte volontairement le débat classique sur les régimes pour recentrer son propos. Cette prétérition organise son raisonnement et révèle sa visée : ce qui l'intéresse n'est pas de classer les régimes, mais de mettre en cause le principe même de la monarchie."},{"citation":"« je voudrais surtout savoir, avant de m'interroger sur le rang que doit avoir la monarchie [...], si elle doit seulement en avoir un »","procede":"Gradation dans la question (du rang à l'existence même), conditionnel de prudence (« je voudrais »), adverbe « surtout »","effet":"Le glissement de la question — non plus « quel rang ? » mais « doit-elle exister ? » — radicalise la critique : La Boétie ne réforme pas la monarchie, il en conteste la légitimité même, ce qui fait la portée subversive du Discours."},{"citation":"« car il est malaisé de croire qu'il y ait quelque notion de bien commun en ce gouvernement où tout appartient à un seul »","procede":"Connecteur causal « car », litote (« malaisé de croire » pour « impossible »), antithèse « bien commun » / « à un seul »","effet":"L'argument oppose le « bien commun », fondement de la communauté politique, à l'accaparement par « un seul » : la monarchie absolue est dénoncée comme contraire à l'intérêt collectif, ce qui en mine la légitimité."},{"citation":"« mais cette question est réservée à un autre moment et demanderait bien son traité à part, ou plutôt amènerait avec elle toutes sortes de débats politiques »","procede":"Prétérition de clôture, gradation (« un autre moment » / « un traité à part » / « toutes sortes de débats »), correction (« ou plutôt »)","effet":"La Boétie clôt le passage en reportant le débat, mais en suggérant son ampleur explosive (« toutes sortes de débats politiques ») : il laisse entrevoir la dimension subversive de sa pensée tout en maîtrisant la progression de son raisonnement."}],"bilan":"Ce dernier mouvement déplace habilement la question : il ne s'agit plus de comparer les régimes, mais de contester la légitimité même du pouvoir d'un seul, incompatible avec le bien commun. Par la prétérition, La Boétie maîtrise son raisonnement tout en laissant deviner la portée révolutionnaire de son propos."}],"conclusion":{"bilan":"À partir d'une simple citation d'Homère, La Boétie construit une réfutation rigoureuse du pouvoir d'un seul : il distingue parole de circonstance et parole de vérité, démontre que tout pouvoir absolu rend possible le mal, et en conteste finalement la légitimité au nom du bien commun. L'art de convaincre — concession, raisonnement causal, prétérition — sert une visée nettement polémique.","ouverture":"Ce passage liminaire annonce le cœur du Discours : la dénonciation de la servitude volontaire, ce paradoxe par lequel les peuples consentent eux-mêmes à leur asservissement. Le second extrait du texte montrera comment cette servitude se nourrit de la complicité de ceux qui entourent et servent le tyran."},"grammaire":{"question":"Dans la phrase « c'est un extrême malheur d'être sujet d'un maître dont on ne peut être certain qu'il sera bon », analysez le mot « dont ».","reponse":"« dont » est un pronom relatif (forme invariable) qui introduit la proposition subordonnée relative « dont on ne peut être certain qu'il sera bon ». Son antécédent est le nom « maître ». Il équivaut à « duquel / de qui » et occupe ici la fonction de complément de l'adjectif « certain » (être certain de quelqu'un / de quelque chose) : « on ne peut être certain DE ce maître ». La relative complète et caractérise l'antécédent « maître »."}},{"id":"la-boetie-servitude-volontaire-extrait-2","auteur":"Étienne de La Boétie","titre":"Discours de la servitude volontaire (deuxième extrait)","reference":"Discours de la servitude volontaire","date":"écrit vers 1548, publié en 1576","objet":"La littérature d'idées du XVIᵉ siècle au XVIIIᵉ siècle","parcours":"« Défendre » et « entretenir » la liberté","statut":"Œuvre intégrale","mouvementLitteraire":"Humanisme de la Renaissance","resumeFlash":"La Boétie peint la haine vouée par le peuple aux complices du tyran, puis appelle à bien agir et annonce le châtiment divin réservé aux tyrans et à leurs suppôts.","intro":{"amorce":"Comment un peuple en vient-il à servir volontairement un seul homme, alors qu'il pourrait s'en libérer ? Cette question, posée par un jeune humaniste de la Renaissance, demeure l'un des grands paradoxes de la pensée politique : c'est l'énigme de la servitude volontaire.","presentationAuteurOeuvre":"Étienne de La Boétie (1530-1563), magistrat et humaniste, ami de Montaigne, compose très jeune le Discours de la servitude volontaire (vers 1548), texte publié seulement en 1576, après sa mort. Nourri de la culture antique, ce pamphlet philosophique interroge un paradoxe : comment des peuples entiers consentent-ils à servir un seul tyran ? La Boétie y dénonce la tyrannie et, plus encore, la soumission consentie qui en est la véritable cause, faisant de la liberté un bien naturel que les hommes abandonnent par habitude et par lâcheté.","situation":"Ce second extrait, proche de la fin du Discours, peint la haine que le peuple voue non au tyran lui-même mais à ses complices, puis s'achève par une exhortation morale et religieuse annonçant le châtiment divin des tyrans.","problematique":"Comment La Boétie, par un tableau de l'exécration populaire puis par une exhortation, dénonce-t-il les complices de la tyrannie et oriente-t-il son lecteur vers la vertu et la justice divine ?","annonceMouvements":"Le passage s'organise en deux mouvements : d'abord le tableau polémique de la haine du peuple envers les complices du tyran (l. 1 à 15) ; ensuite l'exhortation morale et religieuse, avec l'annonce du châtiment divin (l. 16 à 24)."},"conseilLecture":"Faire entendre le registre polémique et indigné de la première partie : accélérer sur les accumulations (« mille outrages, mille vilenies, mille malédictions ») pour en restituer la fureur. Puis changer nettement de ton à « Apprenons donc » : passer de l'imprécation à la solennité de l'exhortation, en ralentissant et en élevant la voix vers le registre religieux de la fin.","mouvements":[{"titre":"Premier mouvement : le tableau de la haine du peuple envers les complices du tyran (l. 1 à 15)","analyse":[{"citation":"« Volontiers le peuple, du mal qu'il souffre, n'en accuse point le tyran mais ceux qui exercent son gouvernement »","procede":"Connecteur d'opposition « mais », antithèse (« le tyran » / « ceux qui exercent son gouvernement »), adverbe « Volontiers »","effet":"La Boétie pointe d'emblée un paradoxe psychologique : le peuple épargne le tyran et reporte sa haine sur ses agents. Ce constat amer prépare la dénonciation des complices, rouages indispensables de la servitude."},{"citation":"« les peuples, les nations, tout le monde à qui mieux mieux jusqu'aux paysans, jusqu'aux laboureurs, savent leurs noms, déchiffrent leurs vices »","procede":"Gradation et accumulation des sujets (« les peuples, les nations, tout le monde »), anaphore de « jusqu'aux », hyperbole de l'universalité","effet":"L'accumulation montre l'unanimité de la détestation, des grands aux plus humbles : l'amplification rhétorique donne au tableau une force collective et souligne l'évidence morale de cette haine partagée."},{"citation":"« amassent sur eux mille outrages, mille vilenies, mille malédictions »","procede":"Anaphore du nombre hyperbolique « mille », gradation, rythme ternaire","effet":"La répétition de « mille » exprime l'accumulation démesurée de la haine populaire ; le rythme ternaire et l'hyperbole donnent au passage une intensité polémique qui fait sentir la justesse de cette réprobation."},{"citation":"« Et si quelquefois ils leur font apparemment quelque honneur, au même moment ils les maudissent en leur cœur »","procede":"Antithèse entre l'apparence et le sentiment (« apparemment quelque honneur » / « maudissent en leur cœur »), modalisateur « apparemment »","effet":"La Boétie dévoile l'hypocrisie forcée des sujets : l'honneur rendu n'est qu'une façade contrainte recouvrant la haine. L'opposition entre l'extérieur et le cœur souligne la perversion des rapports imposés par la tyrannie."},{"citation":"« leur vouent une horreur plus prodigieuse que s'ils étaient des bêtes sauvages »","procede":"Comparaison hyperbolique (« plus prodigieuse que… des bêtes sauvages »), lexique de la monstruosité","effet":"Les complices sont rabaissés au-dessous des bêtes sauvages : la comparaison déshumanise ces agents du pouvoir et culmine le réquisitoire, marquant qu'ils inspirent plus d'horreur que la nature la plus féroce."},{"citation":"« les gens du peuple qui, s'ils avaient chacun une pièce de leur corps, ne seraient pas encore [...] assez satisfaits, ni à demi repus de leur peine »","procede":"Hypothèse hyperbolique et image cruelle (« une pièce de leur corps »), litote inversée (« ni à demi repus »), métaphore alimentaire (« repus »)","effet":"L'image du dépeçage et de la faim de vengeance exprime l'intensité du ressentiment populaire ; le retournement de la métaphore alimentaire (eux qui dévorent le peuple seraient à leur tour dévorés) annonce le surnom « mange-peuples »."},{"citation":"« tant que le nom de ces mange-peuples n'est pas noirci de l'encre de mille plumes, leur réputation déchirée dans mille livres, et leurs os mêmes [...] traînés par la postérité »","procede":"Néologisme injurieux (« mange-peuples »), gradation (« noirci » / « déchirée » / « traînés »), anaphore de « mille », métaphore de l'écriture vengeresse (« l'encre de mille plumes »)","effet":"Le mot-valise « mange-peuples » concentre la dénonciation des complices comme prédateurs du peuple ; la gradation prolonge la vengeance au-delà de la mort, par le verdict des écrivains et de la postérité — La Boétie assigne ici à la littérature un rôle de justice."}],"bilan":"Ce premier mouvement est un véritable réquisitoire : par l'accumulation, l'hyperbole et l'invective (« mange-peuples »), La Boétie peint l'exécration unanime vouée aux serviteurs du tyran. Il révèle ainsi que la tyrannie repose sur des complices haïs, et confie à l'écrit le soin de les châtier devant la postérité."},{"titre":"Deuxième mouvement : l'exhortation morale et religieuse (l. 16 à 24)","analyse":[{"citation":"« Apprenons donc pour une fois, apprenons à bien agir »","procede":"Connecteur conclusif « donc », anaphore et impératif (subjonctif d'exhortation) à la 1ère personne du pluriel « Apprenons »","effet":"Le « nous » associe l'auteur à son lecteur dans un même élan moral : La Boétie passe du réquisitoire à l'exhortation. La répétition de « Apprenons » martèle l'appel à la vertu et marque un changement net de registre, du polémique au didactique et moral."},{"citation":"« levons les yeux vers le ciel, ou pour notre honneur ou pour l'amour même de la vertu »","procede":"Métaphore de l'élévation (« levons les yeux vers le ciel »), gradation des motifs (« honneur » / « vertu » / « Dieu »), tournure « ou… ou »","effet":"Le geste symbolique d'élévation oriente le lecteur vers le bien ; la gradation des motivations, de l'honneur humain à l'amour de Dieu, élève le propos vers le registre religieux et donne à la défense de la liberté une dimension spirituelle."},{"citation":"« si l'on veut parler à bon escient, pour l'amour et l'honneur de Dieu tout-puissant »","procede":"Reprise de la formule « parler à bon escient », superlatif religieux (« Dieu tout-puissant »)","effet":"La reprise de cette formule, déjà présente dans le premier extrait, marque la cohérence du raisonnement et le souci de vérité ; l'invocation de Dieu tout-puissant fonde la morale sur une autorité absolue, au-dessus de tout tyran terrestre."},{"citation":"« qui est le sûr témoin de nos actions et le juste juge de nos fautes »","procede":"Apposition à valeur définitoire, parallélisme (« sûr témoin » / « juste juge »), champ lexical judiciaire","effet":"Dieu est présenté comme un tribunal infaillible : ce recours au juge divin déplace la justice du plan humain, où le tyran échappe au châtiment, vers un plan supérieur où nul n'échappera à la sanction."},{"citation":"« il n'est rien de plus contraire à Dieu, plein de générosité et de bonté »","procede":"Antithèse (la tyrannie / un Dieu « plein de générosité et de bonté »), superlatif « rien de plus contraire »","effet":"La tyrannie est posée comme l'inverse absolu de la nature divine : l'argument théologique fait de la liberté un ordre voulu par Dieu, et de la tyrannie une transgression de cet ordre, ce qui en justifie le châtiment."},{"citation":"« qu'il réserve là-bas, à part pour les tyrans et leurs complices, quelque peine particulière »","procede":"Chute solennelle, euphémisme menaçant (« quelque peine particulière »), reprise de la dualité « tyrans et leurs complices »","effet":"L'extrait s'achève sur l'annonce d'un châtiment divin réservé aux tyrans ET à leurs complices : l'euphémisme « quelque peine particulière », par sa retenue même, rend la menace plus inquiétante. La boucle se referme sur les complices du premier mouvement, désormais voués à la justice de Dieu."}],"bilan":"Ce second mouvement opère un retournement de ton : du réquisitoire indigné, La Boétie passe à une exhortation morale et religieuse. En appelant le lecteur à la vertu et en promettant un châtiment divin aux tyrans et à leurs complices, il fonde la défense de la liberté sur un ordre supérieur, transcendant la justice humaine défaillante."}],"conclusion":{"bilan":"Par un tableau polémique de la haine populaire puis une exhortation solennelle, La Boétie dénonce les complices indispensables de la tyrannie et appelle à la vertu sous le regard d'un Dieu juge. Le passage articule l'art de persuader — invective, accumulation, hyperbole — à une visée morale et religieuse qui place la défense de la liberté sous la garantie divine.","ouverture":"Ce double registre, satirique puis spirituel, fait du Discours une œuvre fondatrice de la pensée de la liberté, qui inspirera les Lumières et les penseurs de la résistance à l'oppression. On peut le rapprocher de l'apologue de La Fontaine, « Le Loup et le Chien », où la liberté, refusée par le loup au prix de la faim, est elle aussi posée comme un bien supérieur à toute servitude confortable."},"grammaire":{"question":"Dans la phrase « Apprenons donc pour une fois, apprenons à bien agir », analysez la forme verbale « Apprenons ».","reponse":"« Apprenons » est le verbe « apprendre », conjugué à la 1ère personne du pluriel de l'impératif présent (mode impératif). Sans sujet exprimé, comme l'exige l'impératif, il associe le locuteur à son auditoire dans une exhortation collective (« nous »). Sa fonction est celle du verbe principal de la proposition ; répété en anaphore, il exprime un ordre adouci en appel ou en encouragement à bien agir."}}];
const METHODO_HTML = "<h1>La méthode de l'oral — tout ce qui te fait gagner des points</h1><h2>1. La structure de l'épreuve (EAF 2026, voie générale)</h2><p>Épreuve <strong>notée sur 20, coefficient 5</strong>. Durée : <strong>20 minutes</strong>, précédées de <strong>30 minutes de préparation</strong>.</p><p><strong>Préparation (30 min)</strong> : à ton arrivée, l'examinateur choisit <strong>un texte</strong> parmi ceux de ton descriptif et t'indique la <strong>question de grammaire</strong>. Tu as 30 min, avec ton texte et un brouillon, pour préparer la lecture, l'explication linéaire et la grammaire.</p><p><strong>Première partie — 12 minutes (sur 12 points)</strong> :</p><ul><li><strong>Lecture expressive à voix haute</strong> du texte (après l'avoir brièvement situé). <strong>/2</strong></li><li><strong>Explication linéaire</strong> d'un passage d'environ 20 lignes. <strong>/8</strong></li><li><strong>Question de grammaire</strong> portant sur le texte (analyse syntaxique d'une courte phrase). <strong>/2</strong></li></ul><p><strong>Seconde partie — 8 minutes (sur 8 points)</strong> : <strong>entretien</strong> sur <strong>une œuvre que TU choisis</strong> (présentation + justification, puis échange). <strong>/8</strong></p><table><thead><tr><th>Composante</th><th>Points</th></tr></thead><tbody><tr><td>Lecture expressive</td><td>2</td></tr><tr><td>Explication linéaire</td><td>8</td></tr><tr><td>Question de grammaire</td><td>2</td></tr><tr><td><strong>Total 1ʳᵉ partie</strong></td><td><strong>12</strong></td></tr><tr><td>Entretien</td><td>8</td></tr><tr><td><strong>Total</strong></td><td><strong>20</strong></td></tr></tbody></table><h2>2. La méthode de l'explication linéaire</h2><p>L'explication <strong>suit l'ordre du texte</strong> (≠ commentaire thématique). C'est une faute de méthode majeure que de faire un plan thématique.</p><h3>L'introduction (à soigner — première impression)</h3><ol><li><strong>Amorce / accroche</strong> : une phrase d'entrée (mouvement littéraire, thème, place de l'auteur) qui mène au texte.</li><li><strong>Présentation</strong> : auteur + œuvre (date) + <strong>mouvement littéraire</strong> + <strong>objet d'étude</strong> + <strong>parcours</strong>.</li><li><strong>Situation précise</strong> du passage dans l'œuvre (ce qui précède, sa fonction).</li><li><strong>Lecture expressive</strong> (annoncée puis réalisée).</li><li><strong>Problématique</strong> : une question d'analyse précise (le fil rouge).</li><li><strong>Annonce des mouvements</strong> : le découpage du texte en 2-3 unités de sens.</li></ol><h3>La lecture expressive</h3><ul><li><strong>Articuler</strong>, poser la voix, prendre son temps ; respecter ponctuation et <strong>vers</strong> (e muets, diérèses, enjambements).</li><li>Faire entendre le <strong>sens</strong> : intonations, ruptures, registres. Une lecture vivante rapporte des points faciles.</li></ul><h3>Le développement (analyse linéaire)</h3><ul><li>Mouvement par mouvement, dans l'<strong>ordre du texte</strong>, avec un mini-bilan à la fin de chaque mouvement.</li><li>Pour chaque élément : <strong>CITATION → PROCÉDÉ → INTERPRÉTATION / EFFET</strong>.</li><li><strong>Fuir la paraphrase</strong> (erreur n°1) : ne pas redire le texte « en plus simple ». Passer du <em>quoi</em> au <em>comment</em> et au <em>pourquoi</em>. S'il ne reste qu'un résumé une fois les citations retirées, c'est de la paraphrase.</li></ul><h3>La conclusion</h3><ol><li><strong>Bilan</strong> : réponse synthétique et explicite à la <strong>problématique</strong>.</li><li><strong>Ouverture</strong> : élargissement <strong>pertinent et maîtrisé</strong> (autre texte de l'œuvre, du parcours, du même auteur ; lien avec l'objet d'étude).</li></ol><h2>3. Ce qui sépare un 14 d'un 20</h2><p><strong>Marqueurs d'excellence :</strong></p><ul><li><strong>Lecture vraiment expressive</strong> (posée, qui fait entendre le sens).</li><li><strong>Problématique fine et personnelle</strong>, vraiment reprise en conclusion.</li><li><strong>Procédés interprétés, pas seulement nommés</strong> : chaque repérage débouche sur un effet et un sens.</li><li><strong>Mouvements nets et justifiés</strong>, avec transitions et mini-bilans : l'explication progresse.</li><li><strong>Langue de qualité</strong> : lexique d'analyse précis, registre soutenu.</li><li><strong>Entretien convaincant</strong> : avis personnel argumenté, capacité à dialoguer et à rebondir.</li><li><strong>Temps maîtrisé</strong> et <strong>contact avec l'examinateur</strong> (regard, on s'adresse à lui, on ne lit pas son brouillon).</li></ul><p><strong>Erreurs qui coûtent cher :</strong></p><ul><li><strong>Paraphrase</strong> (la plus pénalisée).</li><li><strong>Plan thématique</strong> au lieu d'une analyse linéaire.</li><li><strong>Relevé de procédés sans interprétation</strong>.</li><li><strong>Lecture bâclée</strong>, trop rapide.</li><li><strong>Problématique</strong> absente, banale, ou jamais reprise.</li><li><strong>Intro négligée</strong> (auteur/œuvre/parcours oubliés ou faux).</li><li><strong>Contresens</strong> sur le sens global.</li><li><strong>Grammaire éludée</strong> (2 points faciles perdus).</li><li><strong>Entretien récité / impersonnel</strong> (œuvre mal connue, choix non justifié, réponses en monosyllabes).</li></ul><h2>4. La question de grammaire (2 points faciles)</h2><p><strong>Points au programme (analyse de la phrase) :</strong></p><ol><li><strong>Les propositions subordonnées</strong> : <strong>relatives</strong> (qui, que, dont, où… → complément de l'antécédent), <strong>conjonctives</strong> complétives (« que… », souvent COD) et <strong>circonstancielles</strong> (temps, cause, conséquence, but, condition, concession…), <strong>interrogatives indirectes</strong> (« je me demande <strong>s'il viendra</strong> »).</li><li><strong>La négation</strong> : totale / partielle, exceptive (ne… que), portée et valeurs.</li><li><strong>L'interrogation</strong> : totale / partielle, directe / indirecte, marques (inversion, « est-ce que », mots interrogatifs).</li></ol><p><strong>Méthode de réponse (à appliquer mécaniquement, au calme) :</strong></p><ol><li><strong>Lire</strong> le segment à voix haute et le <strong>délimiter</strong>.</li><li><strong>Identifier</strong> le mot subordonnant / le type d'interrogation ou de négation.</li><li><strong>Nommer la NATURE</strong> (ex. proposition subordonnée relative) <strong>et la FONCTION</strong> (ex. complément de l'antécédent « X » ; ou CC de cause du verbe « Y »).</li><li><strong>Justifier</strong> par l'observation (le subordonnant, l'antécédent, la place, une transformation possible).</li><li><strong>Conclure</strong> d'une phrase claire.</li></ol><h2>5. L'entretien (8 points — souvent sous-estimé)</h2><p><strong>Présenter l'œuvre que tu as choisie (≈ 2 min)</strong> : auteur, titre, genre, sujet en quelques phrases, intérêt ; puis <strong>justifier ton choix</strong> (résonance personnelle, personnage, thème, écriture, émotion). Un choix <strong>assumé et argumenté</strong> est le cœur de la note.</p><p><strong>Questions probables :</strong> sur un personnage, une scène clé, le sens, le genre ; sur ton <strong>ressenti</strong> (« qu'avez-vous préféré / le moins aimé ? ») ; de <strong>mise en relation</strong> (parcours, autre lecture, autre art) ; d'<strong>approfondissement</strong> pour tester ta solidité.</p><p><strong>Pour convaincre :</strong> connaître <strong>précisément</strong> l'œuvre (citer, situer), donner un <strong>avis nuancé</strong>, <strong>dialoguer</strong> (rebondir sans attendre d'être relancé), <strong>relier</strong> au parcours, <strong>occuper les 8 min</strong> avec aisance.</p><blockquote><strong>Astuce stratégie :</strong> choisis pour l'entretien l'une de tes 4 œuvres intégrales que tu connais le mieux — <em>On ne badine pas avec l'amour</em>, <em>La Peau de chagrin</em>, <em>Mes Forêts</em> ou le <em>Discours de la servitude volontaire</em>. Prépare 5-6 points d'ancrage + anticipe 5 questions.</blockquote><h2>6. Ton programme officiel 2026 (rappel)</h2><table><thead><tr><th>Objet d'étude</th><th>Ton œuvre intégrale</th><th>Parcours</th></tr></thead><tbody><tr><td><strong>Poésie</strong> (XIXᵉ-XXIᵉ)</td><td>Hélène Dorion, <em>Mes Forêts</em></td><td>La poésie, la nature, l'intime</td></tr><tr><td><strong>Roman</strong> (Moyen Âge-XXIᵉ)</td><td>Balzac, <em>La Peau de chagrin</em></td><td>Les romans de l'énergie : création et destruction</td></tr><tr><td><strong>Théâtre</strong> (XVIIᵉ-XXIᵉ)</td><td>Musset, <em>On ne badine pas avec l'amour</em></td><td>Les jeux du cœur et de la parole</td></tr><tr><td><strong>Littérature d'idées</strong> (XVIᵉ-XVIIIᵉ)</td><td>La Boétie, <em>Discours de la servitude volontaire</em></td><td>« Défendre » et « entretenir » la liberté</td></tr></tbody></table><blockquote>Tes autres textes (Molière, Tartuffe, La Princesse de Clèves, Baudelaire, Éluard, La Fontaine, Machiavel) sont des <strong>textes complémentaires</strong> rattachés à ces parcours. <em>Vérifie ce tableau sur ton descriptif officiel : c'est la reconstruction la plus probable d'après le programme national 2026.</em></blockquote><p><em>Sources : grilles et vademecums officiels des académies (Grenoble, Montpellier, Normandie, Strasbourg), programme national d'œuvres 2025-2026 (ac-paris), Annabac / L'Étudiant / Digischool — vérifiées juin 2026.</em></p>";
const PROCEDES_HTML = "<h1>Les procédés littéraires &amp; leurs effets</h1><blockquote><strong>Principe d'or</strong> : un procédé repéré ne vaut rien sans son EFFET. La colonne « effet / interprétation » est le cœur de l'analyse. À l'oral, on n'énumère jamais : on relie chaque procédé au SENS du texte et au projet de l'auteur.</blockquote><h2>1. Figures d'ANALOGIE (rapprocher deux réalités)</h2><table><thead><tr><th>Procédé</th><th>Définition</th><th>Exemple</th><th>Effet / interprétation type</th></tr></thead><tbody><tr><td><strong>Comparaison</strong></td><td>Rapproche deux éléments (comparé + comparant) à l'aide d'un <strong>outil de comparaison</strong> (<em>comme, tel, ainsi que, pareil à, ressembler à, on dirait</em>).</td><td>« La Terre est bleue <em>comme</em> une orange » (Éluard).</td><td>Rend une réalité abstraite plus <strong>concrète et visuelle</strong>, éclaire le comparé par le comparant. <em>Cela permet au lecteur de se représenter…, cela rapproche deux univers a priori étrangers.</em></td></tr><tr><td><strong>Métaphore</strong></td><td>Comparaison <strong>sans outil</strong> : identification directe du comparé et du comparant.</td><td>« Ce toit tranquille où marchent des colombes » (= la mer / les voiliers, Valéry).</td><td><strong>Condense</strong> l'image, crée une fusion saisissante. <em>Cela suggère une équivalence profonde, fait surgir un sens second, traduit la vision subjective de l'auteur.</em></td></tr><tr><td><strong>Métaphore filée</strong></td><td>Métaphore <strong>prolongée</strong> sur plusieurs mots, vers ou phrases, par un réseau d'images cohérent.</td><td>Filer la métaphore de la navigation pour évoquer l'amour.</td><td><strong>Structure</strong> tout un passage autour d'une image, crée une cohérence poétique. <em>Cela déploie l'image dans la durée et en fait le fil conducteur du texte.</em></td></tr><tr><td><strong>Personnification</strong></td><td>Attribue des <strong>traits humains</strong> (sentiments, actions, parole) à une chose, un animal, une idée.</td><td>« La nature pleure », « le vent gémit ».</td><td><strong>Anime</strong> et <strong>dramatise</strong> le décor, projette une émotion sur le monde. <em>Cela donne vie à…, traduit la communion (ou le conflit) entre l'homme et son environnement.</em></td></tr><tr><td><strong>Allégorie</strong></td><td>Représentation <strong>concrète et imagée</strong> d'une idée abstraite, souvent personnifiée (et majuscule).</td><td>« La Mort » figurée en faucheuse ; la Justice avec sa balance.</td><td><strong>Rend visible et mémorable</strong> une notion abstraite. <em>Cela incarne l'idée de…, donne corps à un concept pour mieux le faire comprendre ou redouter.</em></td></tr><tr><td><strong>Symbole</strong></td><td>Élément concret qui <strong>renvoie conventionnellement</strong> à une idée abstraite.</td><td>La colombe = la paix ; la balance = la justice ; la rose = l'amour fugace.</td><td><strong>Charge</strong> un objet d'une signification seconde. <em>Cela ouvre le texte à une lecture symbolique : au-delà de l'objet, l'auteur évoque…</em></td></tr></tbody></table><h2>2. Figures d'OPPOSITION (mettre en tension)</h2><table><thead><tr><th>Procédé</th><th>Définition</th><th>Exemple</th><th>Effet / interprétation type</th></tr></thead><tbody><tr><td><strong>Antithèse</strong></td><td>Rapprochement de deux termes/idées <strong>opposés</strong> dans une même phrase ou un même mouvement.</td><td>« Je vis, je meurs » (Louise Labé) ; « les uns rient, les autres pleurent ».</td><td><strong>Souligne un contraste</strong>, met en relief une opposition (sentiment, situation). <em>Cela traduit le déchirement intérieur, met en évidence l'écart entre deux mondes.</em></td></tr><tr><td><strong>Oxymore</strong></td><td>Réunion dans <strong>un même groupe de mots</strong> de deux termes <strong>contradictoires</strong>.</td><td>« Cette obscure clarté » (Corneille) ; « un silence assourdissant ».</td><td>Exprime une réalité <strong>paradoxale, indicible, déchirée</strong>. <em>Cela traduit une tension impossible à résoudre, suggère l'ambivalence d'un sentiment.</em></td></tr><tr><td><strong>Chiasme</strong></td><td>Croisement de termes selon un schéma <strong>AB / BA</strong> (effet de miroir).</td><td>« Il faut manger pour vivre et non vivre pour manger ».</td><td>Crée un <strong>effet de symétrie inversée</strong>, enferme une idée sur elle-même. <em>Cela met en valeur un renversement, souligne une équivalence ou une opposition par l'effet de boucle.</em></td></tr><tr><td><strong>Paradoxe</strong></td><td>Énoncé qui <strong>heurte le sens commun / la logique attendue</strong>.</td><td>« Les premiers seront les derniers ».</td><td><strong>Provoque la réflexion</strong>, surprend. <em>Cela force le lecteur à dépasser l'évidence, révèle une vérité cachée sous l'apparente contradiction.</em></td></tr><tr><td><strong>Antiphrase</strong></td><td>Dire le <strong>contraire</strong> de ce que l'on pense (mécanisme de base de l'ironie).</td><td>« C'est malin ! » (pour : c'est stupide).</td><td>Crée une <strong>distance critique</strong>, une moquerie. <em>Cela produit l'ironie, dénonce en feignant d'approuver.</em></td></tr></tbody></table><h2>3. Figures d'INSISTANCE / AMPLIFICATION (donner du poids, de l'ampleur)</h2><table><thead><tr><th>Procédé</th><th>Définition</th><th>Exemple</th><th>Effet / interprétation type</th></tr></thead><tbody><tr><td><strong>Hyperbole</strong></td><td><strong>Exagération</strong> dans l'expression.</td><td>« Mourir de rire », « un torrent de larmes », « mille fois ».</td><td><strong>Amplifie, dramatise ou rend comique</strong>. <em>Cela traduit l'intensité d'une émotion, grandit le héros (épique) ou tourne en ridicule (comique/satirique).</em></td></tr><tr><td><strong>Gradation ascendante</strong></td><td>Suite de termes d'intensité <strong>croissante</strong>.</td><td>« Va, cours, vole » (Corneille).</td><td>Crée une <strong>montée en puissance</strong>, un crescendo. <em>Cela traduit une émotion qui s'emballe, conduit le lecteur vers un sommet.</em></td></tr><tr><td><strong>Gradation descendante</strong></td><td>Suite de termes d'intensité <strong>décroissante</strong>.</td><td>Du grandiose au dérisoire.</td><td>Crée une <strong>chute, un effondrement, parfois une déception ou un effet comique</strong>. <em>Cela traduit le retombement, le délitement.</em></td></tr><tr><td><strong>Accumulation</strong></td><td><strong>Entassement</strong> de termes (souvent de même nature) pour saturer.</td><td>Listes d'objets, de qualités, de griefs.</td><td><strong>Donne une impression d'abondance, de profusion ou d'envahissement</strong>. <em>Cela suggère le foisonnement, l'excès, l'accablement.</em></td></tr><tr><td><strong>Énumération</strong></td><td>Liste <strong>ordonnée</strong> d'éléments (proche de l'accumulation, plus structurée).</td><td>« Il emporta livres, cartes, instruments, vivres ».</td><td><strong>Détaille et donne à voir</strong>, crée un effet de réel ou d'inventaire. <em>Cela balaie un ensemble, suggère l'exhaustivité.</em></td></tr><tr><td><strong>Anaphore</strong></td><td>Répétition d'un <strong>même mot/groupe en début</strong> de vers, de phrases ou de propositions.</td><td>« Paris ! Paris outragé ! Paris brisé ! Paris martyrisé ! » (de Gaulle).</td><td><strong>Martèle, scande, structure</strong> et rythme. <em>Cela insiste avec force, crée une obsession, donne une dimension incantatoire ou oratoire.</em></td></tr><tr><td><strong>Épiphore</strong></td><td>Répétition d'un même mot/groupe <strong>en fin</strong> de propositions.</td><td>« … pour vous, … pour vous, … pour vous ».</td><td><strong>Insiste en clôturant</strong>, crée un écho final. <em>Cela renforce l'idée par retour, fixe le mot-clé dans la mémoire.</em></td></tr><tr><td><strong>Répétition</strong></td><td>Reprise d'un même mot (sans position fixe).</td><td>« Ô temps, suspends ton vol ! … » avec retours de termes.</td><td><strong>Insiste, obsède, rythme</strong>. <em>Cela traduit une fixation, une émotion qui revient sans cesse.</em></td></tr><tr><td><strong>Polysyndète</strong></td><td>Multiplication des <strong>coordinations</strong> (<em>et… et… et…</em>).</td><td>« Et le ciel et la mer et les vents ».</td><td><strong>Ralentit et amplifie</strong>, donne une impression d'addition infinie. <em>Cela accentue la profusion, dilate le rythme.</em></td></tr><tr><td><strong>Pléonasme</strong></td><td>Redondance : terme qui <strong>répète une idée déjà contenue</strong>.</td><td>« Monter en haut », « je l'ai vu de mes propres yeux ».</td><td>Soit <strong>maladroit</strong>, soit <strong>expressif</strong> (insistance volontaire). <em>Quand il est voulu, cela renforce, appuie l'évidence par redondance.</em></td></tr><tr><td><strong>Hypotypose</strong></td><td>Description si <strong>vive et frappante</strong> qu'elle donne l'illusion d'assister à la scène.</td><td>Récit de bataille rendu visuel, présent de narration, détails sensoriels.</td><td><strong>Rend la scène présente, immédiate, spectaculaire</strong>. <em>Cela plonge le lecteur dans l'action, crée une saisissante illusion de réel.</em></td></tr></tbody></table><h2>4. Figures d'ATTÉNUATION (dire moins pour suggérer)</h2><table><thead><tr><th>Procédé</th><th>Définition</th><th>Exemple</th><th>Effet / interprétation type</th></tr></thead><tbody><tr><td><strong>Litote</strong></td><td>Dire <strong>moins pour suggérer plus</strong> (souvent par la négation du contraire).</td><td>« Va, je ne te hais point » (= je t'aime, Corneille).</td><td><strong>Suggère avec pudeur ou force discrète</strong>. <em>Cela atténue la forme mais renforce le sens, traduit la retenue, la pudeur ou l'ironie.</em></td></tr><tr><td><strong>Euphémisme</strong></td><td>Adoucir une réalité <strong>brutale ou choquante</strong> par une formulation détournée.</td><td>« Il nous a quittés » (= il est mort) ; « un demandeur d'emploi ».</td><td><strong>Voile une réalité pénible</strong>. <em>Cela traduit la délicatesse, la convenance sociale, ou masque pudiquement le tragique.</em></td></tr></tbody></table><h2>5. Figures de SUBSTITUTION (désigner autrement)</h2><table><thead><tr><th>Procédé</th><th>Définition</th><th>Exemple</th><th>Effet / interprétation type</th></tr></thead><tbody><tr><td><strong>Métonymie</strong></td><td>Désigner une chose par un terme <strong>lié logiquement</strong> (contenant/contenu, cause/effet, auteur/œuvre, lieu/institution).</td><td>« Boire un verre » ; « lire un Zola » ; « l'Élysée a décidé ».</td><td><strong>Condense et image</strong> l'expression. <em>Cela crée un raccourci expressif, suggère un lien de proximité, dynamise la phrase.</em></td></tr><tr><td><strong>Synecdoque</strong></td><td>Cas particulier de métonymie : <strong>la partie pour le tout</strong> (ou inverse).</td><td>« Une voile » (= un navire) ; « gagner son pain ».</td><td><strong>Met en relief un détail signifiant</strong>. <em>Cela focalise l'attention sur un élément représentatif, valorise une partie pour évoquer le tout.</em></td></tr><tr><td><strong>Périphrase</strong></td><td>Remplacer un mot par une <strong>expression qui le décrit</strong>.</td><td>« L'astre du jour » (= le soleil) ; « la Ville Lumière » (= Paris).</td><td><strong>Met en valeur une qualité, évite la répétition, crée un effet poétique ou précieux</strong>. <em>Cela souligne tel trait de l'objet désigné.</em></td></tr><tr><td><strong>Antonomase</strong></td><td>Employer un <strong>nom propre pour un nom commun</strong> (ou l'inverse).</td><td>« Un harpagon » (= un avare) ; « un don Juan » (= un séducteur).</td><td><strong>Érige un personnage en type</strong>, généralise. <em>Cela renvoie à un modèle culturel partagé, caractérise d'un seul mot.</em></td></tr></tbody></table><h2>6. SONORITÉS (le travail du signifiant)</h2><blockquote><strong>Règle de prudence</strong> : une sonorité ne « veut » rien dire en soi. Son effet dépend TOUJOURS du sens des mots qu'elle relie. On dit « <em>l'allitération en [s] accompagne / souligne / mime…</em> ».</blockquote><table><thead><tr><th>Procédé</th><th>Définition</th><th>Exemple</th><th>Effet / interprétation type</th></tr></thead><tbody><tr><td><strong>Allitération</strong></td><td>Répétition d'un même <strong>son consonantique</strong>.</td><td>« Pour qui sont ces <strong>s</strong>erpent<strong>s</strong> qui <strong>s</strong>ifflent sur vos têtes ? » (Racine).</td><td><strong>Crée un effet sonore qui appuie le sens</strong> (sifflement, dureté, douceur…). <em>Ici l'allitération en [s] mime le sifflement des serpents.</em></td></tr><tr><td><strong>Assonance</strong></td><td>Répétition d'un même <strong>son vocalique</strong>.</td><td>Retour du son [ã] ou [u] dans un vers.</td><td><strong>Crée une musicalité, une tonalité dominante</strong>. <em>Cela installe une harmonie (douceur en [u], nasalité mélancolique en [ã]…).</em></td></tr><tr><td><strong>Paronomase</strong></td><td>Rapprochement de mots aux <strong>sonorités proches</strong> mais au sens différent.</td><td>« Qui se ressemble s'assemble » ; « traduttore, traditore ».</td><td><strong>Crée un jeu sonore et un rapprochement de sens</strong>. <em>Cela suggère un lien malicieux ou profond entre deux notions.</em></td></tr><tr><td><strong>Homéotéleute</strong></td><td>Répétition d'une <strong>même terminaison</strong> sonore (en prose ou à l'intérieur du vers).</td><td>« Il pleut, il vente, il tonne, il tempête ».</td><td><strong>Crée un écho rythmique et sonore</strong>. <em>Cela lie les mots, renforce un effet de série ou de martèlement.</em></td></tr><tr><td><strong>Harmonie imitative</strong></td><td>Les sons <strong>imitent ce qu'ils décrivent</strong> (≈ onomatopée étendue).</td><td>« Le long du clair ruisseau » (fluidité) ; bruits de l'eau, du vent.</td><td><strong>Le son mime le réel évoqué</strong>. <em>Cela renforce l'illusion sensorielle, fait « entendre » la scène.</em></td></tr></tbody></table><h2>7. LEXIQUE &amp; CONNOTATIONS (le choix des mots)</h2><table><thead><tr><th>Notion</th><th>Définition</th><th>Exemple</th><th>Effet / interprétation type</th></tr></thead><tbody><tr><td><strong>Champ lexical</strong></td><td>Ensemble de mots se rapportant à <strong>une même notion</strong>.</td><td>Champ lexical de la mort : <em>tombe, deuil, cercueil, néant…</em></td><td><strong>Révèle le thème dominant</strong> d'un passage. <em>La présence massive du champ lexical de… traduit l'obsession / l'atmosphère / l'enjeu central du texte.</em></td></tr><tr><td><strong>Réseau lexical</strong></td><td>Plusieurs champs lexicaux <strong>entrelacés</strong> qui se répondent.</td><td>Réseaux de l'eau + de la mort qui se mêlent.</td><td><strong>Tisse une cohérence thématique complexe</strong>. <em>Cela superpose plusieurs sens et enrichit la lecture.</em></td></tr><tr><td><strong>Registres de langue</strong></td><td>Niveau du langage : <strong>soutenu / courant / familier (voire vulgaire)</strong>.</td><td>Soutenu : <em>« nonobstant »</em> ; familier : <em>« un truc »</em>, <em>« bouffer »</em>.</td><td><strong>Caractérise un personnage, un milieu social, une tonalité</strong>. <em>Le registre familier rapproche / fait sourire ; le soutenu ennoblit ou crée une distance.</em></td></tr><tr><td><strong>Dénotation</strong></td><td>Sens <strong>objectif, premier</strong>, du dictionnaire.</td><td>« Rouge » = couleur du sang.</td><td>Sert de base neutre. <em>Le sens littéral pose le décor avant que la connotation ne l'oriente.</em></td></tr><tr><td><strong>Connotation</strong></td><td>Sens <strong>second, subjectif, culturel</strong>, associé à un mot.</td><td>« Rouge » → passion, danger, révolution.</td><td><strong>Charge le mot d'affect et de symbole</strong>. <em>Cela oriente la lecture, suggère au-delà du sens premier.</em></td></tr><tr><td><strong>Termes mélioratifs</strong></td><td>Mots à <strong>valeur positive, valorisante</strong>.</td><td><em>splendide, généreux, lumineux</em>.</td><td><strong>Valorisent</strong> l'objet/le personnage, traduisent l'admiration. <em>Cela révèle le regard élogieux du locuteur.</em></td></tr><tr><td><strong>Termes péjoratifs</strong></td><td>Mots à <strong>valeur négative, dépréciative</strong>.</td><td><em>minable, infect, grouillant</em>.</td><td><strong>Dévalorisent</strong>, traduisent le mépris, le dégoût, la satire. <em>Cela révèle un jugement critique ou hostile.</em></td></tr></tbody></table><h2>8. SYNTAXE &amp; RYTHME (l'agencement de la phrase)</h2><table><thead><tr><th>Procédé</th><th>Définition</th><th>Exemple</th><th>Effet / interprétation type</th></tr></thead><tbody><tr><td><strong>Parallélisme</strong></td><td>Reprise d'une <strong>même construction syntaxique</strong> dans deux segments.</td><td>« Tel père, tel fils » ; « Partir tôt, arriver tard ».</td><td><strong>Crée une symétrie, une harmonie ou une mise en regard</strong>. <em>Cela rapproche / oppose deux idées par leur structure jumelle.</em></td></tr><tr><td><strong>Asyndète</strong></td><td><strong>Absence</strong> de mots de liaison entre propositions (juxtaposition).</td><td>« Je vins, je vis, je vainquis ».</td><td><strong>Accélère, condense, donne de la vivacité</strong>. <em>Cela traduit la rapidité, l'évidence, l'enchaînement brutal.</em></td></tr><tr><td><strong>Parataxe</strong></td><td>Propositions <strong>juxtaposées ou coordonnées</strong>, sans subordination.</td><td>« Il pleuvait. Nous sommes rentrés. »</td><td><strong>Style sec, oral, rapide ou brut</strong>. <em>Cela traduit la simplicité, l'immédiateté, parfois la rudesse.</em></td></tr><tr><td><strong>Hypotaxe</strong></td><td>Phrases à <strong>subordination développée</strong> (style ample, hiérarchisé).</td><td>Longue période avec relatives et circonstancielles enchâssées.</td><td><strong>Style élaboré, complexe, raisonné</strong>. <em>Cela traduit la maîtrise, la nuance, la pensée qui se déploie.</em></td></tr><tr><td><strong>Rythme binaire</strong></td><td>Phrase/vers en <strong>deux temps</strong> équilibrés.</td><td>« Le travail / et la peine ».</td><td><strong>Équilibre, balancement, harmonie</strong>. <em>Cela crée une stabilité, une opposition mesurée.</em></td></tr><tr><td><strong>Rythme ternaire</strong></td><td>Phrase/vers en <strong>trois temps</strong>.</td><td>« Le sang, la sueur et les larmes ».</td><td><strong>Ampleur, plénitude, effet oratoire</strong>. <em>Cela donne une impression de totalité et d'élan.</em></td></tr><tr><td><strong>Phrase nominale</strong></td><td>Phrase <strong>sans verbe conjugué</strong>.</td><td>« Silence. La nuit. Plus rien. »</td><td><strong>Fige, condense, frappe</strong>. <em>Cela crée un arrêt sur image, accentue l'instantané ou l'émotion brute.</em></td></tr><tr><td><strong>Inversion</strong></td><td>Ordre des mots <strong>bousculé</strong> (sujet/verbe, complément antéposé).</td><td>« Sonnez, sonnez toujours, clairons » ; « Grande fut sa surprise ».</td><td><strong>Met en relief un mot, crée un effet poétique ou oratoire</strong>. <em>Cela attire l'attention sur l'élément déplacé.</em></td></tr><tr><td><strong>Ponctuation expressive</strong></td><td>Usage marqué de <strong>! ? … — ;</strong> ou absence de ponctuation.</td><td>Points de suspension, tirets, exclamations.</td><td><strong>Traduit l'émotion, l'hésitation, la rupture</strong>. <em>Les points de suspension suggèrent le non-dit ; l'exclamation l'emportement.</em></td></tr><tr><td><strong>Phrase longue vs courte</strong></td><td>Contraste de <strong>longueur</strong> entre phrases.</td><td>Longue période suivie d'une phrase brève.</td><td><strong>Crée un rythme signifiant</strong>. <em>La phrase longue dilate (rêverie, ampleur) ; la phrase courte frappe (choc, chute, urgence).</em></td></tr></tbody></table><h2>9. ÉNONCIATION &amp; MODALITÉS (qui parle, comment, à qui)</h2><table><thead><tr><th>Procédé</th><th>Définition</th><th>Exemple</th><th>Effet / interprétation type</th></tr></thead><tbody><tr><td><strong>Phrase déclarative</strong></td><td>Énonce, affirme, constate (point final).</td><td>« La nuit to
