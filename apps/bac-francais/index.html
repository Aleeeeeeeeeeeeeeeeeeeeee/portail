<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Révisions — Bac de Français Oral 2026</title>
<style>
:root{
  --bg:#14110f; --bg-2:#1b1714; --bg-3:#231d18; --bg-card:#1e1916;
  --ink:#efe7db; --ink-soft:#bcae9c; --ink-faint:#8a7c6c;
  --line:rgba(239,231,219,.10); --line-strong:rgba(239,231,219,.18);
  --accent:#cdab68; --accent-2:#b98a4d; --accent-soft:rgba(205,171,104,.14);
  --burgundy:#a3475a; --good:#7fae84; --warn:#d9a05b; --bad:#cf6a5a;
  --theatre:#d2744f; --roman:#74a596; --poesie:#9a83bd; --idees:#cba646;
  --shadow:0 18px 50px -22px rgba(0,0,0,.7);
  --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --maxw:980px; --headerH:104px;
}
:root.light{
  --bg:#f4efe6; --bg-2:#fbf7f0; --bg-3:#efe8da; --bg-card:#fffdf9;
  --ink:#2a231c; --ink-soft:#5b5043; --ink-faint:#8a7d6c;
  --line:rgba(40,32,24,.12); --line-strong:rgba(40,32,24,.2);
  --accent:#9c7322; --accent-2:#b98a4d; --accent-soft:rgba(156,115,34,.12);
  --shadow:0 16px 40px -24px rgba(80,60,30,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink); font-family:var(--sans);
  line-height:1.6; font-size:16px; -webkit-font-smoothing:antialiased; overflow-wrap:break-word;
  background-image:radial-gradient(1200px 600px at 80% -10%,rgba(205,171,104,.06),transparent 60%),radial-gradient(900px 500px at -10% 10%,rgba(163,71,90,.05),transparent 55%);
  background-attachment:fixed; min-height:100vh;
}
a{color:var(--accent);text-decoration:none}
::selection{background:var(--accent-soft)}
/* header */
header.top{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);
  background:linear-gradient(to bottom,rgba(20,17,15,.92),rgba(20,17,15,.78));
  border-bottom:1px solid var(--line)}
:root.light header.top{background:linear-gradient(to bottom,rgba(251,247,240,.95),rgba(251,247,240,.8))}
.top-inner{max-width:1100px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:baseline;gap:10px;font-family:var(--serif);min-width:0;flex:0 1 auto}
.brand .b1{font-size:19px;font-weight:600;letter-spacing:.2px;white-space:nowrap}
.brand .b2{font-size:12px;color:var(--ink-faint);letter-spacing:2px;text-transform:uppercase;font-family:var(--sans);white-space:nowrap}
.spacer{flex:1}
.count-badge{display:flex;flex-direction:column;align-items:flex-end;line-height:1.1;cursor:pointer}
.count-badge .big{font-family:var(--serif);font-size:22px;color:var(--accent);font-weight:600}
.count-badge .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-faint)}
.icon-btn{background:var(--bg-3);border:1px solid var(--line);color:var(--ink-soft);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:16px;display:grid;place-items:center;transition:.2s}
.icon-btn:hover{color:var(--ink);border-color:var(--line-strong)}
/* nav */
nav.pills{max-width:1100px;margin:0 auto;padding:0 14px 10px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
nav.pills::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:9px 16px;border-radius:999px;border:1px solid var(--line);background:var(--bg-2);color:var(--ink-soft);cursor:pointer;font-size:14px;font-weight:500;transition:.2s;flex:0 0 auto}
.pill:hover{color:var(--ink);border-color:var(--line-strong)}
.pill.active{background:var(--accent);color:#1a1410;border-color:var(--accent);font-weight:600}
/* layout */
main{max-width:var(--maxw);margin:0 auto;padding:32px 20px 90px}
.view{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
h1,h2,h3,h4{font-family:var(--serif);line-height:1.2;font-weight:600}
.eyebrow{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);font-weight:600;font-family:var(--sans);margin-bottom:8px}
.muted{color:var(--ink-soft)}
.faint{color:var(--ink-faint)}
/* dashboard */
.hero{background:linear-gradient(135deg,var(--bg-2),var(--bg-3));border:1px solid var(--line);border-radius:20px;padding:34px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;background:radial-gradient(circle,var(--accent-soft),transparent 70%)}
.hero h1{font-size:clamp(26px,4.5vw,40px);margin:.1em 0 .25em}
.hero p{color:var(--ink-soft);max-width:60ch;margin:0}
.cd-row{display:flex;gap:26px;margin-top:24px;flex-wrap:wrap}
.cd-stat .n{font-family:var(--serif);font-size:34px;color:var(--accent);font-weight:600;line-height:1}
.cd-stat .l{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-faint);margin-top:4px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
@media(max-width:720px){.g2,.g3{grid-template-columns:1fr}}
.section-title{display:flex;align-items:center;gap:12px;margin:38px 0 16px}
.section-title h2{font-size:22px;margin:0}
.section-title .ln{flex:1;height:1px;background:var(--line)}
.card{background:var(--bg-card);border:1px solid var(--line);border-radius:16px;padding:20px;transition:.22s;box-shadow:var(--shadow)}
.card.click{cursor:pointer}
.card.click:hover{transform:translateY(-3px);border-color:var(--line-strong)}
.rule-card{display:flex;gap:14px;align-items:flex-start}
.rule-card .ic{font-size:22px;flex:0 0 auto;width:42px;height:42px;border-radius:12px;background:var(--accent-soft);display:grid;place-items:center}
.rule-card h4{margin:0 0 4px;font-size:16px}
.rule-card p{margin:0;font-size:14px;color:var(--ink-soft)}
/* objet pill colors */
.obj-tag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.o-theatre{color:var(--theatre)} .dot.o-theatre{background:var(--theatre)}
.o-roman{color:var(--roman)} .dot.o-roman{background:var(--roman)}
.o-poesie{color:var(--poesie)} .dot.o-poesie{background:var(--poesie)}
.o-idees{color:var(--idees)} .dot.o-idees{background:var(--idees)}
/* text card */
.tcard{position:relative;border-left:3px solid var(--bord,var(--accent))}
.tcard h3{font-size:18px;margin:.35em 0 .15em}
.tcard .ref{font-size:13px;color:var(--ink-faint)}
.tcard .flash{font-size:14px;color:var(--ink-soft);margin:10px 0 0}
.badge{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:1px solid var(--line-strong);color:var(--ink-soft)}
.badge.oi{background:var(--accent);color:#1a1410;border-color:var(--accent)}
.statusdot{position:absolute;top:16px;right:16px;font-size:12px}
.chk{color:var(--good)}
/* detail */
.detail-head{margin-bottom:22px}
.detail-head .au{font-family:var(--serif);font-size:clamp(24px,4vw,34px);font-weight:600;margin:6px 0 2px}
.detail-head .ti{font-size:18px;color:var(--ink-soft);font-style:italic;font-family:var(--serif)}
.meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.meta-row .m{font-size:12px;padding:5px 11px;border-radius:8px;background:var(--bg-3);border:1px solid var(--line);color:var(--ink-soft)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:18px 0 6px;position:sticky;top:var(--headerH);z-index:10;background:linear-gradient(var(--bg),var(--bg) 70%,transparent);padding:8px 0}
.btn{padding:9px 15px;border-radius:10px;border:1px solid var(--line-strong);background:var(--bg-3);color:var(--ink);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--sans);transition:.2s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#1a1410;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-2);color:#1a1410}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.block{margin:22px 0;scroll-margin-top:calc(var(--headerH) + 14px)}
.block-label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}
.intro-part{margin:10px 0}
.intro-part .k{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink-faint);font-weight:700}
.intro-part .v{font-family:var(--serif);font-size:16.5px;line-height:1.65}
.pb{background:linear-gradient(var(--accent-soft),var(--accent-soft));border:1px solid rgba(205,171,104,.35);border-radius:12px;padding:16px 18px}
.pb .v{color:var(--ink);font-style:italic}
.callout{background:var(--bg-2);border:1px solid var(--line);border-left:3px solid var(--burgundy);border-radius:10px;padding:14px 16px;font-size:14.5px;color:var(--ink-soft)}
.callout .k{color:var(--burgundy);font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px}
.mv{margin:18px 0;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--bg-card)}
.mv-h{padding:14px 18px;background:var(--bg-3);font-family:var(--serif);font-weight:600;font-size:16px;border-bottom:1px solid var(--line)}
.mv-body{padding:8px 18px 16px}
.ana{padding:14px 0;border-bottom:1px dashed var(--line)}
.ana:last-child{border-bottom:none}
.ana .cit{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink);line-height:1.5}
.ana .pr{display:inline-block;margin:8px 0 6px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:3px 10px;border-radius:6px}
.ana .ef{font-size:14.5px;color:var(--ink-soft);margin:0}
.ana.hide-ef .ef,.ana.hide-ef .pr{filter:blur(5px);opacity:.55;cursor:pointer;user-select:none;transition:.2s}
.ana.hide-ef.reveal .ef,.ana.hide-ef.reveal .pr{filter:none;opacity:1}
.mv-bilan{margin-top:12px;font-size:14px;color:var(--ink-soft);background:var(--bg-2);border-radius:8px;padding:10px 14px}
.mv-bilan b{color:var(--accent);font-weight:700}
details.gram{margin-top:8px;border:1px solid var(--line);border-radius:10px;background:var(--bg-card);overflow:hidden}
details.gram summary{padding:14px 18px;cursor:pointer;font-weight:600;font-family:var(--serif);list-style:none}
details.gram summary::-webkit-details-marker{display:none}
details.gram summary::before{content:"▸ ";color:var(--accent)}
details.gram[open] summary::before{content:"▾ "}
details.gram .gbody{padding:0 18px 16px}
.gq{font-style:italic;color:var(--ink);font-family:var(--serif);margin-bottom:10px}
.nav-prevnext{display:flex;justify-content:space-between;gap:10px;margin-top:30px;flex-wrap:wrap}
/* flashcards */
.fc-setup{text-align:center;padding:10px 0 24px}
.select{padding:10px 14px;border-radius:10px;border:1px solid var(--line-strong);background:var(--bg-3);color:var(--ink);font-size:14px;font-family:var(--sans);max-width:100%}
.flashwrap{max-width:560px;margin:0 auto}
.flashcard{perspective:1600px;height:360px;margin:18px 0;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.flashcard.flip .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;border:1px solid var(--line-strong);background:var(--bg-card);box-shadow:var(--shadow);padding:46px 22px 28px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;overflow-y:auto}
.fc-back{transform:rotateY(180deg)}
.fc-kind{position:absolute;top:14px;left:18px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.fc-tref{position:absolute;top:14px;right:18px;font-size:11px;color:var(--ink-faint)}
.fc-front .q{font-family:var(--serif);font-size:21px;font-style:italic;line-height:1.45;overflow-wrap:break-word}
.fc-hint{position:absolute;bottom:16px;left:0;right:0;font-size:12px;color:var(--ink-faint)}
.fc-back .pr{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:4px 12px;border-radius:7px;margin-bottom:14px}
.fc-back .a{font-size:17px;color:var(--ink);line-height:1.55}
.fc-back .a.plan{text-align:left;font-size:15px}
.fc-actions{display:flex;gap:10px;justify-content:center;margin-top:6px}
.fc-actions .btn{flex:1;max-width:150px}
.fc-progress{text-align:center;color:var(--ink-faint);font-size:13px;margin-top:14px}
.pilebar{display:flex;gap:6px;justify-content:center;margin-top:10px;font-size:12px}
.pilebar span{padding:3px 10px;border-radius:999px;border:1px solid var(--line)}
/* quiz */
.quiz-q{font-family:var(--serif);font-size:20px;margin:6px 0 18px}
.opt{display:block;width:100%;text-align:left;padding:14px 16px;margin:9px 0;border-radius:12px;border:1px solid var(--line-strong);background:var(--bg-card);color:var(--ink);cursor:pointer;font-size:15px;transition:.15s}
.opt:hover{border-color:var(--accent)}
.opt.correct{background:rgba(127,174,132,.16);border-color:var(--good);color:var(--ink)}
.opt.wrong{background:rgba(207,106,90,.14);border-color:var(--bad)}
.opt:disabled{cursor:default}
.qexpl{margin:14px 0;padding:14px 16px;border-radius:10px;background:var(--bg-2);border-left:3px solid var(--accent);font-size:14.5px;color:var(--ink-soft)}
.scorebig{font-family:var(--serif);font-size:54px;color:var(--accent);text-align:center}
/* prose (rendered markdown) */
.prose{font-size:16px;line-height:1.7}
.prose h1{font-size:30px;margin:.2em 0 .5em}
.prose h2{font-size:23px;margin:1.4em 0 .5em;padding-bottom:.25em;border-bottom:1px solid var(--line)}
.prose h3{font-size:18px;margin:1.2em 0 .4em;color:var(--accent)}
.prose p{margin:.7em 0}
.prose ul,.prose ol{padding-left:1.3em;margin:.6em 0}
.prose li{margin:.35em 0}
.prose strong{color:var(--ink);font-weight:700}
.prose em{color:var(--ink-soft)}
.prose code{background:var(--bg-3);padding:1px 6px;border-radius:5px;font-size:.9em;color:var(--accent)}
.prose blockquote{margin:1em 0;padding:12px 18px;border-left:3px solid var(--accent);background:var(--bg-2);border-radius:0 10px 10px 0;color:var(--ink-soft)}
.prose table{width:100%;border-collapse:collapse;margin:1em 0;font-size:14px;display:block;overflow-x:auto}
.prose th,.prose td{border:1px solid var(--line);padding:9px 12px;text-align:left;vertical-align:top}
.prose th{background:var(--bg-3);color:var(--ink);font-weight:700}
.prose tr:nth-child(even) td{background:rgba(255,255,255,.012)}
.searchbar{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--line-strong);background:var(--bg-3);color:var(--ink);font-size:15px;margin-bottom:10px}
/* planning checklist */
.pl-day{border:1px solid var(--line);border-radius:14px;margin:14px 0;overflow:hidden;background:var(--bg-card)}
.pl-day h3{margin:0;padding:14px 18px;background:var(--bg-3);font-size:17px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.pl-day .tag{font-size:11px;color:var(--ink-faint);font-family:var(--sans);font-weight:600}
.pl-task{display:flex;gap:12px;align-items:flex-start;padding:11px 18px;border-bottom:1px dashed var(--line);cursor:pointer}
.pl-task:last-child{border-bottom:none}
.pl-task .cb{flex:0 0 auto;width:20px;height:20px;border-radius:6px;border:2px solid var(--line-strong);margin-top:2px;display:grid;place-items:center;transition:.15s}
.pl-task.done .cb{background:var(--good);border-color:var(--good);color:#11140f}
.pl-task.done .tx{color:var(--ink-faint);text-decoration:line-through}
.pl-task .tx{font-size:14.5px}
.progressbar{height:8px;border-radius:999px;background:var(--bg-3);overflow:hidden;margin:6px 0 0}
.progressbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-2),var(--accent));width:0;transition:.4s}
/* misc */
.footer{text-align:center;color:var(--ink-faint);font-size:12.5px;margin-top:50px;padding-top:20px;border-top:1px solid var(--line)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-3);border:1px solid var(--line-strong);color:var(--ink);padding:12px 20px;border-radius:12px;box-shadow:var(--shadow);opacity:0;transition:.3s;z-index:100;font-size:14px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.kbd{font-size:11px;border:1px solid var(--line-strong);border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--ink-soft);background:var(--bg-3)}
@media(max-width:600px){
  main{padding:24px 14px 90px}.hero{padding:24px}
  .top-inner{padding:11px 14px;gap:10px}
  .brand .b1{font-size:17px}
  .count-badge .big{font-size:19px}
  .hero h1{font-size:27px}
  .detail-head .au{font-size:25px}
  .flashcard{height:340px}
  .fc-front .q{font-size:19px}
  #fcScope{width:100%;margin:0 0 10px}
  #fcStart{width:100%;margin-left:0}
}
@media(max-width:380px){ .brand .b2{display:none} }
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand"><span class="b1">Bac de Français</span><span class="b2">Oral 2026</span></div>
    <div class="spacer"></div>
    <div class="count-badge" id="countBadge" title="Cliquer pour régler la date de l'oral">
      <span class="big" id="cdNum">–</span><span class="lbl" id="cdLbl">jours restants</span>
    </div>
    <button class="icon-btn" id="themeBtn" title="Thème clair / sombre">☾</button>
  </div>
  <nav class="pills" id="nav"></nav>
</header>
<main id="app"></main>
<div class="toast" id="toast"></div>

<script>
/* ============ DATA (injected at build) ============ */
const TEXTES = [{"id":"moliere-malade-imaginaire-acte1-scene7-testament","auteur":"Molière","titre":"Le Malade imaginaire","reference":"Acte I scène 7","date":"1673","objet":"Le théâtre du XVIIᵉ siècle au XXIᵉ siècle","parcours":"Les jeux du cœur et de la parole","statut":"Texte complémentaire","mouvementLitteraire":"Classicisme (comédie)","resumeFlash":"Sous le masque de la tendresse éplorée, Béline et le notaire manœuvrent pour capter l'héritage d'Argan, hypocondriaque aveuglé qui se croit aimé alors qu'il est dépouillé.","intro":{"amorce":"Le théâtre classique fait de la comédie une arme de dénonciation : derrière le rire, Molière démasque les imposteurs qui exploitent la crédulité d'autrui. La parole, loin de dire le cœur, devient un instrument de manipulation.","presentationAuteurOeuvre":"Jean-Baptiste Poquelin, dit Molière (1622-1673), comédien et dramaturge du Grand Siècle, est le maître de la comédie classique sous le règne de Louis XIV. Fidèle à la devise « castigat ridendo mores » (corriger les mœurs par le rire), il met la peinture des caractères et des vices au service d'une satire morale et sociale. Le Malade imaginaire, sa dernière comédie-ballet créée en 1673, l'année même de sa mort, met en scène Argan, hypocondriaque obsédé par sa santé, manipulé par les médecins et par sa seconde épouse Béline.","situation":"À l'acte I, scène 7, Argan, persuadé d'être mourant, a fait venir un notaire pour rédiger un testament en faveur de Béline et déshériter ses propres filles. La scène met face à face un trio : le mari crédule, l'épouse intéressée jouant la tendresse, et le notaire complice qui détourne la loi.","problematique":"Comment Molière dévoile-t-il, par les jeux de la parole, l'hypocrisie d'une fausse tendresse et la manipulation d'une captation d'héritage ?","annonceMouvements":"Le texte s'organise en trois mouvements : d'abord la leçon de fraude du notaire (l. 1 à 14), puis la comédie larmoyante de Béline (l. 15 à 29), enfin le piège qui se referme sur Argan, dépouillé en croyant donner (l. 30 à 43)."},"conseilLecture":"Faire entendre le contraste des voix : le notaire, froid et technique, débitant ses formules juridiques comme une recette ; Béline, mielleuse et théâtrale, multipliant les sanglots feints et les hyperboles ; Argan, attendri et aveugle, ponctuant la scène de ses tendres « Mamie ! », « Mamour ! ». Le comique naît de ce décalage que la voix doit souligner : plus Béline pleure, plus l'auditeur entend la cupidité.","mouvements":[{"titre":"Premier mouvement : la leçon de fraude du notaire (l. 1 à 14)","analyse":[{"citation":"« Comment puis-je faire, s'il vous plaît, pour lui donner mon bien, et en frustrer mes enfants? »","procede":"Interrogation directe et antithèse entre « donner » (à Béline) et « frustrer » (les enfants), avec le verbe péjoratif « frustrer »","effet":"Argan formule lui-même, naïvement, un projet immoral : déshériter ses filles. La double énonciation joue à plein : ce qu'Argan prend pour une démarche légitime, le spectateur le perçoit comme une injustice scandaleuse. Molière installe d'emblée la dimension satirique."},{"citation":"« Vous pouvez choisir doucement un ami intime de votre femme, auquel vous donnerez en bonne forme par votre testament »","procede":"Adverbe « doucement », locution juridique « en bonne forme » ; lexique du droit détourné","effet":"Le notaire enseigne à contourner la loi tout en respectant ses formes : l'oxymore moral entre la légalité de la « bonne forme » et l'illégalité du procédé révèle la corruption de l'homme de loi. La parole juridique devient un masque de l'escroquerie."},{"citation":"« Vous pouvez encore contracter un grand nombre d'obligations, non suspectes, au profit de divers créanciers, qui prêteront leur nom à votre femme »","procede":"Accumulation de stratagèmes introduits par l'anaphore « Vous pouvez… Vous pouvez encore… Vous pouvez aussi » ; lexique technique (« obligations », « créanciers », « déclaration »)","effet":"L'anaphore donne au notaire le débit mécanique d'un expert récitant un catalogue de fraudes. Le jargon, opaque pour Argan comme pour le spectateur, mime l'écran de fumée derrière lequel se cache la malhonnêteté. Molière fait du langage du droit l'instrument même du vol."},{"citation":"« des billets que vous pourrez avoir, payables au porteur »","procede":"Précision technique « payables au porteur » ; détail concret semé comme une amorce","effet":"Cette formule, qui rend un titre transmissible à quiconque le détient, prépare le piège : elle ressurgira plus loin quand Argan voudra remettre ses billets à Béline. Molière dispose ici, dans le langage notarial, le mécanisme dramatique de la captation."},{"citation":"« non suspectes »","procede":"Litote / euphémisme juridique","effet":"L'expression avoue, en creux, que les opérations le sont précisément, suspectes : le notaire conseille de maquiller la fraude pour qu'elle paraisse régulière. Le comique de mots repose sur cet aveu involontaire qui démasque le complice."}],"bilan":"Dès l'ouverture, la parole n'exprime aucun sentiment : elle est pur calcul. Le notaire, figure satirique de l'homme de loi vénal, met son savoir au service d'une escroquerie, et Argan, aveuglé, sollicite lui-même sa propre spoliation. La manipulation par la parole juridique est en place."},{"titre":"Deuxième mouvement : la comédie larmoyante de Béline (l. 15 à 29)","analyse":[{"citation":"« Mon Dieu, il ne faut point vous tourmenter de tout cela. S'il vient faute de vous, mon fils, je ne veux plus rester au monde. »","procede":"Fausse dénégation (« il ne faut point vous tourmenter ») suivie d'une hyperbole pathétique ; appellatif hypocoristique « mon fils »","effet":"Béline feint le désintéressement (« il ne faut point ») tout en relançant le sujet de l'héritage. L'hyperbole « je ne veux plus rester au monde » singe le registre pathétique : c'est du pathétique parodique, que le spectateur lit comme une comédie cynique. Le surnom « mon fils » infantilise Argan et trahit l'emprise."},{"citation":"« Mamie! » « Ma chère femme! » « Mamour! »","procede":"Stichomythie d'exclamations ; répétition d'appellatifs hypocoristiques (mots tendres) en écho aux plaintes de Béline","effet":"Le dialogue se réduit à un échange de mots doux mécaniques. Le comique de répétition et de caractère éclate : Argan, attendri jusqu'aux larmes, ne répond à la manipulation que par des roucoulements. Plus elle joue la douleur, plus il fond. La parole amoureuse est ici pur automatisme du dupe."},{"citation":"« Et je suivrai vos pas, pour vous faire connaître la tendresse que j'ai pour vous. »","procede":"Promesse hyperbolique (mourir avec lui) ; mise en avant ostentatoire du mot « tendresse »","effet":"Béline surenchérit dans la fidélité jusqu'à la mort, posture théâtrale invraisemblable. L'ironie dramatique est totale : le spectateur sait que cette « tendresse » proclamée est l'exact contraire de ses intentions. Molière fait de la déclaration d'amour un masque."},{"citation":"« Mamie, vous me fendez le cœur. Consolez-vous je vous en prie. »","procede":"Métaphore hyperbolique du cœur fendu ; inversion comique des rôles (le mourant console la « veuve »)","effet":"Argan, censé être le mourant, console celle qui joue l'inconsolable : renversement burlesque qui mesure son aveuglement. La métaphore convenue (« fendre le cœur ») montre qu'Argan parle d'un cœur sincère tandis que Béline simule le sien, accentuant l'asymétrie pathétique/cynique."},{"citation":"« Ces larmes sont hors de saison, et les choses n'en sont point encore là. »","procede":"Intervention sèche et pragmatique du notaire ; métaphore « hors de saison »","effet":"Le notaire, soucieux d'efficacité, rappelle au réel : ces larmes retardent l'affaire. Cette froideur comptable, qui juge les sanglots comme une perte de temps, démasque par contraste leur fausseté et confirme la connivence entre l'épouse et l'homme de loi."},{"citation":"« vous ne savez pas ce que c'est qu'un mari, qu'on aime tendrement. »","procede":"Adverbe « tendrement » répétant le champ lexical de la tendresse ; rejet en fin de réplique mettant le mot en relief","effet":"Béline martèle le vocabulaire de l'amour pour mieux dissimuler la convoitise. L'insistance même rend l'hypocrisie audible pour le spectateur : la sur-affirmation du sentiment en signale l'absence. C'est le ressort de la comédie d'imposture chère à Molière."}],"bilan":"Ce mouvement est une scène d'imposture sentimentale : Béline déploie tout l'arsenal du pathétique (larmes, hyperboles, promesses funèbres) pour aveugler Argan, qui répond par une tendresse sincère et ridicule. La double énonciation transforme cette fausse tendresse en pur comique au regard du spectateur, qui en perce le calcul."},{"titre":"Troisième mouvement : le piège se referme, Argan se dépouille (l. 30 à 43)","analyse":[{"citation":"« Il faut faire mon testament, mamour, de la façon que Monsieur dit; mais par précaution je veux vous mettre entre les mains vingt mille francs en or »","procede":"Conjonction « mais par précaution » ; reprise des conseils du notaire ; détail chiffré « vingt mille francs en or »","effet":"Argan met aussitôt en pratique la leçon de fraude du premier mouvement : il anticipe même au-delà du testament. La précision de la somme et la naïveté du « par précaution » montrent qu'il croit agir avec prudence alors qu'il se ruine. Le mécanisme dramatique posé plus haut produit son effet."},{"citation":"« Non, non, je ne veux point de tout cela. Ah! combien dites-vous qu'il y a dans votre alcôve? »","procede":"Volte-face dans une même réplique : refus indigné (« Non, non ») immédiatement contredit par la question d'argent (« combien… ? ») ; interjection « Ah! »","effet":"Le masque tombe en une seconde : Béline refuse pour la forme puis trahit sa cupidité par une question immédiate sur le montant. Ce contraste à l'intérieur d'une seule phrase est un sommet du comique de caractère : la convoitise perce sous la dénégation. Molière fait dire la vérité au personnage malgré lui."},{"citation":"« Ne me parlez point de bien, je vous prie. Ah! de combien sont les deux billets? »","procede":"Répétition de la structure (refus + question chiffrée) ; comique de répétition","effet":"Béline reproduit exactement le procédé précédent : la répétition mécanique prouve que le désintéressement n'est qu'une formule, vidée de sens, tandis que l'intérêt, lui, est constant et précis. Le rire naît de la régularité d'horloge avec laquelle l'hypocrisie se dément."},{"citation":"« Tous les biens du monde, mon ami, ne me sont rien, au prix de vous. »","procede":"Hyperbole et antiphrase ; appellatif « mon ami » ; lexique commercial révélateur (« au prix de »)","effet":"La déclaration sublime de désintéressement est démentie par la scène entière : c'est une antiphrase pour le spectateur. L'expression « au prix de » fait affleurer, par ironie, le langage de l'argent jusque dans la protestation d'amour. La parole amoureuse est entièrement retournée en son contraire."},{"citation":"« Allons, mon pauvre petit fils. »","procede":"Appellatif infantilisant « mon pauvre petit fils » en clôture de scène ; ton faussement maternel","effet":"Béline conduit Argan comme un enfant qu'on materne, image de sa domination totale. Le diminutif condescendant referme la scène sur l'image d'un mari réduit à un grand enfant dépouillé. Le piège verbal a parfaitement fonctionné : Argan part faire un testament contre ses propres intérêts."}],"bilan":"Le piège se referme : Argan, croyant donner par amour, se laisse dépouiller, tandis que Béline trahit deux fois sa cupidité avant de masquer sa victoire sous un dernier mot doux. La parole, instrument de manipulation chez le notaire comme chez l'épouse, triomphe ici de la lucidité : la comédie a démasqué les imposteurs sous le rire."}],"conclusion":{"bilan":"Cette scène illustre magistralement la satire morale de Molière : la parole y est entièrement détournée de sa fonction d'expression du cœur pour devenir un outil de manipulation, qu'il s'agisse du jargon juridique du notaire ou de la fausse tendresse de Béline. La double énonciation fait du spectateur le témoin lucide d'une imposture que la victime, Argan, ne voit pas. Le rire dénonce ainsi la cupidité, l'hypocrisie conjugale et la corruption de la justice.","ouverture":"Cette captation d'héritage masquée par des protestations d'amour annonce le dénouement de la pièce, où Toinette poussera Argan à feindre la mort pour démasquer enfin l'hypocrisie de Béline. On peut rapprocher cette imposture sentimentale de celle de Tartuffe, autre faux dévot dont la parole hypocrite sert un appétit bien réel."},"grammaire":{"question":"Dans la phrase « Comment puis-je faire, s'il vous plaît, pour lui donner mon bien, et en frustrer mes enfants? », analysez la proposition « pour lui donner mon bien ».","reponse":"Étape 1 — Nature : c'est une proposition subordonnée circonstancielle de but, construite avec un verbe à l'infinitif (« donner »), introduite par la préposition « pour ». On parle de subordonnée infinitive de but. Étape 2 — Fonction : elle est complément circonstanciel de but du verbe principal « puis-je faire ». Étape 3 — Justification : elle répond à la question « dans quel but ? / pour quoi faire ? » posée au verbe principal ; l'introducteur « pour + infinitif » est la marque caractéristique de l'expression du but. Le pronom « lui » y est complément d'objet second et « mon bien » complément d'objet direct de « donner »."}},{"id":"moliere-tartuffe-acte4-scene5-seduction","auteur":"Molière","titre":"Tartuffe ou l'Imposteur","reference":"Acte IV scène 5","date":"1664-1669","objet":"Le théâtre du XVIIᵉ siècle au XXIᵉ siècle","parcours":"Les jeux du cœur et de la parole","statut":"Texte complémentaire","mouvementLitteraire":"Classicisme (comédie)","resumeFlash":"Le faux dévot Tartuffe, croyant Elmire seule, déploie une parole de séduction où le langage mystique sert le désir charnel ; Elmire, complice du piège, multiplie les signaux à double sens pour qu'Orgon, caché sous la table, entende enfin l'imposteur.","intro":{"amorce":"Le théâtre classique fait de la comédie une arme de dénonciation : derrière le rire, Molière démasque les imposteurs qui exploitent la crédulité d'autrui. La parole, loin de dire le cœur, devient un instrument de manipulation.","presentationAuteurOeuvre":"Jean-Baptiste Poquelin, dit Molière (1622-1673), comédien et dramaturge du Grand Siècle, est le maître de la comédie classique sous le règne de Louis XIV. Fidèle à la devise « castigat ridendo mores » (corriger les mœurs par le rire), il met la peinture des caractères et des vices au service d'une satire morale et sociale. Tartuffe ou l'Imposteur, créé en 1664 puis interdit avant d'être autorisé en 1669, dénonce l'hypocrisie religieuse à travers le faux dévot Tartuffe, qui s'est introduit dans la maison d'Orgon pour mieux la convoiter, elle et ses biens.","situation":"À l'acte IV, scène 5, Elmire, l'épouse d'Orgon, a tendu un piège pour ouvrir les yeux de son mari, aveuglé par Tartuffe : elle a caché Orgon sous la table et feint de céder aux avances de l'imposteur. Tartuffe, se croyant écouté de la seule Elmire, déploie alors sa stratégie de séduction.","problematique":"Comment cette scène de double énonciation fait-elle de la parole l'instrument paradoxal d'une séduction hypocrite et de son propre démasquage ?","annonceMouvements":"L'extrait se compose de deux mouvements : la tirade de séduction de Tartuffe, où le langage de la dévotion se met au service du désir (l. 1 à 16), puis la riposte d'Elmire, dont la parole à double sens relance Tartuffe tout en alertant Orgon (didascalie et réplique finale, l. 17 à 24)."},"conseilLecture":"Dire la tirade de Tartuffe avec une fausse onction, un faux ravissement mystique qui doit sonner faux et trahir le désir : appuyer la sensualité des mots « miel », « suavité », « faveurs ». Marquer fortement la didascalie « Elle tousse pour avertir son mari » : la toux est un signal au public et à Orgon. Faire entendre l'ironie d'Elmire, qui joue la femme troublée tout en multipliant les sous-entendus que le spectateur décode aussitôt.","mouvements":[{"titre":"Premier mouvement : la tirade de séduction, le mystique au service du désir (l. 1 à 16)","analyse":[{"citation":"« C'est sans doute Madame, une douceur extrême, / Que d'entendre ces mots d'une bouche qu'on aime »","procede":"Hyperbole (« douceur extrême ») ; métonymie sensuelle de « la bouche » ; alexandrins galants","effet":"Tartuffe abandonne le masque dévot pour le langage de la galanterie amoureuse. La métonymie de « la bouche qu'on aime » introduit d'emblée le registre du désir physique. Le contraste avec le faux dévot des actes précédents éclate : sa parole trahit sa véritable nature."},{"citation":"« Leur miel, dans tous mes sens, fait couler à longs traits / Une suavité qu'on ne goûta jamais. »","procede":"Métaphore filée de la saveur (« miel », « couler », « suavité », « goûta ») ; champ lexical des sens","effet":"Le vocabulaire de la douceur sucrée et de la dégustation traduit une jouissance toute sensuelle. La mention « dans tous mes sens » dévoile que la dévotion affichée n'était qu'un masque du désir charnel. Molière dénonce ici la sensualité dissimulée sous la spiritualité du faux dévot."},{"citation":"« Le bonheur de vous plaire, est ma suprême étude, / Et mon cœur, de vos vœux, fait sa béatitude »","procede":"Détournement du lexique religieux (« béatitude ») vers le profane ; superlatif « suprême »","effet":"Tartuffe profane le vocabulaire mystique : la « béatitude », félicité réservée à Dieu, devient le plaisir de plaire à une femme. Ce blasphème galant est au cœur de la satire de Molière contre les faux dévots, qui mêlent sacrilège et libertinage sous des dehors pieux."},{"citation":"« Je puis croire ces mots un artifice honnête, / Pour m'obliger à rompre un hymen qui s'apprête »","procede":"Oxymore « artifice honnête » ; raisonnement retors du séducteur","effet":"L'oxymore « artifice honnête » résume toute l'hypocrisie de Tartuffe, qui théorise le mensonge acceptable. Il feint de douter pour pousser Elmire à des preuves plus concrètes : sa parole devient stratégie de manipulation, retournant la méfiance en argument de séduction."},{"citation":"« Je ne me fierai point à des propos si doux, / Qu'un peu de vos faveurs, après quoi je soupire, / Ne vienne m'assurer tout ce qu'ils m'ont pu dire »","procede":"Litote / euphémisme « un peu de vos faveurs » ; conditionnel du marchandage ; verbe « soupire »","effet":"Derrière l'euphémisme galant des « faveurs », Tartuffe réclame crûment des preuves charnelles : il subordonne sa croyance aux paroles à l'obtention du corps. La parole sert ici à exiger ce que la pudeur interdit de nommer ; pour Orgon caché, l'imposture devient flagrante."},{"citation":"« Et planter dans mon âme une constante foi / Des charmantes bontés que vous avez pour moi. »","procede":"Antithèse entre le lexique spirituel (« âme », « foi ») et le contexte de séduction physique ; chute de la tirade","effet":"Tartuffe clôt sa tirade en mêlant une dernière fois le vocabulaire de la « foi » et le désir : la « foi » qu'il invoque n'est plus religieuse mais amoureuse et sensuelle. Le projet de Molière éclate : montrer que sous la dévotion ostentatoire se cache l'appétit le plus terrestre."}],"bilan":"La tirade démasque Tartuffe par sa propre parole : croyant ne s'adresser qu'à Elmire, il révèle l'imposture en détournant le langage mystique vers le désir charnel. La double énonciation est essentielle : ce que Tartuffe destine à séduire, le spectateur — et bientôt Orgon — l'entend comme l'aveu de son hypocrisie."},{"titre":"Deuxième mouvement : la riposte d'Elmire, la parole à double sens (l. 17 à 24)","analyse":[{"citation":"ELMIRE. (Elle tousse pour avertir son mari.)","procede":"Didascalie explicitant un signal codé ; jeu scénique adressé à Orgon caché","effet":"La didascalie révèle le dispositif de double énonciation : la toux est un message destiné à Orgon, invisible mais présent. Le spectateur jouit du comique de situation : Elmire mène le jeu, et chaque réplique de Tartuffe est désormais une pièce à conviction. La parole d'Elmire aura toujours deux destinataires."},{"citation":"« Quoi! vous voulez aller avec cette vitesse, / Et d'un cœur, tout d'abord, épuiser la tendresse? »","procede":"Exclamation et interrogation feignant l'indignation ; métaphore galante (« épuiser la tendresse »)","effet":"Elmire joue la femme troublée et un peu effarouchée pour entretenir l'illusion de Tartuffe et le pousser à se dévoiler davantage. Mais le spectateur perçoit la feinte : cette parole apparemment amoureuse est une stratégie de piégeage. Le cœur n'y est pas ; seul agit le calcul."},{"citation":"« On se tue à vous faire un aveu des plus doux / Cependant ce n'est pas encore assez pour vous »","procede":"Hyperbole « On se tue » ; pronom indéfini « On » distanciant le « je » ; ton de reproche feint","effet":"L'emploi du « On » à la place du « je » crée une distance ironique : Elmire feint de se livrer tout en ne s'engageant pas vraiment. Elle relance Tartuffe en soulignant son insatiabilité, l'amenant à formuler des exigences toujours plus compromettantes pour Orgon."},{"citation":"« Et l'on ne peut aller jusqu'à vous satisfaire, / Qu'aux dernières faveurs on ne pousse l'affaire? »","procede":"Reprise ironique de l'euphémisme de Tartuffe (« dernières faveurs ») ; interrogation oratoire ; lexique du marchandage (« l'affaire »)","effet":"Elmire renvoie à Tartuffe ses propres termes pour lui faire confirmer, à voix haute, ses intentions : la parole à double sens vise à arracher un aveu décisif sous l'oreille d'Orgon. Le mot « affaire » dénonce, par ironie, que cette prétendue passion n'est qu'une transaction. La manœuvre verbale prépare la chute de l'imposteur."}],"bilan":"Elmire retourne contre Tartuffe l'arme de la parole : feignant de céder, elle multiplie les sous-entendus qui ont un sens pour Tartuffe (séduction) et un autre pour Orgon et le spectateur (mise à nu de l'imposture). La double énonciation, ressort majeur du théâtre, devient ici le moteur même du démasquage : c'est par les mots que l'hypocrite se trahit."}],"conclusion":{"bilan":"Cette scène fait de la parole un instrument ambivalent : chez Tartuffe, elle séduit en profanant le langage sacré, dévoilant le désir sous la dévotion ; chez Elmire, elle piège en jouant sur le double sens. La double énonciation théâtrale est portée à son comble par la présence d'Orgon caché : chaque mot vise deux oreilles. Molière démasque ainsi l'imposture religieuse, montrant que l'hypocrite finit par se confondre par sa propre éloquence.","ouverture":"Ce démasquage par la parole prépare le retournement final, où Orgon convaincu chassera Tartuffe — avant que ce dernier ne menace de le ruiner, et que l'intervention du Prince ne rétablisse la justice. On peut comparer cette imposture verbale à celle de Béline dans Le Malade imaginaire, autre exemple d'une fausse tendresse au service d'un appétit caché."},"grammaire":{"question":"Dans le vers « Je ne me fierai point à des propos si doux », analysez la négation.","reponse":"Étape 1 — Nature : il s'agit d'une négation totale, qui porte sur l'ensemble de la phrase, construite avec l'adverbe de négation en deux éléments « ne… point ». Étape 2 — Fonction : « ne » et « point » sont des adverbes de négation modifiant le verbe « me fierai ». Étape 3 — Justification : « point » est ici l'équivalent renforcé de « pas », fréquent dans la langue classique ; la négation est dite totale parce qu'elle nie l'action entière (Tartuffe ne se fiera pas du tout aux propos), par opposition à une négation partielle qui ne porterait que sur un élément (du type « ne… que »). Le « ne » est l'élément grammatical, « point » l'élément lexical de renforcement."}},{"id":"musset-badine-acte2-scene5-tirade-perdican","auteur":"Alfred de Musset","titre":"On ne badine pas avec l'amour","reference":"Acte II scène 5","date":"1834","objet":"Le théâtre du XVIIᵉ siècle au XXIᵉ siècle","parcours":"Les jeux du cœur et de la parole","statut":"Œuvre intégrale","mouvementLitteraire":"Romantisme (proverbe / comédie-drame)","resumeFlash":"Blessé par les leçons d'austérité que les religieuses ont inculquées à Camille, Perdican oppose à leur vision désabusée de l'amour un hymne lyrique : malgré ses souffrances et son imperfection, aimer est la seule manière d'avoir vraiment vécu.","intro":{"amorce":"Le théâtre romantique fait de la scène le lieu d'un débat sur le cœur : la parole y devient lyrique, déchirée entre l'orgueil et l'aveu. Chez Musset, badiner avec l'amour, c'est risquer de le perdre — et de tuer.","presentationAuteurOeuvre":"Alfred de Musset (1810-1857), poète et dramaturge majeur du romantisme, est l'auteur d'un théâtre intime et désenchanté, marqué par l'analyse des cœurs et la fragilité de l'amour. On ne badine pas avec l'amour, « proverbe » dramatique publié en 1834 dans le Spectacle dans un fauteuil, met en scène les amours contrariées de deux jeunes gens orgueilleux, Camille et Perdican, qui se déchirent et se blessent jusqu'à ce que le jeu cruel se solde par une mort. La pièce mêle la légèreté de la comédie au tragique du drame, conformément à l'esthétique romantique du mélange des registres.","situation":"À l'acte II, scène 5, Camille, élevée au couvent et nourrie par les religieuses d'une vision méfiante de l'amour humain, vient de signifier à Perdican son refus de l'épouser. Blessé, Perdican réagit par une longue tirade où il dénonce l'enseignement des nonnes avant de proclamer, dans un élan lyrique, la valeur suprême de l'amour.","problematique":"Comment la parole de Perdican passe-t-elle de la dénonciation amère à une véritable profession de foi lyrique sur l'amour, faisant de cette tirade un manifeste romantique ?","annonceMouvements":"La tirade s'organise en trois mouvements : d'abord le réquisitoire contre les nonnes et leur mensonge (l. 1 à 9), puis le tableau noir et désabusé de l'humanité (l. 12 à 20), enfin l'éloge lyrique de l'amour comme seule vie véritable (l. 20 à 26)."},"conseilLecture":"Commencer sur un ton de colère contenue et de reproche, en faisant entendre l'indignation des questions oratoires adressées aux nonnes. Adopter ensuite un ton désabusé, presque cynique, pour l'énumération des défauts humains. Enfin, opérer un net retournement vers le lyrisme exalté : ralentir, faire vibrer la voix sur « mais j'ai aimé » et « C'est moi qui ai vécu », qui sont le sommet émotionnel de la tirade et doivent sonner comme une révélation arrachée au cœur.","mouvements":[{"titre":"Premier mouvement : le réquisitoire contre les nonnes (l. 1 à 9)","analyse":[{"citation":"« Sais-tu ce que c'est que des nonnes, malheureuse fille? »","procede":"Question oratoire d'ouverture ; apostrophe au ton de reproche (« malheureuse fille ») ; registre polémique","effet":"Perdican prend l'offensive par une interrogation qui défie Camille et la place en position d'élève abusée. L'apostrophe mêlant pitié et reproche révèle qu'il l'estime victime d'un endoctrinement. La parole devient arme : il s'agit de détruire l'autorité des religieuses."},{"citation":"« Elles qui te représentent l'amour des hommes comme un mensonge, savent-elles qu'il y a pis encore, le mensonge de l'amour divin? »","procede":"Antithèse entre « l'amour des hommes » et « l'amour divin » ; gradation (« pis encore ») ; retournement de l'accusation","effet":"Perdican retourne l'argument des nonnes : ce ne sont pas les hommes qui mentent, mais elles, en feignant un amour divin auquel elles ont renoncé par dépit. Le renversement audacieux fait de la dévotion un mensonge supérieur, posture provocatrice typique de l'anticléricalisme romantique."},{"citation":"« Comme elles t'ont fait la leçon! Comme j'avais prévu tout cela quand tu t'es arrêtée devant le portrait de notre vieille tante! »","procede":"Anaphore exclamative « Comme… Comme… » ; évocation d'un souvenir commun","effet":"L'anaphore exclamative traduit l'amertume et l'évidence douloureuse : Perdican a vu venir l'aliénation de Camille. Le souvenir partagé (le portrait, la tante) oppose la mémoire vivante de l'enfance à la « leçon » apprise au couvent, et prépare l'argument du cœur contre le dressage."},{"citation":"« cette pauvre petite fontaine qui nous regarde tout en larmes »","procede":"Personnification de la fontaine ; pathétique du décor","effet":"La nature pleure avec les amants : cette personnification, conforme au lyrisme romantique du paysage-état d'âme, charge le souvenir d'émotion et oppose la tendresse du lieu de l'enfance à la froideur du couvent. Le décor devient le confident de l'amour menacé."},{"citation":"« le masque de plâtre que les nonnes t'ont placé sur les joues me refusait un baiser de frère; mais ton cœur a battu; il a oublié sa leçon, lui qui ne sait pas lire »","procede":"Métaphore du « masque de plâtre » ; antithèse entre le « masque » (l'apprentissage) et le « cœur » (la spontanéité) ; personnification du cœur","effet":"Le « masque de plâtre » figure l'artifice imposé par l'éducation religieuse, opposé au « cœur » qui « ne sait pas lire » : Musset oppose la nature au dressage, l'instinct du cœur à la « leçon » apprise. Cette opposition fonde toute la pensée romantique du primat du sentiment sur la raison contrainte."}],"bilan":"Perdican use de la parole comme d'un réquisitoire : il dénonce le mensonge des nonnes et oppose la vérité du cœur à l'artifice de leur enseignement. La tirade affirme déjà un parti pris romantique : le sentiment spontané vaut mieux que la doctrine, et l'amour humain mieux que sa négation."},{"titre":"Deuxième mouvement : le tableau noir de l'humanité (l. 12 à 20)","analyse":[{"citation":"« Tous les hommes sont menteurs, inconstants, faux, bavards, hypocrites, orgueilleux ou lâches, méprisables et sensuels »","procede":"Accumulation hyperbolique d'adjectifs péjoratifs ; généralisation (« Tous les hommes »)","effet":"L'avalanche d'épithètes dépréciatives dresse un portrait accablant de l'homme. Perdican concède d'abord, et même surenchérit, sur la noirceur humaine : ce pessimisme apparent est une stratégie rhétorique qui rendra plus éclatant le retournement final en faveur de l'amour."},{"citation":"« toutes les femmes sont perfides, artificieuses, vaniteuses, curieuses et dépravées »","procede":"Énumération parallèle visant les femmes ; symétrie avec la phrase précédente","effet":"Le parallélisme accable les deux sexes à égalité : nul n'échappe à cette misanthropie. La construction symétrique souligne que le constat est sans exception, ce qui rend d'autant plus saisissant qu'une « chose sainte » puisse naître d'êtres si imparfaits."},{"citation":"« le monde n'est qu'un égout sans fond où les phoques les plus informes rampent et se tordent sur des montagnes de fange »","procede":"Métaphore dégradante (« égout », « fange ») ; comparaison bestiale (« phoques informes ») ; hyperbole","effet":"L'image répugnante du monde-cloaque pousse le pessimisme à son comble : l'humanité y est réduite à une masse grouillante et abjecte. Cette vision noire, dans la veine du « mal du siècle » romantique, crée un contraste maximal avec ce qui va suivre."},{"citation":"« mais il y a au monde une chose sainte et sublime, c'est l'union de deux de ces êtres si imparfaits et si affreux »","procede":"Conjonction adversative « mais » opérant le retournement ; antithèse entre « sainte et sublime » et « imparfaits et affreux »","effet":"Le « mais » fait basculer la tirade : de la fange surgit le sublime. L'antithèse paradoxale montre que c'est précisément de l'union des êtres les plus imparfaits que naît le sacré. Musset transfère au profane (l'amour) le vocabulaire du sacré, faisant de l'amour la vraie religion."},{"citation":"« On est souvent trompé en amour, souvent blessé et souvent malheureux »","procede":"Anaphore de l'adverbe « souvent » ; gradation des souffrances (« trompé », « blessé », « malheureux »)","effet":"L'anaphore de « souvent » reconnaît lucidement la douleur inhérente à l'amour : Musset ne l'idéalise pas naïvement. Cet aveu de la souffrance rend l'éloge crédible et prépare le contraste avec le « mais on aime » qui revendique l'amour malgré tout."}],"bilan":"Par une rhétorique du contraste, Perdican peint d'abord la noirceur de l'homme et la souffrance de l'amour, pour mieux faire surgir, par le « mais » adversatif, la valeur sacrée de l'union des cœurs. La parole construit progressivement l'éloge en l'arrachant au désenchantement même."},{"titre":"Troisième mouvement : l'éloge lyrique de l'amour comme seule vie (l. 20 à 26)","analyse":[{"citation":"« mais on aime, et quand on est sur le bord de sa tombe, on se retourne pour regarder en arrière »","procede":"Conjonction adversative « mais » ; image de la fin de vie (« le bord de sa tombe ») ; perspective rétrospective","effet":"Le « mais » réaffirme la primauté de l'amour sur tous les maux. La projection vers la mort donne à l'éloge une dimension grave et universelle : c'est à l'heure du bilan que se mesure la valeur d'une vie. Le lyrisme s'élève vers une méditation existentielle."},{"citation":"« J'ai souffert souvent, je me suis trompé quelquefois, mais j'ai aimé »","procede":"Rythme ternaire avec gradation atténuée (« souvent » / « quelquefois ») ; antithèse résolue par « mais j'ai aimé » ; passage au « je »","effet":"Le rythme ternaire culmine sur la proposition brève « mais j'ai aimé », mise en valeur par sa concision après les concessions. Le passage du « on » général au « je » fait de la formule un aveu personnel et un bilan de vie. L'amour rachète à lui seul la souffrance et l'erreur : c'est le cœur lyrique de la tirade."},{"citation":"« C'est moi qui ai vécu, et non pas un être factice créé par mon orgueil et mon ennui. »","procede":"Tournure emphatique de présentatif (« C'est moi qui ») ; antithèse entre « vécu » et « être factice » ; chute de la tirade","effet":"La structure emphatique « C'est moi qui » revendique fièrement l'authenticité d'une vie vouée à l'amour. L'antithèse oppose l'être vrai au « factice » né de « l'orgueil » et de « l'ennui » : Musset condamne ainsi le repli orgueilleux (celui des nonnes, mais aussi le sien et celui de Camille) au profit du don de soi. La maxime romantique érige l'amour en seul critère d'existence."},{"citation":"« non pas un être factice créé par mon orgueil et mon ennui »","procede":"Champ lexical de l'artifice et du néant (« factice », « orgueil », « ennui ») ; écho au « masque de plâtre » du premier mouvement","effet":"Le mot « factice » répond au « masque de plâtre » : la tirade se referme sur l'opposition fondatrice entre l'authentique et l'artificiel. L'« orgueil » et l'« ennui » nomment précisément le mal des deux personnages, ce qui charge ces mots d'une ironie tragique, puisque c'est cet orgueil qui causera la catastrophe."}],"bilan":"La tirade s'achève en profession de foi : aimer, malgré la souffrance et l'imperfection, est la seule manière d'avoir vraiment vécu. Mais cet hymne lyrique contient déjà sa propre menace, car Perdican y nomme l'orgueil dont il ne se déprend pas : la parole qui célèbre l'amour ne suffira pas à le sauver du jeu cruel qui les perdra."}],"conclusion":{"bilan":"Cette tirade est un manifeste romantique : par un mouvement rhétorique qui va de la dénonciation au pessimisme puis à l'exaltation lyrique, Perdican érige l'amour en valeur suprême, seule capable de donner sens à une existence vouée par ailleurs à la souffrance et à l'imperfection. La parole y est tout entière au service du cœur, opposant l'authenticité du sentiment à l'artifice de l'orgueil et de l'éducation. C'est l'un des sommets du lyrisme amoureux de Musset.","ouverture":"Cet éloge de l'amour vrai contraste tragiquement avec le titre, On ne badine pas avec l'amour : Perdican, qui célèbre ici l'authenticité, va pourtant céder à l'orgueil et badiner avec Rosette, provoquant la catastrophe finale. La tirade annonce ainsi, en creux, le dénouement où l'amour vrai, reconnu trop tard, débouche sur la mort."},"grammaire":{"question":"Dans la phrase « Sais-tu ce que c'est que des nonnes? », analysez l'interrogation.","reponse":"Étape 1 — Nature : c'est une interrogation directe et totale, marquée par l'inversion du sujet (« Sais-tu ») et le point d'interrogation final. Étape 2 — Type : elle est totale parce qu'elle porte sur l'ensemble de l'énoncé et appelle en principe une réponse par oui ou par non, et non sur un élément particulier (ce qui en ferait une interrogation partielle introduite par un mot interrogatif). Étape 3 — Justification et nuance : la subordonnée « ce que c'est que des nonnes » est une interrogative indirecte enchâssée, complément d'objet direct du verbe « Sais-tu ». Par ailleurs, dans le contexte, cette interrogation n'attend pas vraiment de réponse : c'est une question oratoire qui équivaut à une affirmation de mépris et amorce le réquisitoire de Perdican."}},{"id":"musset-badine-acte3-scene8-denouement","auteur":"Alfred de Musset","titre":"On ne badine pas avec l'amour","reference":"Acte III scène 8","date":"1834","objet":"Le théâtre du XVIIᵉ siècle au XXIᵉ siècle","parcours":"Les jeux du cœur et de la parole","statut":"Œuvre intégrale","mouvementLitteraire":"Romantisme (proverbe / comédie-drame)","resumeFlash":"Camille et Perdican avouent enfin leur amour, mais ce bonheur reconquis est aussitôt brisé par le cri de Rosette : la jeune fille, jouet de leur orgueil, meurt, et l'aveu se solde par une séparation tragique.","intro":{"amorce":"Le théâtre romantique fait de la scène le lieu d'un débat sur le cœur : la parole y devient lyrique, déchirée entre l'orgueil et l'aveu. Chez Musset, badiner avec l'amour, c'est risquer de le perdre — et de tuer.","presentationAuteurOeuvre":"Alfred de Musset (1810-1857), poète et dramaturge majeur du romantisme, est l'auteur d'un théâtre intime et désenchanté, marqué par l'analyse des cœurs et la fragilité de l'amour. On ne badine pas avec l'amour, « proverbe » dramatique publié en 1834 dans le Spectacle dans un fauteuil, met en scène les amours contrariées de deux jeunes gens orgueilleux, Camille et Perdican, qui se déchirent et se blessent jusqu'à ce que le jeu cruel se solde par une mort. La pièce mêle la légèreté de la comédie au tragique du drame, conformément à l'esthétique romantique du mélange des registres.","situation":"À l'acte III, scène 8, le dénouement, Camille et Perdican se retrouvent enfin dans un oratoire et cessent de jouer : ils s'avouent leur amour. Mais Perdican, par dépit, avait séduit Rosette, la sœur de lait de Camille, qui les a suivis. Cachée derrière l'autel, elle assiste à leurs aveux. Le bonheur des amants va être anéanti par sa mort.","problematique":"Comment ce dénouement fait-il de l'aveu d'amour le moteur paradoxal de la catastrophe tragique, illustrant le proverbe qui donne son titre à la pièce ?","annonceMouvements":"Le passage suit trois mouvements : l'aveu lyrique et la prise de conscience de Perdican (l. 1 à 12), le bonheur partagé aussitôt rompu par le cri (l. 12 à 27), enfin la prière angoissée et la chute tragique (l. 28 à 43)."},"conseilLecture":"Faire entendre d'abord l'exaltation douloureuse de Perdican : la tirade lyrique doit s'élever puis se briser. Marquer la rupture brutale de la didascalie « on entend un grand cri derrière l'autel » : un silence, puis l'inquiétude qui monte dans les répliques courtes. Terminer sur la prière haletante, presque sacrilège, et laisser tomber, glaciale et définitive, la dernière réplique de Camille « Elle est morte. Adieu, Perdican! » — phrase de mort qui clôt la pièce.","mouvements":[{"titre":"Premier mouvement : l'aveu lyrique et la prise de conscience (l. 1 à 12)","analyse":[{"citation":"« Insensés que nous sommes! nous nous aimons. »","procede":"Apostrophe exclamative (« Insensés ») ; phrase nominale puis verbale très brèves ; aveu enfin formulé","effet":"L'aveu tant retardé éclate enfin dans sa nudité (« nous nous aimons »), précédé de l'autocondamnation « Insensés que nous sommes ». La brièveté et l'exclamation traduisent l'évidence soudaine et la lucidité douloureuse : ils reconnaissent à la fois leur amour et leur folie. La parole, libérée de l'orgueil, dit enfin le cœur."},{"citation":"« Quel songe avons-nous fait, Camille? Quelles vaines paroles, quelles misérables folies ont passé comme un vent funeste entre nous deux? »","procede":"Questions oratoires en anaphore (« Quel… Quelles… quelles… ») ; comparaison « comme un vent funeste » ; champ lexical de l'illusion (« songe », « vaines », « folies »)","effet":"L'anaphore interrogative exprime le regret et l'incompréhension face au jeu cruel auquel ils se sont livrés. La métaphore du « vent funeste » désigne les « vaines paroles » qui les ont séparés : Musset accuse ici la parole orgueilleuse, opposée à la vérité du cœur. Le mot « funeste » annonce déjà, par prolepse, l'issue mortelle."},{"citation":"« le bonheur est une perle si rare dans cet océan d'ici-bas! Tu nous l'avais donné, pêcheur céleste, tu l'avais tiré pour nous des profondeurs de l'abîme, cet inestimable joyau »","procede":"Métaphore filée maritime et religieuse (« perle », « océan », « pêcheur céleste », « abîme », « joyau ») ; apostrophe à Dieu ; lyrisme","effet":"La métaphore filée transfigure le bonheur en trésor offert par Dieu, « pêcheur céleste ». Ce lyrisme religieux sacralise l'amour et accroît, par contraste, la faute des amants qui ont gâché ce don. L'image prépare le sentiment de culpabilité qui dominera le dénouement."},{"citation":"« et nous, comme des enfants gâtés que nous sommes, nous en avons fait un jouet. »","procede":"Comparaison « comme des enfants gâtés » ; métaphore du « jouet » ; aveu de la faute","effet":"Les amants se reconnaissent immatures : ils ont « joué » avec un bien sacré. La métaphore du « jouet » illustre exactement le « badinage » du titre : on ne badine pas avec l'amour. Perdican formule ici la leçon morale de la pièce, au moment même où il va en subir le châtiment."},{"citation":"« Il a bien fallu que la vanité, le bavardage et la colère vinssent jeter leurs rochers informes sur cette route céleste »","procede":"Énumération des défauts personnifiés (« la vanité, le bavardage et la colère ») ; métaphore des « rochers informes » sur la « route céleste »","effet":"Perdican identifie les responsables de leur malheur : leurs propres travers, érigés en obstacles sur le chemin de l'amour. La personnification des défauts en forces destructrices déresponsabilise à demi les amants tout en les accusant : c'est leur orgueil qui a brisé le bonheur. La parole devient examen de conscience."}],"bilan":"L'aveu enfin prononcé s'accompagne aussitôt d'une lucidité amère : les amants comprennent qu'ils ont détruit par orgueil et par jeu un bonheur sacré. La parole lyrique, libérée du masque, dit la vérité du cœur, mais trop tard : le « vent funeste » et la « route céleste » brisée annoncent déjà le tragique."},{"titre":"Deuxième mouvement : le bonheur rompu par le cri (l. 12 à 27)","analyse":[{"citation":"« Oui, nous nous aimons, Perdican; laisse-moi le sentir sur ton cœur. Ce Dieu qui nous regarde ne s'en offensera pas; il veut bien que je t'aime; il y a quinze ans qu'il le sait. »","procede":"Reprise en écho de l'aveu (« Oui, nous nous aimons ») ; rythme apaisé ; référence à l'enfance (« quinze ans »)","effet":"Camille répond à l'aveu de Perdican par un aveu serein, qui concilie enfin l'amour humain et l'amour divin qu'elle opposait jusque-là. L'allusion aux « quinze ans » ancre cet amour dans l'enfance partagée : la réconciliation des cœurs semble accomplie. C'est l'instant de bonheur fragile, juste avant la catastrophe."},{"citation":"Il l'embrasse; on entend un grand cri derrière l'autel.","procede":"Didascalie ; coup de théâtre ; contraste entre le baiser (l'amour) et le cri (la mort)","effet":"La didascalie fait basculer la scène : au moment précis où l'amour se scelle par un baiser, le « grand cri » surgit, irruption brutale du tragique. Le « derrière l'autel » charge le lieu d'une dimension sacrée et fatale : le bonheur des amants se paie d'une victime. C'est le pivot du dénouement."},{"citation":"« C'est la voix de ma sœur de lait. »","procede":"Réplique brève ; identification immédiate ; périphrase « ma sœur de lait »","effet":"La reconnaissance instantanée de la voix de Rosette transforme l'inquiétude en pressentiment. La périphrase « sœur de lait » rappelle le lien d'intimité qui lie Camille à la victime, aggravant la faute : c'est une proche, une innocente, qui paie le jeu des maîtres. Le tragique se précise."},{"citation":"« Je ne sais ce que j'éprouve; il me semble que mes mains sont couvertes de sang. »","procede":"Métaphore du sang sur les mains ; modalisation de l'incertitude (« il me semble ») ; registre tragique","effet":"L'image du sang aux mains, qui évoque le meurtrier (réminiscence du remords criminel, comme chez Macbeth), exprime la culpabilité instinctive de Perdican avant même de savoir. La modalisation rend ce pressentiment plus angoissant : le héros se sent déjà responsable d'une mort. Musset installe le climat de la tragédie."},{"citation":"« La pauvre enfant nous a sans doute épiés; elle s'est encore évanouie; viens, portons-lui secours; hélas tout cela est cruel. »","procede":"Lexique du pathétique (« pauvre enfant », « hélas », « cruel ») ; rythme haché par les points-virgules","effet":"Camille, qui croit encore à un simple évanouissement, multiplie les marques de pitié. L'ironie tragique joue à plein : le spectateur pressent la mort que les personnages n'osent envisager. L'interjection « hélas » et l'adjectif « cruel » font monter le registre pathétique vers le dénouement funeste."}],"bilan":"L'instant de bonheur reconquis est aussitôt anéanti : le baiser des amants déclenche le cri de Rosette, et le tragique fait irruption. La parole de Perdican, hantée par l'image du sang, pressent la catastrophe : l'amour avoué se révèle solidaire d'une faute mortelle, conformément à l'avertissement du titre."},{"titre":"Troisième mouvement : la prière angoissée et la chute tragique (l. 28 à 43)","analyse":[{"citation":"« Non, en vérité, je n'entrerai pas; je sens un froid mortel qui me paralyse. »","procede":"Refus catégorique ; métaphore « froid mortel » ; champ lexical de la mort et de la paralysie","effet":"Perdican recule devant l'horreur qu'il pressent : le « froid mortel » qui le « paralyse » traduit l'effroi tragique face à la mort qu'il devine. Son incapacité à agir le pose en spectateur impuissant du destin, posture du héros tragique écrasé par la fatalité."},{"citation":"« Je vous en supplie, mon Dieu! ne faites pas de moi un meurtrier! »","procede":"Prière implorante ; apostrophe à Dieu ; exclamation ; mot « meurtrier » assumé","effet":"La prière révèle la pleine conscience de la faute : Perdican se sait moralement responsable d'une mort. L'invocation désespérée à Dieu marque le passage du badinage léger à la gravité tragique. La parole, qui servait au jeu, devient supplication face à l'irréparable."},{"citation":"« nous sommes deux enfants insensés, et nous avons joué avec la vie et la mort; mais notre cœur est pur »","procede":"Reprise du motif des « enfants insensés » ; antithèse « la vie et la mort » ; plaidoyer (« notre cœur est pur »)","effet":"Perdican résume la faute en une formule qui condense le sens de la pièce : ils ont « joué avec la vie et la mort », c'est-à-dire badiné avec l'amour. Le plaidoyer « notre cœur est pur » tente de séparer l'intention de la conséquence, mais le tragique réside précisément en ce qu'un cœur pur puisse causer la mort par jeu et par orgueil."},{"citation":"« Eh bien! Camille, qu'y a-t-il? »","procede":"Question anxieuse et brève ; interruption de la prière ; attente du verdict","effet":"La prière est coupée net par le retour de Camille : la question haletante crée un suspens tragique maximal. Le spectateur, comme Perdican, attend le verdict suspendu. Ce dépouillement de la parole, réduite à l'essentiel, prépare le choc de la réplique finale."},{"citation":"« Elle est morte. Adieu, Perdican! »","procede":"Deux phrases nominales et brèves ; annonce de la mort sans pathos ; « Adieu » de la séparation définitive ; réplique de clôture de la pièce","effet":"La sobriété glaciale de l'annonce — trois mots pour la mort — produit un effet tragique foudroyant : le pathétique naît du dépouillement même. L'« Adieu » signe la séparation définitive : la mort de Rosette rend impossible le bonheur des amants. Le proverbe se vérifie cruellement : on ne badine pas avec l'amour. La pièce s'achève sur la rupture, non sur l'union."}],"bilan":"Le dénouement consomme la catastrophe : la mort de Rosette, victime innocente du jeu des amants, transforme l'aveu d'amour en source de séparation. La parole, devenue prière puis annonce funèbre, scelle le tragique. L'amour enfin reconnu ne peut survivre à la faute : tel est le sens du proverbe qui donne son titre à la pièce."}],"conclusion":{"bilan":"Ce dénouement illustre pleinement le proverbe-titre : l'aveu d'amour, enfin libéré du masque de l'orgueil, débouche paradoxalement sur la mort et la séparation. Musset y mêle les registres romantiques — lyrisme de l'aveu, pathétique de la pitié, tragique de la fatalité — pour montrer que badiner avec l'amour, c'est jouer avec la vie et la mort. La parole, après avoir servi le jeu cruel, ne dit la vérité du cœur que pour constater l'irréparable.","ouverture":"Cette fin abrupte et sombre, qui prive les amants du bonheur entrevu, illustre le pessimisme du « mal du siècle » romantique. On peut la rapprocher d'autres dénouements où l'amour se heurte à la mort, comme l'excipit de La Princesse de Clèves, où l'héroïne renonce à l'amour pour la « retraite », autre manière de dire l'impossibilité du bonheur amoureux."},"grammaire":{"question":"Dans la phrase « Je vous en supplie, mon Dieu! ne faites pas de moi un meurtrier! », analysez la phrase « ne faites pas de moi un meurtrier ».","reponse":"Étape 1 — Type et forme : c'est une phrase de type injonctif (un ordre, ici une prière), à la forme négative. Étape 2 — Le mode : le verbe « faites » est à l'impératif présent, deuxième personne du pluriel, sans sujet exprimé, ce qui est la marque de l'injonction. Étape 3 — La négation : la négation totale « ne… pas » encadre le verbe « faites » et porte sur toute l'action ; elle exprime ici une défense, c'est-à-dire un ordre négatif. Le groupe « un meurtrier » est attribut du complément d'objet « moi » (de moi → me faire devenir un meurtrier), construction attributive de l'objet introduite par le verbe « faire »."}},{"id":"la-fayette-princesse-de-cleves-excipit","auteur":"Madame de La Fayette","titre":"La Princesse de Clèves","reference":"Excipit (« M. de Nemours pensa expirer de douleur… » à « …laissa des exemples de vertu inimitables »)","date":"1678","objet":"Le roman et le récit du Moyen Âge au XXIᵉ siècle","parcours":"Les romans de l'énergie : création et destruction","statut":"Texte complémentaire","mouvementLitteraire":"Classicisme ; roman d'analyse (esthétique classique)","resumeFlash":"Le dénouement scelle le double renoncement : la passion de Nemours s'éteint avec le temps tandis que Mme de Clèves choisit la retraite et la vertu, faisant du renoncement la seule victoire possible sur une passion destructrice.","intro":{"amorce":"Au XVIIᵉ siècle, alors que le roman est encore tenu pour un genre mineur et romanesque, Madame de La Fayette invente avec La Princesse de Clèves une forme nouvelle, le roman d'analyse, qui scrute les mouvements secrets du cœur avec la rigueur d'un moraliste classique.","presentationAuteurOeuvre":"Publié anonymement en 1678, La Princesse de Clèves est souvent considéré comme le premier roman d'analyse de la littérature française. Madame de La Fayette y peint, à la cour d'Henri II, la naissance et le combat d'une passion interdite entre la jeune princesse de Clèves, mariée, et le duc de Nemours. Fidèle à l'esthétique classique de la mesure et de la maîtrise des passions, l'œuvre fait du renoncement final l'aboutissement d'une héroïne déchirée entre l'amour et le devoir.","situation":"Le texte constitue l'excipit du roman. Après la mort de M. de Clèves et le terrible aveu, Mme de Clèves a renoncé à Nemours malgré sa liberté retrouvée. Cet ultime fragment narratif clôt le récit en réglant le sort des deux personnages : l'apaisement de Nemours et la retraite édifiante de l'héroïne.","problematique":"Comment cet excipit fait-il du renoncement et de l'effacement de la passion l'ultime accomplissement d'une morale classique de la maîtrise de soi ?","annonceMouvements":"Le passage s'organise en trois mouvements : d'abord la douleur de Nemours et l'extinction lente de sa passion (l. 344 à 353) ; puis la retraite partagée de Mme de Clèves (l. 354 à 356) ; enfin la mort discrète et exemplaire qui élève l'héroïne au rang de modèle (l. 356 à 358)."},"conseilLecture":"Adopter un ton grave et contenu, à l'image de la retenue classique : aucune emphase, mais une lente déploration. Marquer les phrases longues et leurs ralentis par des pauses qui miment l'écoulement du temps. Détacher nettement la dernière phrase, plus brève, qui sonne comme une épitaphe et un verdict moral.","mouvements":[{"titre":"Premier mouvement : la douleur de Nemours et l'extinction de la passion (l. 344 à 353)","analyse":[{"citation":"« M. de Nemours pensa expirer de douleur en présence de celle qui lui parlait »","procede":"Hyperbole (« expirer de douleur ») atténuée par le verbe « pensa » ; registre pathétique ; ouverture in medias res sur l'effet émotionnel","effet":"L'attaque de l'excipit place d'emblée Nemours dans une souffrance proche de la mort, mais la litote du « pensa » contient l'émotion : le pathétique est immédiatement bridé par la retenue classique, signalant que la passion ne triomphera pas."},{"citation":"« Il la pria vingt fois de retourner à Mme de Clèves »","procede":"Hyperbole numérique (« vingt fois ») ; rythme de l'insistance","effet":"Le chiffre suggère l'obstination désespérée de l'amant, l'énergie d'une passion qui se refuse à capituler ; mais cette dépense vaine d'énergie souligne déjà l'inutilité du désir face à la décision irrévocable de l'héroïne."},{"citation":"« Mme de Clèves lui avait non seulement défendu de lui aller redire aucune chose de sa part, mais même de lui rendre compte de leur conversation »","procede":"Gradation par la structure corrélative « non seulement… mais même » ; lexique de l'interdit (« défendu »)","effet":"La double interdiction dresse une barrière de plus en plus radicale entre les amants : l'héroïne ne se contente pas de refuser, elle supprime jusqu'au moindre relais de communication. La maîtrise de soi devient verrouillage absolu de la passion."},{"citation":"« Il fallut enfin que ce prince repartît »","procede":"Tournure impersonnelle (« il fallut ») ; conjonction « enfin » marquant la résignation ; passé simple de l'action close","effet":"L'impersonnel ôte à Nemours toute initiative : il subit une nécessité supérieure. Le départ scelle la défaite de l'énergie amoureuse, contrainte de céder devant la volonté inflexible de Mme de Clèves."},{"citation":"« une personne qu'il aimait d'une passion la plus violente, la plus naturelle et la mieux fondée qui ait jamais été »","procede":"Triple superlatif en gradation (« la plus violente, la plus naturelle et la mieux fondée ») ; hyperbole finale (« qui ait jamais été »)","effet":"La narratrice consacre une dernière fois la grandeur exceptionnelle de cette passion, présentée comme la plus parfaite qui ait existé. L'éloge rend le renoncement d'autant plus admirable : c'est la passion la plus légitime qui est pourtant sacrifiée, exaltation paradoxale de la vertu sur le désir."},{"citation":"« Néanmoins il ne se rebuta point encore, et il fit tout ce qu'il put imaginer de capable de la faire changer de dessein »","procede":"Connecteur d'opposition « Néanmoins » ; adverbe « encore » ; périphrase de l'effort total (« tout ce qu'il put imaginer »)","effet":"Un dernier sursaut d'énergie anime l'amant, mais l'adverbe « encore » annonce déjà l'épuisement à venir : le désir s'acharne avant de s'éteindre, dans une ultime dépense qui prépare sa résolution."},{"citation":"« Enfin, des années entières s'étant passées, le temps et l'absence ralentirent sa douleur et éteignirent sa passion »","procede":"Ellipse temporelle (« des années entières ») ; gradation décroissante des verbes (« ralentirent… éteignirent ») ; métaphore filée du feu (« éteignirent ») ; sujets abstraits personnifiés (« le temps et l'absence »)","effet":"Le récit accélère brutalement pour faire de la durée le véritable agent de la résolution. La passion, d'abord présentée comme un feu (« violente »), s'éteint d'elle-même : l'énergie destructrice se consume et se dissipe, conformément à la leçon classique sur l'inconstance du désir et la victoire du temps."}],"bilan":"Ce premier mouvement épouse le déclin de la passion de Nemours : d'une souffrance d'abord intense, l'amant passe par l'obstination, la résignation forcée puis l'extinction. La narration, en accélérant le temps, fait du renoncement non une rupture violente mais un lent apaisement, désamorçant l'énergie destructrice de la passion."},{"titre":"Deuxième mouvement : la retraite partagée de Mme de Clèves (l. 354 à 356)","analyse":[{"citation":"« Mme de Clèves vécut d'une sorte qui ne laissa pas d'apparence qu'elle pût jamais revenir »","procede":"Litote (« ne laissa pas d'apparence ») ; adverbe « jamais » qui radicalise ; passé simple « vécut »","effet":"L'héroïne, sujet de la phrase, reprend la pleine maîtrise de son destin. La litote, figure typiquement classique, dit avec retenue l'irrévocabilité de son choix : la décision est définitive sans avoir besoin d'être proclamée."},{"citation":"« Elle passait une partie de l'année dans cette maison religieuse et l'autre chez elle »","procede":"Imparfait de répétition (« passait ») ; parallélisme binaire (« une partie… l'autre »)","effet":"L'imparfait substitue à l'événement la durée d'une existence réglée et apaisée. Le partage symétrique de l'année dessine une vie d'équilibre et de retrait, à l'opposé de l'agitation passionnée de Nemours."},{"citation":"« mais dans une retraite et dans des occupations plus saintes que celles des couvents les plus austères »","procede":"Comparatif de supériorité hyperbolique (« plus saintes que… les plus austères ») ; lexique religieux (« retraite », « saintes », « couvents »)","effet":"Mme de Clèves dépasse en sainteté les religieuses les plus rigoureuses : son renoncement, librement consenti, est jugé supérieur à la vie monastique elle-même. Le sacrifice de la passion se mue en élévation spirituelle, sublimation du désir en vertu."}],"bilan":"Au déclin subi de la passion de Nemours répond le retrait choisi de l'héroïne. Devenue sujet actif de sa propre vie, Mme de Clèves convertit le renoncement en une existence d'équilibre et de sainteté, faisant de la maîtrise de soi non une privation mais un accomplissement."},{"titre":"Troisième mouvement : une mort exemplaire (l. 356 à 358)","analyse":[{"citation":"« et sa vie, qui fut assez courte »","procede":"Incise discrète ; litote (« assez courte ») ; passé simple « fut »","effet":"La mort de l'héroïne est annoncée presque sans relief, par une simple proposition relative. Cette sobriété toute classique refuse le pathétique : la disparition n'est pas un drame mais l'accomplissement paisible d'une vie réussie."},{"citation":"« laissa des exemples de vertu inimitables »","procede":"Clausule sentencieuse ; lexique moral (« vertu ») ; adjectif hyperbolique (« inimitables ») ; verbe « laissa » (legs, postérité)","effet":"La dernière phrase sonne comme une épitaphe et un verdict moral : Mme de Clèves devient un modèle absolu, par définition inégalable. Le roman se clôt sur une leçon édifiante qui justifie a posteriori tout le récit et hisse l'héroïne au rang d'idéal."},{"citation":"« des exemples de vertu inimitables »","procede":"Place finale du mot « inimitables » (mise en relief par la position de fin de phrase et de roman)","effet":"Le mot ultime du roman valorise une vertu qui échappe à toute imitation : paradoxalement, l'œuvre offre un modèle qu'elle déclare inatteignable, conférant à son héroïne une grandeur quasi tragique et à la morale classique une portée exemplaire."}],"bilan":"L'excipit se referme sur une mort dépouillée et une formule sentencieuse qui transforment la vie de l'héroïne en modèle de vertu. Le renoncement, loin d'être un échec, devient la seule manière de maîtriser une passion par essence destructrice."}],"conclusion":{"bilan":"Cet excipit clôt le roman par un double renoncement : la passion de Nemours s'éteint sous l'effet du temps tandis que Mme de Clèves convertit son sacrifice en une vie de retraite et de sainteté. Par la retenue de son style, ses litotes et ses clausules sentencieuses, Madame de La Fayette fait du dénouement la victoire de la maîtrise classique sur l'énergie dévorante de la passion, et de son héroïne un exemple de vertu inimitable.","ouverture":"On peut rapprocher ce renoncement de celui que Balzac, dans La Peau de chagrin, met en scène par l'antiquaire : là où Mme de Clèves choisit de ne plus vouloir pour se préserver, le vieillard érige le refus du désir en sagesse vitale. Mais Raphaël, lui, choisira la voie inverse, celle d'un désir qui consume et qui tue."},"grammaire":{"question":"Dans la phrase « le temps et l'absence ralentirent sa douleur et éteignirent sa passion », analysez le groupe « le temps et l'absence ».","reponse":"Le groupe « le temps et l'absence » est un groupe nominal coordonné (deux noms reliés par la conjonction de coordination « et »). Sa fonction est sujet des deux verbes coordonnés « ralentirent » et « éteignirent », tous deux au passé simple à la 3ᵉ personne du pluriel, ce qui justifie leur accord en nombre avec un sujet composé de deux éléments. Ces
