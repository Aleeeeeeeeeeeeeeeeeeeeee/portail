mbe. »</td><td><strong>Pose un fait, un constat</strong>. <em>Cela installe le décor, le ton neutre ou descriptif.</em></td></tr><tr><td><strong>Phrase interrogative</strong></td><td>Pose une question (?).</td><td>« Que reste-t-il de nos amours ? »</td><td><strong>Crée un dialogue, une attente, un doute</strong>. <em>Cela engage le lecteur, traduit le questionnement intérieur.</em></td></tr><tr><td><strong>Phrase exclamative</strong></td><td>Exprime une émotion vive (!).</td><td>« Ô rage ! ô désespoir ! »</td><td><strong>Traduit l'intensité affective</strong>. <em>Cela révèle l'emportement, l'admiration, l'indignation.</em></td></tr><tr><td><strong>Phrase injonctive</strong></td><td>Donne un ordre, un conseil (impératif).</td><td>« Cueille dès aujourd'hui les roses de la vie. »</td><td><strong>Vise à agir sur le destinataire</strong>. <em>Cela traduit l'autorité, l'exhortation, l'invitation pressante.</em></td></tr><tr><td><strong>Modalisateurs</strong></td><td>Marques du <strong>jugement / de la subjectivité</strong> du locuteur (adverbes, verbes d'opinion, conditionnel, lexique évaluatif).</td><td><em>peut-être, sans doute, je crois, hélas, heureusement.</em></td><td><strong>Révèlent la position du locuteur</strong> (certitude, doute, jugement). <em>Cela trahit la subjectivité, l'implication ou la prudence de celui qui parle.</em></td></tr><tr><td><strong>Discours direct</strong></td><td>Paroles <strong>rapportées telles quelles</strong> (guillemets, tirets).</td><td>— « Je pars. »</td><td><strong>Vivacité, présence des voix, théâtralité</strong>. <em>Cela donne l'illusion d'entendre directement le personnage.</em></td></tr><tr><td><strong>Discours indirect</strong></td><td>Paroles <strong>rapportées via une subordonnée</strong>.</td><td>« Il dit qu'il partait. »</td><td><strong>Distance, intégration au récit</strong>. <em>Cela soumet la parole au filtre du narrateur.</em></td></tr><tr><td><strong>Discours indirect libre</strong></td><td>Paroles/pensées <strong>fondues dans le récit</strong>, sans verbe introducteur ni subordination.</td><td>« Il était furieux. Pourquoi l'avait-elle abandonné ? »</td><td><strong>Fusionne voix du narrateur et du personnage</strong>. <em>Cela crée l'ambiguïté, l'intériorité, l'ironie (très exploité par Flaubert).</em></td></tr><tr><td><strong>Apostrophe</strong></td><td>Interpellation <strong>directe</strong> d'un être, présent ou absent, ou d'une chose.</td><td>« Ô toi, Soleil ! »</td><td><strong>Crée une adresse, une présence, du lyrisme ou de l'emphase</strong>. <em>Cela instaure un dialogue, donne de l'élan oratoire.</em></td></tr><tr><td><strong>Prosopopée</strong></td><td>Faire <strong>parler</strong> un mort, un absent, une chose, une abstraction.</td><td>La Patrie qui s'adresse aux soldats.</td><td><strong>Donne voix à l'inanimé</strong>. <em>Cela dramatise, solennise, fait porter un message par une instance supérieure.</em></td></tr><tr><td><strong>Question rhétorique</strong></td><td>Fausse question <strong>dont la réponse est évidente</strong> (n'attend pas de réponse).</td><td>« Qui pourrait rester insensible à un tel malheur ? »</td><td><strong>Affirme avec force par le détour de la question</strong>. <em>Cela emporte l'adhésion, souligne une évidence, donne un ton oratoire.</em></td></tr><tr><td><strong>Ironie</strong></td><td>Dire le <strong>contraire</strong> de ce qu'on pense pour railler/critiquer (antiphrase, hyperbole, décalage).</td><td>« Quel courage ! » (à un lâche).</td><td><strong>Crée une distance critique et une connivence</strong> avec le lecteur. <em>Cela dénonce en feignant, exige la complicité du destinataire.</em></td></tr></tbody></table><h2>10. REGISTRES LITTÉRAIRES (la tonalité dominante)</h2><blockquote>Un registre = l'<strong>effet produit sur le lecteur</strong> + ses <strong>marques repérables</strong>. À l'oral : nommer le registre, le justifier par des marques, dire ce qu'il vise.</blockquote><table><thead><tr><th>Registre</th><th>Vise à…</th><th>Marques repérables</th><th>Effet / interprétation</th></tr></thead><tbody><tr><td><strong>Comique</strong></td><td>Faire <strong>rire / sourire</strong>.</td><td>5 ressorts (voir ci-dessous).</td><td>Divertit, mais aussi <strong>critique</strong> (souvent au service de la satire).</td></tr><tr><td>→ <em>comique de mots</em></td><td></td><td>jeux de mots, quiproquos, patois, répétitions verbales, jargon.</td><td>Le langage lui-même fait rire.</td></tr><tr><td>→ <em>comique de gestes</em></td><td></td><td>coups, chutes, grimaces, mimiques, poursuites.</td><td>Le corps, le mouvement déclenchent le rire (farce).</td></tr><tr><td>→ <em>comique de situation</em></td><td></td><td>quiproquos, malentendus, rebondissements, surprises.</td><td>La situation absurde ou inattendue amuse.</td></tr><tr><td>→ <em>comique de caractère</em></td><td></td><td>défaut poussé à l'excès (avare, hypocrite, vaniteux).</td><td>Le rire naît de l'outrance d'un type humain.</td></tr><tr><td>→ <em>comique de répétition</em></td><td></td><td>retour d'une réplique, d'un gag (« Sans dot ! »).</td><td>L'insistance crée un effet mécanique et drôle.</td></tr><tr><td><strong>Tragique</strong></td><td>Susciter <strong>terreur et pitié</strong> face à un destin écrasant.</td><td>fatalité, mort, dilemme, lexique du destin/des dieux, exclamations, souffrance.</td><td><em>Cela traduit l'impuissance de l'homme face à une force qui le dépasse.</em></td></tr><tr><td><strong>Pathétique</strong></td><td>Émouvoir, susciter la <strong>compassion</strong>.</td><td>lexique de la souffrance, exclamations, interjections, hyperboles, larmes.</td><td><em>Cela apitoie le lecteur, le fait communier à la douleur du personnage.</em></td></tr><tr><td><strong>Lyrique</strong></td><td>Exprimer les <strong>sentiments personnels</strong> (amour, mélancolie, joie…).</td><td>1re pers., apostrophes, exclamations, champ lexical des sentiments, musicalité.</td><td><em>Cela traduit l'épanchement du moi, invite le lecteur à partager l'émotion.</em></td></tr><tr><td><strong>Épique</strong></td><td><strong>Grandir, magnifier</strong> une action, un héros.</td><td>hyperboles, pluriels, énumérations, gradation, merveilleux, champ lexical du combat.</td><td><em>Cela donne une dimension surhumaine, collective et grandiose.</em></td></tr><tr><td><strong>Satirique</strong></td><td><strong>Critiquer en se moquant</strong>.</td><td>ironie, caricature, exagération, péjoratifs, ridicule.</td><td><em>Cela dénonce un travers par le rire, vise à corriger les mœurs.</em></td></tr><tr><td><strong>Polémique</strong></td><td><strong>Attaquer, dénoncer</strong> avec vigueur (frontal).</td><td>apostrophes, questions rhétoriques, lexique dévalorisant, ponctuation forte, hyperboles.</td><td><em>Cela engage un combat d'idées, prend le lecteur à témoin.</em></td></tr><tr><td><strong>Didactique</strong></td><td><strong>Instruire, transmettre</strong> un savoir/une leçon.</td><td>présent de vérité générale, structure logique, exemples, ton démonstratif, maximes.</td><td><em>Cela vise à convaincre/éduquer, dégage un enseignement.</em></td></tr><tr><td><strong>Fantastique</strong></td><td>Créer l'<strong>hésitation</strong> entre réel et surnaturel (+ inquiétude).</td><td>modalisateurs du doute (<em>peut-être, comme si</em>), surnaturel, peur, cadre réaliste qui bascule.</td><td><em>Cela installe l'incertitude et l'angoisse, brouille le réel.</em></td></tr><tr><td><strong>Élégiaque</strong></td><td>Exprimer la <strong>plainte mélancolique</strong> (deuil, regret, amour perdu).</td><td>lyrisme + tristesse, regret, fuite du temps, apostrophes plaintives.</td><td><em>Cela traduit le chagrin nostalgique, la déploration.</em></td></tr></tbody></table><h2>11. VERSIFICATION (poésie)</h2><h3>a) Compte des syllabes</h3><p>On compte les syllabes <strong>prononcées</strong>. Le <strong>e muet</strong> : il <strong>compte</strong> s'il est suivi d'une consonne prononcée ; il <strong>ne compte pas</strong> en fin de vers ni devant une voyelle (élision).</p><h3>b) Les mètres (longueur du vers)</h3><table><thead><tr><th>Mètre</th><th>Nb de syllabes</th><th>Effet / connotation</th></tr></thead><tbody><tr><td><strong>Alexandrin</strong></td><td>12</td><td>Vers noble, ample, classique. <em>Convient au tragique, à l'épique, à la méditation.</em></td></tr><tr><td><strong>Décasyllabe</strong></td><td>10</td><td>Vers narratif et chantant (épopée médiévale).</td></tr><tr><td><strong>Octosyllabe</strong></td><td>8</td><td>Vers vif, léger, lyrique.</td></tr><tr><td>Hexasyllabe, heptasyllabe…</td><td>6, 7…</td><td>Vers brefs : légèreté, rapidité, fragilité.</td></tr></tbody></table><h3>c) Diérèse / synérèse</h3><ul><li><strong>Diérèse</strong> : prononcer en <strong>deux syllabes</strong> un groupe vocalique (« li-on », « pa-ssi-on »). <em>Cela allonge, met en relief, accentue la sonorité ou l'émotion.</em></li><li><strong>Synérèse</strong> : prononcer en <strong>une seule syllabe</strong> un groupe vocalique (« hier », « lion » en 1 syllabe). <em>Cela resserre, accélère.</em></li></ul><h3>d) Césure et hémistiches</h3><ul><li><strong>Césure</strong> : coupe principale à l'intérieur du vers. Dans l'alexandrin classique : <strong>après la 6ᵉ syllabe</strong> (6 / 6).</li><li><strong>Hémistiches</strong> : les deux moitiés ainsi délimitées. <em>Une césure bien placée crée l'équilibre ; le trimètre romantique (4/4/4) brise le rythme classique pour suggérer le mouvement ou la passion.</em></li></ul><h3>e) Les rimes</h3><p><strong>Disposition :</strong></p><table><thead><tr><th>Type</th><th>Schéma</th><th>Effet</th></tr></thead><tbody><tr><td><strong>Plates (suivies)</strong></td><td>AABB</td><td>Continuité, simplicité, progression.</td></tr><tr><td><strong>Croisées</strong></td><td>ABAB</td><td>Alternance, dynamisme, dialogue des sons.</td></tr><tr><td><strong>Embrassées</strong></td><td>ABBA</td><td>Enveloppement, effet de cadre/clôture.</td></tr></tbody></table><p><strong>Qualité</strong> (selon le nombre de sons communs) : <strong>pauvre</strong> = 1 son (<em>ami / fini</em>) ; <strong>suffisante</strong> = 2 sons (<em>bonheur / malheur</em>) ; <strong>riche</strong> = 3 sons ou + (<em>image / hommage</em>). <em>Une rime riche renforce la musicalité et le lien de sens entre les mots rimés.</em></p><p><strong>Genre</strong> : rime <strong>féminine</strong> = finit par un <strong>e muet</strong> (<em>belle / nouvelle</em>) ; rime <strong>masculine</strong> = ne finit <strong>pas</strong> par un e muet (<em>amour / toujours</em>). <em>L'alternance était la règle classique ; sa rupture est signifiante.</em></p><h3>f) Les strophes</h3><p>Distique (2), tercet (3), quatrain (4), quintil (5), sizain (6), huitain (8), dizain (10). <em>Le sonnet = 2 quatrains + 2 tercets ; sa « chute » (dernier vers) est souvent le moment-clé à analyser.</em></p><h3>g) Rejet / enjambement / contre-rejet</h3><ul><li><strong>Enjambement</strong> : la phrase déborde le vers → <em>continuité, élan, débordement de l'émotion.</em></li><li><strong>Rejet</strong> : mot bref rejeté au vers suivant → <em>mise en relief brutale de ce mot.</em></li><li><strong>Contre-rejet</strong> : mot bref en fin de vers annonçant la suite → <em>suspension, attente.</em></li></ul><h3>h) Vers libre</h3><p>Vers <strong>sans mètre ni rime réguliers</strong> (Rimbaud, Apollinaire, surréalistes, Dorion). <em>Cela libère le rythme du carcan classique, épouse la liberté de l'émotion ou de la pensée.</em></p><h2>12. Passer du repérage à l'interprétation (LE point décisif)</h2><p>On ne nomme JAMAIS un procédé pour lui-même. On suit toujours la chaîne :</p><blockquote><strong>CITATION</strong> (le mot exact, entre guillemets) → <strong>PROCÉDÉ</strong> (nommé précisément) → <strong>EFFET</strong> (ce que ça produit) → <strong>SENS</strong> (ce que ça révèle du projet du texte / de l'auteur).</blockquote><p>Formules-relais utiles : <em>« cela traduit… », « cela souligne… », « cela crée… », « ce qui met en valeur… », « comme le montre… », « on perçoit alors… », « l'auteur suggère ainsi… ».</em></p><p><strong>Exemple 1 — la métaphore.</strong> Lorsque le poète écrit « mon cœur est un volcan », il recourt à une <strong>métaphore</strong> qui assimile le sentiment à une force tellurique : cela <strong>crée une image d'intensité explosive</strong> et <strong>traduit une passion incontrôlable, prête à déborder</strong>.</p><p><strong>Exemple 2 — l'allitération (toujours reliée au sens).</strong> L'allitération en [r] dans « les rocs durs et farouches » fait entendre une <strong>âpreté rugueuse</strong> qui <strong>mime la dureté minérale du paysage et renforce l'impression d'hostilité</strong>.</p><p><strong>Exemple 3 — le rythme ternaire.</strong> La gradation ternaire « il pleure, il supplie, il s'effondre » crée un <strong>crescendo émotionnel</strong> qui <strong>traduit l'effondrement progressif du personnage et sa perte totale de maîtrise</strong>.</p><p><strong>Pièges à éviter à l'oral</strong> : cataloguer sans interpréter ; faire dire à une sonorité un sens indépendant des mots ; plaquer un effet tout fait sans le rattacher au projet du passage ; oublier de citer précisément (pas de citation = pas de preuve).</p>";
const PLANNING_HTML = "<h1>Apprendre 15 explications en 5 jours — la méthode prouvée</h1><blockquote>La règle d'or : <strong>se tester vaut bien plus que relire.</strong> Relire donne une illusion de maîtrise. À l'oral, on ne te demande pas de <em>reconnaître</em> ton analyse, on te demande de la <strong>produire</strong> sans support. Donc on s'entraîne à produire.</blockquote><h2>1. Pourquoi relire ne marche pas (et quoi faire à la place)</h2><p>Relire ses fiches crée une <strong>illusion de savoir</strong> : le texte devient familier, donc on croit le connaître. Mais reconnaître ≠ restituer. Dans l'étude de référence (Roediger &amp; Karpicke), ceux qui se <strong>testaient</strong> retenaient <strong>50 % de plus</strong> une semaine plus tard que ceux qui relisaient — en moins de temps.</p><p><strong>Les 7 leviers à activer :</strong></p><ol><li><strong>Récupération active (active recall)</strong> — LE levier n°1. Cacher la fiche et réciter de tête. Chaque récupération renforce la mémoire et révèle les trous.</li><li><strong>Répétition espacée</strong> — Revoir chaque texte <strong>tous les 1-2 jours</strong> plutôt que tout d'un coup. Active recall + espacement = même contenu appris en <strong>~40 % de temps en moins</strong>.</li><li><strong>Interleaving (alternance)</strong> — Mélanger les textes (A, puis C, puis F…) au lieu d'enchaîner 5 passes du même. Plus dur sur le moment, bien meilleure rétention, et ça entraîne à <em>basculer</em> d'un texte à l'autre — exactement ce qui arrive le jour J.</li><li><strong>Élaboration</strong> — Se demander <em>pourquoi</em> (pourquoi ce procédé produit cet effet ?). Ce qui est compris se reconstruit ; ce qui est appris par cœur se bloque.</li><li><strong>Effet de production</strong> — Réciter <strong>à voix haute</strong> est bien mieux mémorisé que lire en silence. Double bénéfice pour un oral.</li><li><strong>Chunking</strong> — Découper en <strong>mouvements → idées-clés → ancres</strong>. On retient une structure de 5-6 ancres, pas un pavé de 600 mots.</li><li><strong>Dual coding</strong> — Coder en mots <strong>+</strong> en visuel (schéma, pictogramme par procédé). Si le mot ne vient pas, l'image le déclenche.</li></ol><h2>2. Comment mémoriser une explication orale</h2><h3>Règle absolue : NE PAS apprendre mot à mot</h3><p>Tout réciter par cœur est le <strong>piège mortel</strong> : un mot oublié = blanc total + panique, et le ton récité plafonne la note. À la place, mémorise <strong>trois couches</strong> :</p><table><thead><tr><th>Couche</th><th>Ce qu'on mémorise</th><th>Précision</th></tr></thead><tbody><tr><td><strong>1. Le PLAN à ancres</strong></td><td>5-6 mouvements/étapes + l'idée directrice de chacun</td><td>Structure, reconstructible</td></tr><tr><td><strong>2. Les FORMULES-CLÉS</strong></td><td>2-3 phrases ciselées (problématique, transitions, chute de la conclusion)</td><td>Mot à mot, mais court</td></tr><tr><td><strong>3. Les CITATIONS + procédés</strong></td><td>Citation exacte ↔ procédé ↔ effet</td><td>Mot à mot pour la citation seulement</td></tr></tbody></table><p>Tout le reste s'<strong>improvise à partir des ancres</strong>, avec des mots un peu différents à chaque fois. C'est ça qui donne le ton naturel et qui te protège du blanc.</p><h3>Les flashcards en récupération active</h3><ul><li>On lit le recto, on <strong>récite le verso à voix haute SANS regarder</strong>, <em>puis</em> on vérifie. La vérification vient toujours <strong>après</strong> l'effort.</li><li>On trie en 3 tas : <strong>su / hésitant / raté</strong>. Les ratés repassent dans 10 min ; les hésitants le lendemain ; les su 2 jours plus tard (= répétition espacée à la main, système Leitner).</li><li><strong>Mélanger les paquets de plusieurs textes</strong> (interleaving).</li></ul><h3>S'enregistrer, marcher, expliquer</h3><ul><li><strong>S'enregistrer puis se réécouter</strong> : le miroir le plus honnête (trous, « euh », débit, ton récité).</li><li><strong>Réciter debout / en marchant</strong> : posture du jour J, meilleure oxygénation et ancrage.</li><li><strong>Technique Feynman</strong> : expliquer le texte à quelqu'un (ou à une chaise) <strong>sans notes</strong>. Là où tu bafouilles, tu n'as pas compris → tu combles, puis tu réexpliques.</li></ul><h3>Citation ↔ procédé ↔ effet (ce qui fait le 20)</h3><ol><li><strong>Toujours apprendre le trio ensemble</strong>, jamais la citation seule.</li><li><strong>Un pictogramme par procédé</strong> (une vague = allitération, deux flèches croisées = chiasme, un escalier = gradation…).</li><li><strong>Ancrer la citation à sa position</strong> dans le texte (début/milieu/fin de mouvement).</li><li><strong>Se tester dans les deux sens</strong> : citation → procédé/effet ET procédé → où + effet.</li><li><strong>Phrase-pont type</strong> à automatiser : « <em>[citation]</em> : par [procédé], l'auteur [effet] ». Une seule mécanique pour toutes tes citations.</li></ol><h2>3. Le planning jour par jour</h2><p><strong>Hypothèses :</strong> 15 textes, ~4 h de travail efficace/jour, le reste = vie normale. <strong>Pomodoro : 25 min travail / 5 min pause</strong>, pause longue 20-30 min après 4 Pomodoros. <strong>Sommeil 8 h non négociable</strong> (la mémoire se consolide en dormant). On répartit en <strong>3 lots de 5</strong> (Lot A : textes 1-5 ; Lot B : 6-10 ; Lot C : 11-15).</p><h3>J-5 — Construire les outils + Lot A</h3><ul><li><strong>Matin (2 P)</strong> : fabriquer les <strong>fiches-plan</strong> (ancres + pictogrammes) des Lots A et B. On structure, on ne mémorise pas encore.</li><li><strong>Après-midi (3 P)</strong> : Lot A → lire chaque explication à voix haute 1 fois, puis <strong>réciter le plan de tête</strong> (même imparfait), créer les flashcards citations. Finir par un <strong>test à blanc</strong> debout.</li><li><strong>Soir (10 min)</strong> : se tester sur les 5 cartes-plan du Lot A. Dormir 8 h.</li></ul><h3>J-4 — Lot B + rappel du Lot A</h3><ul><li><strong>Matin (2 P)</strong> : <strong>Réactiver le Lot A</strong> (active recall, cartes mélangées). Repérer les textes fragiles.</li><li><strong>Après-midi (3 P)</strong> : Lot B, même protocole (voix haute → plan → flashcards → test debout).</li><li><strong>Soir</strong> : <strong>enregistrer</strong> un texte du Lot A + un du Lot B, réécoute critique. 8 h.</li></ul><h3>J-3 — Lot C + rappels A &amp; B (interleaving)</h3><ul><li><strong>Matin (2 P)</strong> : fiches-plan + premier contact <strong>Lot C</strong>.</li><li><strong>Après-midi (3 P)</strong> : 1 P <strong>interleaving A+B</strong> (cartes au hasard, tous textes mélangés) ; 1 P finir le Lot C ; 1 P <strong>Feynman</strong> (expliquer 2 textes à un proche).</li><li><strong>Soir</strong> : flashcards <strong>grammaire</strong> (créer + tester). 8 h.</li></ul><h3>J-2 — Tout est vu : mode ORAL BLANC</h3><ul><li><strong>Matin (3 P)</strong> : <strong>3 oraux blancs complets</strong> chronométrés (~8 min : intro + lecture + analyse + conclusion), enregistrés, en priorité sur les textes faibles. Réécoute + correction.</li><li><strong>Après-midi (2 P)</strong> : interleaving de <strong>toutes</strong> les citations (3 lots mélangés) ; préparer la <strong>présentation de l'œuvre</strong> + anticiper 5 questions d'entretien.</li><li><strong>Soir</strong> : tester seulement les cartes encore hésitantes/ratées. 8 h.</li></ul><h3>J-1 — Consolidation, zéro panique, zéro nouveauté</h3><ul><li><strong>Matin (2-3 P)</strong> : <strong>tour des 15 cartes-plan</strong> récitées de tête, debout, mélangées ; 2 oraux blancs sur les 2 textes les plus fragiles ; révision grammaire + 1 passage de la présentation d'œuvre.</li><li><strong>Après-midi</strong> : <strong>STOP révisions de fond.</strong> Relecture en survol seulement (le seul moment OK pour relire). Préparer le matériel (convocation, pièce d'identité, œuvre, de quoi écrire).</li><li><strong>Soir</strong> : détente, aucun nouveau contenu, coucher tôt. Le sommeil de la veille = la révision la plus rentable.</li></ul><h3>JOUR J</h3><ul><li><strong>Réveil avec marge</strong>, petit-déjeuner, arriver en avance.</li><li><strong>Pas de bachotage</strong> anxiogène : juste un survol calme des 15 cartes-plan.</li><li><strong>Pendant les 30 min de préparation</strong> : structurer le texte imposé sur le brouillon <strong>en ancres</strong> (problématique en haut, mouvements numérotés, citations + procédés + effets en mots-clés).</li><li><strong>Confiance</strong> : tu as vu chaque texte 3-4 fois en récupération active espacée et passé plusieurs oraux blancs. Le travail est fait.</li></ul><h2>4. Lecture expressive &amp; gestion du stress</h2><h3>Travailler la lecture notée (≈ 2 points)</h3><ul><li><strong>Comprendre avant de lire</strong> : repérer la ponctuation, la syntaxe, les vraies pauses.</li><li><strong>Marquer le texte</strong> au brouillon : <code>/</code> pause courte, <code>//</code> pause longue, souligner les mots à accentuer, flèches pour l'intonation.</li><li><strong>Respecter les vers</strong> (marquer les enjambements : ne pas s'arrêter en fin de vers si la phrase continue) sans scansion mécanique.</li><li><strong>Lire lentement</strong> (le trac accélère toujours), articuler, varier l'intonation selon le sens.</li></ul><h3>Respiration anti-trac</h3><p>La respiration contrôlée <strong>réduit l'anxiété</strong> et améliore la performance ; 5 min suffisent à aider.</p><ul><li><strong>Respiration abdominale</strong> : main sur le ventre, inspirer par le nez en gonflant le ventre, expirer lentement.</li><li><strong>Box breathing / cohérence cardiaque</strong> : inspirer 4 s → retenir 4 s → expirer 4 s → retenir 4 s. À faire <strong>5 min juste avant d'entrer</strong>.</li><li><strong>4-7-8</strong> (panique) : inspirer 4 s, retenir 7 s, expirer 8 s.</li></ul><h3>Tactique le jour J</h3><ul><li><strong>30 s de respiration</strong> avant même de lire le texte.</li><li><strong>Reconnaître le texte</strong> : c'est l'un des tiens, déjà travaillé 3-4 fois.</li><li><strong>Brouillon en ancres, pas en phrases rédigées</strong>.</li><li><strong>Démarrer lentement</strong> : la première phrase posée donne le ton. Si blanc : respirer, regarder le brouillon (les ancres sont là pour ça), reprendre. Un silence court est invisible, la panique non.</li><li><strong>Regarder l'examinateur</strong>, lui parler (ne pas réciter dans le vide). Posture droite, épaules ouvertes.</li></ul><blockquote><strong>En une phrase :</strong> tu ne « graves » pas 15 textes en relisant — tu <strong>te testes à voix haute, en mélangeant les textes, à intervalles croissants, sur des ancres et des trios citation/procédé/effet</strong> — et tu dors. C'est le chemin le plus court ET le moins épuisant vers la maîtrise.</blockquote><p><em>Sources : testing effect (Roediger &amp; Karpicke) ; active recall &amp; spaced repetition (méta-analyses) ; interleaving ; production effect (MacLeod &amp; Bodner) ; respiration &amp; anxiété d'examen (Frontiers in Psychology).</em></p>";

/* ============ helpers ============ */
const $ = (s,r=document)=>r.querySelector(s);
const esc = s => (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const objKey = o => /théâtre|theatre/i.test(o)?"theatre":/roman|récit/i.test(o)?"roman":/poésie|poesie/i.test(o)?"poesie":"idees";
const objShort = {theatre:"Théâtre",roman:"Roman",poesie:"Poésie",idees:"Littérature d'idées"};
const store={
  get(k,d){try{const v=localStorage.getItem("bacfr_"+k);return v==null?d:JSON.parse(v)}catch(e){return d}},
  set(k,v){try{localStorage.setItem("bacfr_"+k,JSON.stringify(v))}catch(e){}}
};
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1900);}

/* give each text a stable index/id & lot */
TEXTES.forEach((t,i)=>{t._i=i;t._k=objKey(t.objet);t._lot=i<5?"A":i<10?"B":"C";});

/* ============ countdown ============ */
function examDate(){return store.get("examDate","2026-06-30");}
function daysLeft(){
  const d=new Date(examDate()+"T08:00:00");const now=new Date();
  return Math.ceil((d-now)/86400000);
}
function renderCountdown(){
  const n=daysLeft();const el=$("#cdNum");
  if(isNaN(n)){el.textContent="–";return;}
  el.textContent=n<0?"✓":("J-"+Math.max(n,0));
  $("#cdLbl").textContent=n<0?"oral passé · bravo":n===0?"c'est aujourd'hui !":n===1?"jour restant":"jours restants";
}
$("#countBadge").onclick=()=>{
  const v=prompt("Date de ton oral (format AAAA-MM-JJ) :",examDate());
  if(v&&/^\d{4}-\d{2}-\d{2}$/.test(v)){store.set("examDate",v);renderCountdown();renderRoute();}
};

let route={view:"accueil",arg:null};
function go(view,arg){route={view,arg};location.hash=view+(arg?":"+arg:"");window.scrollTo({top:0,behavior:"instant"});renderRoute();}
window.addEventListener("hashchange",()=>{const h=location.hash.slice(1);if(!h)return;const[v,a]=h.split(":");if(route.view!==v||route.arg!=(a||null)){route={view:v,arg:a||null};renderRoute(true);}});
document.addEventListener("click",e=>{const g=e.target.closest("[data-go]");if(g){go(g.dataset.go,g.dataset.arg||null);}});

/* ============ status (su / à revoir) ============ */
function status(){return store.get("status",{});}

/* ============ ROUTER ============ */
function renderRoute(fromHash){
  renderNav(route.view);
  const app=$("#app");
  if(route.view==="accueil")app.innerHTML=viewAccueil();
  else if(route.view==="textes")app.innerHTML=viewTextes();
  else if(route.view==="texte")app.innerHTML=viewTexteDetail(route.arg);
  else if(route.view==="flash"){app.innerHTML=viewFlashShell();initFlash();}
  else if(route.view==="quiz"){app.innerHTML=viewQuizShell();initQuiz();}
  else if(route.view==="memo")app.innerHTML=`<div class="view"><div class="eyebrow">Mémo</div><h1 style="margin-top:0">Les procédés & leurs effets</h1><input class="searchbar" id="memoSearch" placeholder="🔍 Filtrer un procédé (ex : métaphore, anaphore…)"><div class="prose" id="memoProse">${PROCEDES_HTML}</div></div>`,initMemoSearch();
  else if(route.view==="methode")app.innerHTML=`<div class="view prose">${METHODO_HTML}</div>`;
  else if(route.view==="planning"){app.innerHTML=viewPlanning();initPlanning();}
  else {route.view="accueil";app.innerHTML=viewAccueil();}
}

     <div class="cd-row">
       <div class="cd-stat"><div class="n">${isNaN(daysLeft())?"–":"J-"+Math.max(daysLeft(),0)}</div><div class="l">avant l'oral</div></div>
       <div class="cd-stat"><div class="n">${done}/15</div><div class="l">textes maîtrisés</div></div>
       <div class="cd-stat"><div class="n">${TEXTES.length}</div><div class="l">explications prêtes</div></div>
     </div>
     <div style="margin-top:24px;display:flex;gap:10px;flex-wrap:wrap">
       <button class="btn primary" data-go="planning">📅 Voir mon planning J-5</button>
       <button class="btn" data-go="flash">🃏 Lancer des flashcards</button>
       <button class="btn" data-go="textes">📖 Mes textes</button>
     </div>
   </div>

   <div class="section-title"><h2>Les 3 règles qui font la différence</h2><span class="ln"></span></div>
   <div class="grid g3">
     ${ruleCard("🎯","Se tester, pas relire","Cache la réponse, récite de tête à voix haute, puis vérifie. C'est l'unique méthode qui fait vraiment retenir.")}
     ${ruleCard("🔀","Espacer & mélanger","Revois chaque texte tous les 1-2 jours, et alterne les textes au hasard. Plus dur sur le moment = bien mieux retenu.")}
     ${ruleCard("🗣️","Citation → procédé → effet","Ne jamais réciter une citation seule : toujours le trio. C'est exactement ce qui sépare un 14 d'un 20.")}

  </div>`;
}
function ruleCard(ic,h,p){return `<div class="card rule-card"><div class="ic">${ic}</div><div><h4>${h}</h4><p>${p}</p></div></div>`;}

/* ============ TEXTES LIST ============ */
function groupByObjet(){
  const g={theatre:[],roman:[],poesie:[],idees:[]};
  TEXTES.forEach(t=>g[t._k].push(t));
  Object.keys(g).forEach(k=>{if(!g[k].length)delete g[k]});
  return g;
}
function viewTextes(){
  const g=groupByObjet();const s=status();
  let html=`<div class="view"><div class="eyebrow">Tes lectures</div><h1 style="margin-top:0">Mes 15 textes</h1><p class="muted">Clique sur un texte pour ouvrir son explication linéaire complète. Le <b>Mode test</b> y masque les analyses pour t'auto-interroger.</p>`;
  Object.keys(g).forEach(k=>{
    html+=`<div class="section-title"><span class="obj-tag o-${k}"><span class="dot o-${k}"></span>${objShort[k]}</span><span class="ln"></span></div><div class="grid g2">`;
    g[k].forEach(t=>{
      const st=s[t._i];
      html+=`<div class="card click tcard" style="--bord:var(--${k})" data-go="texte" data-arg="${t._i}">
        ${st==="su"?'<span class="statusdot chk" title="Maîtrisé">● su</span>':st==="revoir"?'<span class="statusdot" style="color:var(--warn)">● à revoir</span>':''}
        <span class="badge ${/intégrale/i.test(t.statut)?'oi':''}">${/intégrale/i.test(t.statut)?'Œuvre intégrale':'Texte complémentaire'}</span>
        <h3>${esc(t.auteur)}</h3>
        <div class="ref">${esc(t.titre)} · ${esc(t.reference||'')} · ${esc(t.date||'')}</div>
        <p class="flash">${esc(t.resumeFlash||'')}</p>
      </div>`;
    });
    html+=`</div>`;
  });
  return html+`</div>`;
}

  const k=t._k;const s=status();const st=s[t._i];
  const testMode=store.get("testMode",false);
  const prev=TEXTES[+idx-1],next=TEXTES[+idx+1];
  const intro=t.intro||{};
  let mv=(t.mouvements||[]).map((m,mi)=>{
    const anas=(m.analyse||[]).map(a=>`<div class="ana ${testMode?'hide-ef':''}" onclick="this.classList.toggle('reveal')">
        <div class="cit">${esc(a.citation)}</div>
        <span class="pr">${esc(a.procede)}</span>
        <p class="ef">${esc(a.effet)}</p>
      </div>`).join("");
    return `<div class="mv">
      <div class="mv-h">${esc(m.titre)}</div>
      <div class="mv-body">${anas}${m.bilan?`<div class="mv-bilan"><b>Bilan ›</b> ${esc(m.bilan)}</div>`:''}</div>
    </div>`;
  }).join("");
  return `<div class="view">
    <button class="btn sm" data-go="textes">‹ Tous les textes</button>
    <div class="detail-head" style="margin-top:14px">
      <span class="obj-tag o-${k}"><span class="dot o-${k}"></span>${objShort[k]} · ${esc(t.parcours||'')}</span>
      <div class="au">${esc(t.auteur)}</div>
      <div class="ti">${esc(t.titre)}${t.reference?` — ${esc(t.reference)}`:''}</div>
      <div class="meta-row">
        <span class="m">${esc(t.date||'')}</span>
        <span class="m">${esc(t.mouvementLitteraire||'')}</span>
        <span class="m">${/intégrale/i.test(t.statut)?'Œuvre intégrale':'Texte complémentaire'}</span>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn sm ${testMode?'on':''}" id="testToggle">${testMode?'👁 Mode test : ON':'🙈 Mode test'}</button>
      <button class="btn sm ${st==='su'?'on':''}" id="suBtn">✓ Su</button>
      <button class="btn sm ${st==='revoir'?'on':''}" id="revoirBtn">↻ À revoir</button>
      <span class="spacer"></span>
      <button class="btn sm" data-go="flash" data-arg="t${t._i}">🃏 Réviser ce texte</button>
    </div>

    <div class="block"><div class="block-label">Introduction</div>
      ${introPart("Amorce",intro.amorce)}
      ${introPart("Présentation (auteur · œuvre · mouvement · parcours)",intro.presentationAuteurOeuvre)}

      <div class="intro-part pb"><div class="k" style="color:var(--accent)">Problématique</div><div class="v">${esc(intro.problematique)}</div></div>

/* ============ FLASHCARDS ============ */
function buildDeck(scope){
  let texts=TEXTES;
  if(scope&&scope[0]==="t")texts=[TEXTES[+scope.slice(1)]];
  else if(scope&&scope[0]==="o")texts=TEXTES.filter(t=>t._k===scope.slice(1));
  const cards=[];
  texts.forEach(t=>{
    const plan=`Problématique : ${(t.intro||{}).problematique||''}\n\nMouvements :\n`+(t.mouvements||[]).map((m,i)=>`${i+1}. ${m.titre}`).join("\n");
    cards.push({id:`p${t._i}`,kind:"Plan & problématique",tref:`${t.auteur} — ${t.titre}`,front:`Plan du texte : ${t.auteur}, « ${t.titre} »`,pr:"",back:plan,plan:true});
    (t.mouvements||[]).forEach(m=>(m.analyse||[]).forEach((a,j)=>{
      cards.push({id:`c${t._i}_${m.titre.length}_${j}`,kind:"Citation → procédé → effet",tref:`${t.auteur} — ${t.titre}`,front:a.citation,pr:a.procede,back:a.effet});
    }));
  });
  return cards;
}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
let FC={deck:[],pos:0,piles:{su:0,hesite:0,rate:0}};
function viewFlashShell(){
  const opts=`<option value="all">Tous les textes (interleaving)</option>`+
    Object.keys(groupByObjet()).map(k=>`<option value="o${k}">— ${objShort[k]} (tout)</option>`).join("")+
    TEXTES.map(t=>`<option value="t${t._i}">${esc(t.auteur)} — ${esc(t.titre)}</option>`).join("");
  return `<div class="view"><div class="eyebrow">Récupération active</div><h1 style="margin-top:0">Flashcards</h1>
    <p class="muted">Lis le recto, <b>récite la réponse à voix haute SANS retourner</b>, puis clique pour vérifier. Sois honnête : « Su / Hésité / Raté » trie tes cartes.</p>
    <div class="fc-setup">
      <select class="select" id="fcScope">${opts}</select>
      <button class="btn primary" id="fcStart" style="margin-left:8px">Démarrer ▶</button>
    </div>
    <div id="fcArea"></div>
  </div>`;
}
function initFlash(){
  const pre=route.arg;
  if(pre){$("#fcScope").value=(pre[0]==="t"||pre[0]==="o")?pre:"all";}
  $("#fcStart").onclick=startFlash;
  if(pre)startFlash();
}
function startFlash(){
  const scope=$("#fcScope").value;
  FC.deck=shuffle(buildDeck(scope==="all"?null:scope));
  FC.pos=0;FC.piles={su:0,hesite:0,rate:0};
  if(!FC.deck.length){$("#fcArea").innerHTML="<p class='muted'>Aucune carte.</p>";return;}
  drawCard();
}
function drawCard(){
  const area=$("#fcArea");
  if(FC.pos>=FC.deck.length){
    area.innerHTML=`<div class="card" style="text-align:center"><div class="scorebig">✓</div><h3 style="margin:.2em 0">Paquet terminé !</h3>
      <div class="pilebar"><span style="color:var(--good)">Su ${FC.piles.su}</span><span style="color:var(--warn)">Hésité ${FC.piles.hesite}</span><span style="color:var(--bad)">Raté ${FC.piles.rate}</span></div>
      <p class="muted" style="margin-top:14px">${FC.piles.rate+FC.piles.hesite>0?"Relance pour revoir en priorité ce qui a coincé.":"Parfait. Reviens demain pour l'espacement 👌"}</p>
      <button class="btn primary" onclick="startFlash()" style="margin-top:8px">↻ Recommencer</button>
      ${(FC.piles.rate+FC.piles.hesite)>0?'<button class="btn" id="fcRetryHard" style="margin-left:8px">Revoir seulement les ratées/hésitées</button>':''}
    </div>`;
    if(FC._hard&&FC._hard.length){const b=$("#fcRetryHard");if(b)b.onclick=()=>{FC.deck=shuffle(FC._hard.slice());FC._hard=[];FC.pos=0;FC.piles={su:0,hesite:0,rate:0};drawCard();};}
    return;
  }
  const c=FC.deck[FC.pos];
  area.innerHTML=`<div class="flashwrap">
    <div class="fc-progress">Carte ${FC.pos+1} / ${FC.deck.length}</div>
    <div class="flashcard" id="fcCard">
      <div class="fc-inner">
        <div class="fc-face fc-front">
          <span class="fc-kind">${c.kind}</span><span class="fc-tref">${esc(c.tref)}</span>
          <div class="q">${esc(c.front)}</div>
          <div class="fc-hint">👆 clique pour révéler · 🗣️ récite d'abord à voix haute</div>
        </div>
        <div class="fc-face fc-back">
          <span class="fc-kind">${c.kind}</span><span class="fc-tref">${esc(c.tref)}</span>
          ${c.pr?`<span class="pr">${esc(c.pr)}</span>`:''}
          <div class="a ${c.plan?'plan':''}">${c.plan?esc(c.back).replace(/\n/g,"<br>"):esc(c.back)}</div>
        </div>
      </div>
    </div>
    <div class="fc-actions" id="fcRate" style="display:none">
      <button class="btn" style="border-color:var(--bad);color:var(--bad)" data-rate="rate">Raté</button>
      <button class="btn" style="border-color:var(--warn);color:var(--warn)" data-rate="hesite">Hésité</button>
      <button class="btn" style="border-color:var(--good);color:var(--good)" data-rate="su">Su 👍</button>
    </div>
  </div>`;
  const card=$("#fcCard");
  card.onclick=()=>{card.classList.add("flip");$("#fcRate").style.display="flex";};
  $("#fcRate").querySelectorAll("[data-rate]").forEach(b=>b.onclick=()=>{
    const r=b.dataset.rate;FC.piles[r]++;
    if(r!=="su"){FC._hard=FC._hard||[];FC._hard.push(c);}
    FC.pos++;drawCard();
  });
}

/* ============ QUIZ PROCÉDÉS ============ */
const QUIZ=[
 {q:"« Cette obscure clarté qui tombe des étoiles » — quel procédé ?",o:["Oxymore","Antithèse","Hyperbole","Métonymie"],a:0,e:"Oxymore : deux mots contradictoires dans un même groupe. Effet : exprime une réalité paradoxale, indicible."},
 {q:"Quel procédé : « Je vis, je meurs ; je me brûle et me noie » ?",o:["Antithèse","Oxymore","Litote","Gradation"],a:0,e:"Antithèse : termes opposés rapprochés. Effet : traduit le déchirement intérieur, la contradiction du sentiment."},
 {q:"« Va, je ne te hais point » signifie « je t'aime ». Procédé ?",o:["Litote","Euphémisme","Hyperbole","Ironie"],a:0,e:"Litote : dire moins pour suggérer plus (souvent par négation du contraire). Effet : la pudeur renforce le sens."},
 {q:"Répétition d'un même mot en DÉBUT de vers ou de phrases successives :",o:["Anaphore","Épiphore","Allitération","Gradation"],a:0,e:"Anaphore. Effet : martèle, scande, donne une dimension obsédante ou incantatoire."},
 {q:"« Il était mille fois plus beau que le soleil » :",o:["Hyperbole","Comparaison","Métaphore","Personnification"],a:0,e:"Hyperbole (exagération) — ici doublée d'une comparaison. Effet : amplifie, magnifie."},
 {q:"Répétition d'un même son CONSONANTIQUE :",o:["Allitération","Assonance","Paronomase","Homéotéleute"],a:0,e:"Allitération. Son effet dépend toujours du sens des mots qu'elle relie (sifflement, dureté…)."},
 {q:"Répétition d'un même son VOCALIQUE :",o:["Assonance","Allitération","Anaphore","Rime"],a:0,e:"Assonance. Effet : installe une tonalité, une musicalité dominante."},
 {q:"« La nature pleure, le vent gémit » :",o:["Personnification","Métaphore","Allégorie","Métonymie"],a:0,e:"Personnification : traits humains prêtés à une chose. Effet : anime et dramatise le décor."},
 {q:"« Boire un verre », « lire un Zola » : on désigne par un terme lié logiquement :",o:["Métonymie","Synecdoque","Périphrase","Antonomase"],a:0,e:"Métonymie (contenant pour contenu, auteur pour œuvre). Effet : raccourci expressif."},
 {q:"« L'astre du jour » pour dire « le soleil » :",o:["Périphrase","Métaphore","Métonymie","Antonomase"],a:0,e:"Périphrase : remplacer un mot par une expression qui le décrit. Effet poétique, met en valeur une qualité."},
 {q:"« Va, cours, vole, et nous venge » :",o:["Gradation ascendante","Accumulation","Anaphore","Antithèse"],a:0,e:"Gradation ascendante : intensité croissante. Effet : crescendo, montée en puissance."},
 {q:"Croisement de termes selon le schéma AB/BA :",o:["Chiasme","Parallélisme","Antithèse","Anaphore"],a:0,e:"Chiasme (effet de miroir). Effet : met en valeur un renversement, enferme l'idée sur elle-même."},
 {q:"Reprise d'une même CONSTRUCTION syntaxique dans deux segments :",o:["Parallélisme","Chiasme","Anaphore","Asyndète"],a:0,e:"Parallélisme. Effet : symétrie qui rapproche ou oppose deux idées."},
 {q:"Une fausse question dont la réponse est évidente :",o:["Question rhétorique","Apostrophe","Prosopopée","Modalisation"],a:0,e:"Question rhétorique. Effet : affirme avec force par le détour de la question, ton oratoire."},
 {q:"Comparaison SANS outil de comparaison (identification directe) :",o:["Métaphore","Comparaison","Allégorie","Symbole"],a:0,e:"Métaphore. Effet : fusion saisissante, fait surgir un sens second."},
 {q:"« Il nous a quittés » pour « il est mort » :",o:["Euphémisme","Litote","Périphrase","Antiphrase"],a:0,e:"Euphémisme : adoucir une réalité brutale. Effet : voile pudiquement le tragique."},
 {q:"Description si vive qu'on croit assister à la scène :",o:["Hypotypose","Énumération","Gradation","Personnification"],a:0,e:"Hypotypose. Effet : rend la scène présente, immédiate, spectaculaire."},
 {q:"Un vers de 12 syllabes s'appelle :",o:["Alexandrin","Décasyllabe","Octosyllabe","Hémistiche"],a:0,e:"Alexandrin (12 syllabes), césure classique à l'hémistiche (6/6). Vers noble, ample."},
 {q:"Rimes disposées selon le schéma ABAB :",o:["Rimes croisées","Rimes plates","Rimes embrassées","Rimes riches"],a:0,e:"Rimes croisées (alternées). Plates = AABB ; embrassées = ABBA."},
 {q:"La phrase déborde d'un vers sur le suivant sans pause :",o:["Enjambement","Rejet","Césure","Diérèse"],a:0,e:"Enjambement. Effet : continuité, élan, débordement de l'émotion."},
 {q:"Faire parler un mort, un absent ou une abstraction :",o:["Prosopopée","Apostrophe","Personnification","Allégorie"],a:0,e:"Prosopopée. Effet : donne voix à l'inanimé, dramatise et solennise."},
 {q:"Dire le contraire de ce qu'on pense pour se moquer :",o:["Ironie / antiphrase","Litote","Euphémisme","Paradoxe"],a:0,e:"Ironie (mécanisme : l'antiphrase). Effet : distance critique, connivence avec le lecteur."},
 {q:"Représentation concrète et imagée d'une idée abstraite (souvent personnifiée) :",o:["Allégorie","Symbole","Métaphore","Métonymie"],a:0,e:"Allégorie (ex. la Mort en faucheuse). Effet : rend visible et mémorable une notion abstraite."},
 {q:"Juxtaposition de propositions SANS mot de liaison :",o:["Asyndète","Polysyndète","Parataxe","Hypotaxe"],a:0,e:"Asyndète. Effet : accélère, condense (« Je vins, je vis, je vainquis »)."},

let QZ={order:[],pos:0,score:0,answered:false};
function viewQuizShell(){return `<div class="view"><div class="eyebrow">Entraînement</div><h1 style="margin-top:0">Quiz — reconnaître les procédés</h1><p class="muted">24 questions, dans le désordre. Objectif : nommer le procédé ET savoir son effet. <b>Reconnaître un procédé à l'oral = des points faciles.</b></p><div id="qzArea"></div></div>`;}
function initQuiz(){QZ={order:shuffle([...Array(QUIZ.length).keys()]),pos:0,score:0,answered:false};drawQuiz();}
function drawQuiz(){
  const area=$("#qzArea");
  if(QZ.pos>=QZ.order.length){
    const pct=Math.round(QZ.score/QUIZ.length*100);
    const best=Math.max(store.get("quizBest",0),pct);store.set("quizBest",best);
    area.innerHTML=`<div class="card" style="text-align:center"><div class="scorebig">${QZ.score}/${QUIZ.length}</div>
      <p class="muted">Soit ${pct}%. Meilleur score : ${best}%.</p>
      <p style="font-family:var(--serif);font-size:18px">${pct>=85?"Excellent — tu maîtrises tes procédés ✦":pct>=60?"Bien — revois le Mémo procédés pour les ratés.":"À retravailler : ouvre le Mémo procédés, puis recommence."}</p>
      <button class="btn primary" onclick="initQuiz()">↻ Refaire</button>
      <button class="btn" data-go="memo" style="margin-left:8px">📑 Mémo procédés</button></div>`;
    return;
  }
  const q=QUIZ[QZ.order[QZ.pos]];QZ.answered=false;
  area.innerHTML=`<div class="fc-progress" style="text-align:left">Question ${QZ.pos+1} / ${QUIZ.length} · Score ${QZ.score}</div>
    <div class="quiz-q">${esc(q.q)}</div>
    <div id="qzOpts">${q.o.map((o,i)=>`<button class="opt" data-i="${i}">${esc(o)}</button>`).join("")}</div>
    <div id="qzNext"></div>`;
  $("#qzOpts").querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    if(QZ.answered)return;QZ.answered=true;
    const i=+b.dataset.i;const correct=q.a;
    $("#qzOpts").querySelectorAll(".opt").forEach((x,xi)=>{x.disabled=true;if(xi===correct)x.classList.add("correct");else if(xi===i)x.classList.add("wrong");});
    if(i===correct)QZ.score++;
    $("#qzNext").innerHTML=`<div class="qexpl">${i===correct?"✓ ":"✗ "}${esc(q.e)}</div><button class="btn primary" id="qzN">${QZ.pos+1<QUIZ.length?"Question suivante ›":"Voir mon score"}</button>`;
    $("#qzN").onclick=()=>{QZ.pos++;drawQuiz();};
  });
}

function initMemoSearch(){

function planKey(di,ti){return "pl_"+di+"_"+ti;}
function viewPlanning(){
  const done=store.get("planDone",{});
  let total=0,doneN=0;
  const days=PLAN_TASKS.map((day,di)=>{
    const tasks=day.t.map((tx,ti)=>{total++;const k=planKey(di,ti);const dn=!!done[k];if(dn)doneN++;
      return `<div class="pl-task ${dn?'done':''}" data-pk="${k}"><div class="cb">${dn?'✓':''}</div><div class="tx">${esc(tx)}</div></div>`;}).join("");
    return `<div class="pl-day"><h3>${day.d}<span class="tag">${esc(day.tag)}</span></h3>${tasks}</div>`;
  }).join("");
  const pct=total?Math.round(doneN/total*100):0;
  return `<div class="view"><div class="eyebrow">5 jours pour tout maîtriser</div><h1 style="margin-top:0">Mon planning J-5</h1>
    <p class="muted">Coche tes sessions au fur et à mesure. Méthode : <b>se tester à voix haute, espacer, mélanger les textes</b> — et dormir 8 h (la mémoire se consolide la nuit).</p>
    <div class="card" style="margin:8px 0 18px"><div style="display:flex;justify-content:space-between"><b>Progression</b><span class="muted">${doneN}/${total} · ${pct}%</span></div><div class="progressbar"><i style="width:${pct}%"></i></div></div>
    ${days}
    <div class="section-title"><h2>La méthode en détail</h2><span class="ln"></span></div>
    <div class="prose">${PLANNING_HTML}</div></div>`;
}
